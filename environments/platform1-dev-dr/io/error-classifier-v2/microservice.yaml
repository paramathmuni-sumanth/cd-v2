microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: error-classifier-v2
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 0
      containerPort: 5000
      resources:
        limits:
          cpu: 1
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 3Gi
      terminationGracePeriodSeconds: 330
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::857438227645:role/error-classifier-v2-s3-role-k8s-platform1-dev-dr
  virtualService:
    enabled: true
    hosts:
      - error-classifier-v2.io.svc.cluster.local
      - error-classifier-v2.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - error-classifier-v2
            topologyKey: kubernetes.io/hostname
          weight: 100
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: application-type
                operator: In
                values:
                  - error_classifier_v2
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.54.0
      subsetConfig:
        selectorLabels: {}
        routes: []
  tolerations:
    - key: "application-type"
      operator: "Equal"
      value: "error_classifier_v2"
      effect: "NoSchedule"
  env:
    aws_region: us-west-2
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-platform1-dev-dr-env-vars
