microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "microservices-template"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 0
      containerPort: 5000
      resources:
        limits:
          cpu: 200m
          memory: 512Mi
        requests:
          cpu: 100m
          memory: 256Mi
      terminationGracePeriodSeconds: 86400
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::857438227645:role/microservices-template-s3-role-k8s-platform1-dev-dr
  virtualService:
    enabled: true
    hosts:
      - microservices-template.celigo.io
      - microservices-template.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - microservices-template
            topologyKey: kubernetes.io/hostname
          weight: 100
  tolerations:
    - key: "affinity"
      operator: "Equal"
      value: "foundationlayer"
      effect: "NoSchedule"
  deployments:
    - name: app
      deployment:
        image:
          tag: websocket-dev-1.0.0.13.0
      subsetConfig:
        selectorLabels: {}
        routes: []
  env:
    aws_region: us-west-2
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-platform1-dev-dr-env-vars
