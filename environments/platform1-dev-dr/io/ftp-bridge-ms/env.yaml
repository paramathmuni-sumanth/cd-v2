microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform1-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform1-dev-ftp-bridge-ms"
    NODE_OPTIONS: "--max-old-space-size=2048"
    JAVA_ENV: "cd"
    CATALINA_OPTS: "-Xms800m -Xmx1600m -XX:MaxGCPauseMillis=200 -XX:ParallelGCThreads=5 -XX:ConcGCThreads=2 -XX:+UseParallelGC"
    s3_integrator_userdata_delete_30: "integrator-platform1-dev-userdata-delete-30"
