microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/di/sa/di-management-service
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/io/sa/internal-gateway
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/io/sa/ai-agent-adaptor
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "endpoint-service"
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        failureThreshold: 5
      readinessProbe:
        failureThreshold: 5
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 1.5Gi
        requests:
          cpu: 300m
          memory: 1Gi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - -c
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-06-11-12-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
    customToken:
      enabled: true
      image:
        name: "token-refresher"
        tag: "generic-v28"
      refreshInterval: "43200"
      expiryTime: "86700"
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::027986264538:role/endpoint-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - endpoint-service.celigo.io
      - endpoint-service.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - endpoint-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    logLevel.json: |
      {
        "default": "info"
      }
  volumes:
    - name: config-volume
      configMap:
        name: endpoint-service-config-volume
  volumeMounts:
    - name: config-volume
      mountPath: /etc/config
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.685.0
      subsetConfig:
        selectorLabels: {}
        routes: []
