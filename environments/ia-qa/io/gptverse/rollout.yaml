service: gptverse
analysis:
  source: splunk
  query: >
    search earliest=-5m index=apm_traces "k8s.container.name"="gptverse" deployment.environment = iaqa "k8s.namespace.name" IN ("io") k8s.pod.name=*canary*
    ((logName=serverHit status_code IN (2*, 5*, 4*)) OR level="error" OR "uncaughtException" OR "TypeError")
    | eval pass=if(match(status_code, "^2"), 1, 0), fail=if(match(status_code, "^5")  OR level="error" OR searchmatch("uncaughtException") OR searchmatch("TypeError"), 1, 0)
    | stats sum(pass) as passCount, sum(fail) as failCount, count as totalCount
    | eval errorRate=if(totalCount > 0, failCount/totalCount, 0)
    | eval finalResultHolder=if(totalCount == 0 OR errorRate < 0.001, "true", "false")
    | fields passCount, failCount, totalCount, errorRate, finalResultHolder
  frequency: 7m
disabled: true
versions:
    - version: v2
      isPromotable: true
      lastApplied: 2021-09-01 12:00:00
      stages:
        - wait: 10m
          groups: ['Automation User IAQA']
