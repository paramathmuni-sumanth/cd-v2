microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-ia-qa-env-vars"
    NEW_RELIC_APP_NAME: "ia-qa-salesforce-adaptor"
    NODE_OPTIONS: "--max-old-space-size=1024"
    HTTP_ADAPTOR_URL: "ws://http-adaptor.io.svc.cluster.local"
    SALESFORCE_DA_PACKAGE_URL: "/packaging/installPackage.apexp?p0=04t8V000001VB6B"
    s3_integrator_netsuite_metadata: "integrator-ia-qa-metadata"
    SALESFORCE_JWT_EXPIRATION: "30s"
    DONT_USE_AXIOS: "false"
    APP_NAME: "salesforce-adaptor"
    CANARY_SERVICE_NAME_AND_KEYS_LIST: "resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,endpoint-service:endpoint-service,as2-adaptor:as2-adaptor,salesforce-adaptor:salesforce-adaptor"
    HEAP_INTERVAL_CHECK: "30000"
    HEAP_PROFILER_ENABLED: "true"
    S3_HEAP_DUMPS_BUCKET: "integrator-ia-qa-heap-dumps"
    s3_integrator_userdata_delete_30: "integrator-ia-qa-userdata-delete-30"
