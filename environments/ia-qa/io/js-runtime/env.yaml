microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-ia-qa-env-vars"
    NEW_RELIC_APP_NAME: "ia-qa-js-runtime"
    NODE_OPTIONS: "--max-old-space-size=3072"
    MAX_ISOLATES_PER_PROC: "1"
    MAX_PROCS: "256"
    MAX_MEM_PER_ISOLATE_MB: "128"
    MAX_CPUS: "3"
    API_HMAC_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    JAVASCRIPT_RUNTIME_USER_LOGS_BUCKET: "integrator-ia-qa-userdata-delete-30"
    PROCESSES_PER_CPU: "8"
    SOURCE_CODE_BUCKET: "integrator-ia-qa-scripts"
    V8_UPGRADE_NEW_FUNCTIONS_DISABLED: "false"
    AWS_REGION: "ap-south-1"
    JAVASCRIPT_RUNTIME_URL_K8S: "https://js-runtime.celigo.io"
