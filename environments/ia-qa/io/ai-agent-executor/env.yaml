microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-ia-qa-env-vars
    NEW_RELIC_APP_NAME: ia-qa-ai-agent-executor
    NODE_OPTIONS: --max-old-space-size=250
    API_EXECUTION_BASE_URL: "http://api-execution.core.svc.cluster.local"
    RMS_SERVICE_ENDPOINT_TOKEN: http://resource-management.core.svc.cluster.local
    FILTER_DOCUMENT_WITH_AGENT_ID: true
    FILTER_DOCUMENT_WITH_BYOK: true
    AGENT_MAX_TURNS: 25
    MAX_SAME_TOOL_ATTEMPTS_PER_RUN: 8
    MAX_DUPLICATE_NORMALIZED_TOOL_CALLS: 3
    MAX_RETRIES_PER_TOOL_CALL: 2
    MAX_TOOL_TIMEOUT: 300
    API_EXECUTION_TIMEOUT_SECONDS: 120
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-x0211h-shard-0&authSource=admin&retryWrites=true&w=majority"
