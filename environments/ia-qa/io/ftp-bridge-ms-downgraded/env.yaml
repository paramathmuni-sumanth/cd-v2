microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-ia-qa-env-vars
    NEW_RELIC_APP_NAME: ia-qa-ftp-bridge-ms-downgraded
    LOG4J_CONFIGURATION_FILE: "/etc/config/log4j2.properties"
    NODE_OPTIONS: --max-old-space-size=2048
    JAVA_ENV: "cd"
    JDK_JAVA_OPTIONS: "--add-opens=java.base/sun.security.ssl=ALL-UNNAMED --add-opens=java.base/sun.security.util=ALL-UNNAMED"
    CATALINA_OPTS: "-Xms2048m -Xmx4096m -XX:+UseG1GC -XX:G1HeapRegionSize=2m -XX:InitiatingHeapOccupancyPercent=30 -XX:MaxGCPauseMillis=250 -XX:ParallelGCThreads=3 -XX:ConcGCThreads=2 -XX:NewRatio=3 -Xlog:gc*,gc+ref=debug:file=gc.log:time -XX:+PrintGCDetails"
    s3_integrator_userdata_delete_30: "integrator-ia-qa-userdata-delete-30"
    ACTIVE_PORT_RANGE_MAX: "15010"
    ACTIVE_PORT_RANGE_MIN: "15000"
    ec2_metadata_ip_url: "http://169.254.169.254/latest/meta-data/public-ipv4"
    ec2_metadata_token_url: "http://169.254.169.254/latest/api/token"
