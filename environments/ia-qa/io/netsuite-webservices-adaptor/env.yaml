microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-ia-qa-env-vars"
    NEW_RELIC_APP_NAME: "ia-qa-netsuite-webservices-adaptor"
    NODE_OPTIONS: "--max-old-space-size=1340"
    PORT: "5000"
    s3_integrator_debug: "integrator-ia-qa-debug"
    s3_integrator_files: "integrator-ia-qa-files"
    s3_integrator_netsuite_metadata: "integrator-ia-qa-metadata"
    s3_integrator_userdata_delete_30: "integrator-ia-qa-userdata-delete-30"
    MAX_ALL_BUFFERS_LIMIT: "100000000"
    MULTI_LOGS_BUFFER_LIMIT: "10000000"
    SINGLE_LOG_BUFFER_LIMIT: "25000000"
    IDLE_FLUSH_INTERVAL: "500"
    HARD_FLUSH_INTERVAL: "1000"
    FLUSH_SCHEDULE_INTERVAL: "250"
    TOTAL_BUFFER_COUNT: "10"
    RTO_LOG_ENABLE: true
    DEFAULT_MAX_OLD_SPACE_SIZE: "2684354560"
    HEAP_INTERVAL_CHECK: "30000"
    HEAP_PROFILER_ENABLED: "true"
    NETSUITE_APPLICATION_ID: "00997F3C-FD81-400B-9E36-BB673D757DE3"
    S3_HEAP_DUMPS_BUCKET: "integrator-ia-qa-heap-dumps"
