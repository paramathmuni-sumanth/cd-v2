microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/io/sa/rdbms-adaptor
                  - cluster.local/ns/testing/sa/default
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /jdbc-bridge/metrics
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "jdbc-bridge"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      livenessProbe:
        enabled: false
      readinessProbe:
        enabled: false
      containerPort: 8080
      resources:
        limits:
          cpu: 1500m
          memory: 1000Mi
        requests:
          cpu: 100m
          memory: 700Mi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - "-c"
              - "echo prestop stage ; sleep 300 ; catalina.sh stop"
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-02-24-18-28
        celigo.io/scrape: 'true'
        celigo.io/path: '/jdbc-bridge/metrics'
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::027986264538:role/jdbc-bridge-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - jdbc-bridge.celigo.io
      - jdbc-bridge.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - jdbc-bridge
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    log4j2.properties: |
      status = error
      name = PropertiesConfig
      customLevels = CUSTOM_DEBUG
      customLevel.CUSTOM_DEBUG = 450
      appenders = console
      appender.console.type = Console
      appender.console.name = LogToConsole
      appender.console.layout.type = PatternLayout
      appender.console.layout.pattern = %d{ISO8601} %-5p (%13F:%L) - %m%n
      rootLogger.level = info
      rootLogger.additivity = false
      rootLogger.appenderRef.console.ref = LogToConsole
      monitorInterval = 60
  volumes:
    - name: log4j2-properties
      configMap:
        name: jdbc-bridge-config-volume
  volumeMounts:
    - name: log4j2-properties
      mountPath: /etc/config
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.14.106.0
      subsetConfig:
        selectorLabels: {}
        routes:
          - uri:
              prefix: /
