microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-ia-qa-env-vars
    NEW_RELIC_APP_NAME: ia-qa-mcp-logs-ingestion
    NODE_OPTIONS: --max-old-space-size=2048
    CLICKHOUSE_DATABASE: "integrator-ia-qa"
    CLICKHOUSE_TABLE: "mcpUsages"
    GROUP_ID: "mcp-logs-ingestion"
    EACH_LIMIT: "5"
    s3_integrator_kcgw: "integrator-ia-qa-kcgw"
    IO_DOMAIN: "iaqa.staging.integrator.io"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
