microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-ia-qa-env-vars"
    NEW_RELIC_APP_NAME: "ia-qa-ftp-bridge-ms"
    NODE_OPTIONS: "--max-old-space-size=512"
    JAVA_ENV: "cd"
    JDK_JAVA_OPTIONS: "--add-opens=java.base/sun.security.ssl=ALL-UNNAMED --add-opens=java.base/sun.security.util=ALL-UNNAMED"
    CATALINA_OPTS: "-Xms800m -Xmx1600m -XX:MaxGCPauseMillis=200 -XX:ParallelGCThreads=5 -XX:ConcGCThreads=2 -XX:+UseParallelGC"
    NEW_RELIC_AGENT_ENABLED: true
    NEW_RELIC_JFR_ENABLED: true
    s3_integrator_userdata_delete_30: "integrator-ia-qa-userdata-delete-30"
    LOG4J_CONFIGURATION_FILE: "/etc/config/log4j2.properties"
    NEWRELIC_CONF_FILE_PATH: "/etc/config/newRelic.json"
    METADATA_OPTIMIZATION_ENABLED: "true"
    ACTIVE_PORT_RANGE_MAX: "15010"
    ACTIVE_PORT_RANGE_MIN: "15000"
    ec2_metadata_ip_url: "http://169.254.169.254/latest/meta-data/public-ipv4"
    ec2_metadata_token_url: "http://169.254.169.254/latest/api/token"
    S3_INTEGRATOR_FILES: "integrator-ia-qa-userdata-delete-30"
    S3_INTEGRATOR_FILES_OLD: "Integrator-ia-qa-files"
    TEMP_FILE_DIRECTORY: "/batch_export"
    TEST_FTP_MAX_CONCURRENCY: "50"
