microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-ia-qa-env-vars"
    NEW_RELIC_APP_NAME: "ia-qa-webhooks"
    NODE_OPTIONS: "--max-old-space-size=2048"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    EACH_LIMIT: "100"
    MAX_PAGE_SIZE_IN_BYTES: "5242880"
    MONGODB_DATABASE: "integrator"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    PORT: "5000"
    aws_account_id: "027986264538"
    s3_integrator_pages: "integrator-ia-qa-pages"
    s3_integrator_sqs: "integrator-ia-qa-sqs"
    s3_integrator_userdata_delete_30: "integrator-ia-qa-userdata-delete-30"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    INTERNAL_HMAC_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-x0211h-shard-0&authSource=admin&retryWrites=true&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
