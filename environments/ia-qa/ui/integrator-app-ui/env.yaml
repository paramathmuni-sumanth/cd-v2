microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-ia-qa-env-vars"
    NEW_RELIC_APP_NAME: "ia-qa-integrator-app-ui"
    NODE_OPTIONS: "--max-old-space-size=250"
    INTERNAL_HMAC_HOST_NAME: "internal-gateway.celigo.io"
    HEAP_PROFILER_ENABLED: "true"
    S3_HEAP_DUMPS_BUCKET: "integrator-ia-qa-heap-dumps"
    DEFAULT_MAX_OLD_SPACE_SIZE: "1073741824"
    HEAP_INTERVAL_CHECK: "30000"
    CSP_REPORT_ONLY_HEADER: "true"
    ENABLE_XSS_SANITIZER: "true"
    HONEYPOT_URL: "https://k5t8wbocbd.execute-api.ap-south-1.amazonaws.com/ProdStage/"
    IO_DOMAIN: "iaqa.staging.integrator.io"
    OVERRIDE_FORWARDED_HEADER: "true"
    SKIP_HTTP_TO_HTTPS_REDIRECT: "true"
    UI_INDEX_FILE: "index.html"
    UI_RESOURCES_CDN_URL: "https://d27iu6u4tmcz2t.cloudfront.net"
    UI_RESOURCES_S3_BUCKET_URL: "https://integrator-ia-qa-ui-resources.s3.amazonaws.com"
