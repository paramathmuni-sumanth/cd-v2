microservice:
  env:
    NODE_ENV: cd
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-ia-qa-env-vars
    NEW_RELIC_APP_NAME: ia-qa-di-aggregation-service
    NODE_OPTIONS: --max-old-space-size=250
    API_GATEWAY_URL: "http://api-gateway.io.svc.cluster.local"
    DI_S3_BUCKET_NAME: "di-iaqa-staging-userdata"
    DI_S3_BUCKET_FOLDER_PREFIX: "di-data"
    EACH_LIMIT: "1"
    NEEDS_DI_NOTIFICATION_NUM_PARTITIONS: "1"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    DI_MANAGEMENT_SERVICE_URL: "http://di-management-service.di.svc.cluster.local"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-x0211h-shard-0&authSource=admin&retryWrites=true&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
