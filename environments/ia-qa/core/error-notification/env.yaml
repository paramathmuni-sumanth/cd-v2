microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-ia-qa-env-vars"
    NEW_RELIC_APP_NAME: "ia-qa-error-notification"
    NODE_OPTIONS: "--max-old-space-size=512"
    EACH_LIMIT: "5"
    INTIAL_RETRY_DELAY_FOR_AUTO: "60000"
    IO_DOMAIN: "iaqa.staging.integrator.io"
    MAX_ERRORS_TO_PROCESS_PER_EXP_IMP: "25"
    MAX_LOAD: "25"
    NEEDS_NOTIFICATION_NUM_PARTITIONS: "5"
    REFRESH_KCGW_FREQUENCY: "10000"
    s3_integrator_errors: "integrator-ia-qa-errors"
    s3_integrator_kcgw: "integrator-ia-qa-kcgw"
    s3_integrator_retries: "integrator-ia-qa-retries"
    s3_integrator_userdata_delete_30: "integrator-ia-qa-userdata-delete-30"
    sqs_delay_helper: "delay_helper"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-x0211h-shard-0&authSource=admin&retryWrites=true&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    OPSWORKS_STACK_ID: "4afbd762-b45d-482b-9fd1-269d34dde085"
    SERVER_STACK_ID: "62e37d27867f2975073b74fd"
