microservice:
  env:
    NODE_ENV: cd
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-ia-qa-env-vars
    NEW_RELIC_APP_NAME: ia-qa-flow-logs-ingestion
    NODE_OPTIONS: --max-old-space-size=2048
    EACH_LIMIT: "5"
    s3_integrator_kcgw: "integrator-ia-qa-kcgw"
    IO_DOMAIN: "iaqa.staging.integrator.io"
    CLICKHOUSE_DATABASE: "integrator-ia-qa"
    CLICKHOUSE_TABLE: "flow_logs"
    CLICKHOUSE_CHILD_TABLE: "flow_child_logs"
    CLICKHOUSE_PORT: "8443"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    aws_account_id: "027986264538"
