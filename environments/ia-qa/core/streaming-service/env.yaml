microservice:
  env:
    JAVA_ENV: cd
    AWS_REGION: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-ia-qa-env-vars
    NEW_RELIC_APP_NAME: ia-qa-streaming-service
    JAVA_OPTS: "-Xms512m -Xmx768m -Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager"
    SERVER_PORT: "5000"
    EXTERNAL_WEBHOOK_SERVICE_URL: http://webhooks.io.svc.cluster.local
    SERVICE_TIMEOUT: "30000"
    POD_EXPORT_LOCK_POLL_INTERVAL: "60"
    SHUTDOWN_TIMEOUT_SECONDS: "300"
    S3_INTEGRATOR_PAGES_BUCKET: integrator-ia-qa-pages
    EXTERNAL_RESOURCE_MANAGEMENT_SERVICE_URL: http://resource-management.core.svc.cluster.local
    INTERNAL_USAGE: "true"
    INTERNAL_USAGE_USER_IDS: "5301043caa20740200000001"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-x0211h-shard-0&authSource=admin&retryWrites=true&w=majority"
