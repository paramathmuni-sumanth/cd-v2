microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: streaming-service
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1024m
          memory: 1000Mi
        requests:
          cpu: 200m
          memory: 750Mi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - >-
                expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        redeployTimestamp: 2026-01-30-22-00
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::027986264538:role/streaming-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - streaming-service.core.svc.cluster.local
      - streaming-service.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - streaming-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.61.0
      subsetConfig:
        selectorLabels: {}
        routes: []
