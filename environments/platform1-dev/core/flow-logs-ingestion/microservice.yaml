microservice:
  authorizationPolicy:
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                paths:
                  - "/readyz"
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: flow-logs-ingestion
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1
          memory: 2Gi
        requests:
          cpu: 500m
          memory: 512Mi
      terminationGracePeriodSeconds: 900
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; wget -qO- "http://localhost:5000/openConnections?terminate=true"; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- "http://localhost:5000/openConnections"); sleep 5; done; wget -qO- "http://localhost:5000/stopServer"; echo "Done";
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::857438227645:role/flow-logs-ingestion-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - flow-logs-ingestion.core.svc.cluster.local
      - flow-logs-ingestion.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - flow-logs-ingestion
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app-extended-do-not-remove
      env:
        GROUP_ID: "flow-logs-ingestion-extended"
      deployment:
        image:
          tag: 2026.5.1-ai-tools-fb-0.0.1.3.0
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: app
      env:
        GROUP_ID: "flow-logs-ingestion"
      deployment:
        image:
          tag: 2026.5.1-ai-tools-fb-0.0.1.3.0
      subsetConfig:
        selectorLabels: {}
        routes: []
