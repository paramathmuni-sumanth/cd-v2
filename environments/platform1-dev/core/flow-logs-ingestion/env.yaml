microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-platform1-dev-env-vars
    NEW_RELIC_APP_NAME: platform1-dev-flow-logs-ingestion
    NODE_OPTIONS: --max-old-space-size=2048
    EACH_LIMIT: "5"
    s3_integrator_kcgw: "integrator-platform1-dev-kcgw"
    IO_DOMAIN: "platform1.dev.integrator.io"
    CLICKHOUSE_DATABASE: "integrator-platform1-dev"
    CLICKHOUSE_TABLE: "flow_logs"
    CLICKHOUSE_CHILD_TABLE: "flow_child_logs"
