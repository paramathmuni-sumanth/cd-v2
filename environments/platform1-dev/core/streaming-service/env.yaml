microservice:
  env:
    JAVA_ENV: "cd"
    JAVA_OPTS: "-Xms512m -Xmx4096m -XX:+UseG1GC -Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager"
    AWS_REGION: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform1-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform1-dev-streaming-service"
    SERVER_PORT: "5000"
    MONGODB_DATABASE: "integrator"
    S3_INTEGRATOR_PAGES_BUCKET: "integrator-platform1-dev-pages"
    S3_REGION: "ap-south-1"
    WEBHOOK_SERVICE_URL: "http://webhooks.io.svc.cluster.local"
    RESOURCE_MANAGEMENT_SERVICE_URL: "http://resource-management.core.svc.cluster.local"
    SERVICE_TIMEOUT: "30000"
    POD_EXPORT_LOCK_POLL_INTERVAL: "60"
    SHUTDOWN_TIMEOUT_SECONDS: "300"
