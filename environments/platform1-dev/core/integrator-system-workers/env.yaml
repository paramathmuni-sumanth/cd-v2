microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    IO_DOMAIN: "platform1.dev.integrator.io"
    PORT: "5000"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform1-dev-env-vars"
    s3_integrator_debug: "integrator-platform1-dev-debug"
    s3_integrator_error_files: "integrator-platform1-dev-error-files"
    s3_integrator_errors: "integrator-platform1-dev-errors"
    s3_integrator_event_reports: "integrator-platform1-dev-event-reports"
    s3_integrator_files: "integrator-platform1-dev-files"
    s3_integrator_mongo_fields_data: "integrator-platform1-dev-mongo-fields"
    s3_integrator_pages: "integrator-platform1-dev-pages"
    s3_integrator_retries: "integrator-platform1-dev-retries"
    s3_integrator_retry_data_keys: "integrator-platform1-dev-retry-data-keys"
    s3_integrator_sqs: "integrator-platform1-dev-sqs"
    s3_integrator_templates_published: "integrator-platform1-dev-templates-published"
    s3_integrator_userdata_delete_30: "integrator-platform1-dev-userdata-delete-30"
    MONGODB_DATABASE: "integrator"
    MONGODB_CLIENT_APP_NAME: "integrator-system-workers"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    MAX_CONSUMER_CHILD_PROCESSES: "2"
    MAX_LOAD: "100"
    MAX_OPEN_FILE_DESCRIPTORS: "65535"
    HEALTH_CHECK_FREQUENCY: "60000"
    PERSIST_JOB_FREQUENCY: "5000"
    REFRESH_QG_FREQUENCY: "1000"
    REFRESH_KCGW_FREQUENCY: "60000"
    LICENSE_SYSTEM_BATCH_PROCESS_PERIOD: "86400000"
    AUDIT_ENABLED: "true"
    MONGOOSE_QUERY_USERID_PARSER_ENABLED: "true"
    sqs_delay_helper: "delay_helper"
    NEW_RELIC_APP_NAME: "platform1-dev-integrator-system-workers"
    NETSUITE_DISTRIBUTED_ADAPTOR_URL: "ws://netsuite-distributed-adaptor.io.svc.cluster.local"
    NODE_OPTIONS: "--max-old-space-size=2048"
    DATA_WAREHOUSE_ADAPTOR_URL: "ws://data-warehouse-adaptor.io.svc.cluster.local"
    FILE_ADAPTOR_URL: "ws://file-adaptor.io.svc.cluster.local"
