microservice:
  authorizationPolicy:
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/ui/sa/integrator-bff
                  - cluster.local/ns/io/sa/ai-agent-executor
                  - cluster.local/ns/io/sa/audit-service
                  - cluster.local/ns/io/sa/agent-management-service
                  - cluster.local/ns/core/sa/streaming-service
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                paths:
                  - "/readyz"
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/io/sa/lookup-cache
          to:
            - operation:
                methods:
                  - PUT
                paths:
                  - '*/size'
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "resource-management"
    subscriptionType:
      enabled: false
    podDisruptionBudget:
      enabled: true
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2.3
          memory: 2.5Gi
        requests:
          cpu: 600m
          memory: 2Gi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-05-14-08-18
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::857438227645:role/resource-management-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - resource-management.celigo.io
      - resource-management.core.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - resource-management
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: tools-cloning-ilm-fb-0.0.1.1688.0
      subsetConfig:
        selectorLabels: {}
        routes: []
