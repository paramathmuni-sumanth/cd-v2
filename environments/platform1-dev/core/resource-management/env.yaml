microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform1-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform1-dev-resource-management"
    NODE_OPTIONS: "--max-old-space-size=512"
    ACCESSCONTROL_FOR_API_ROUTES: "true"
    AUDIT_ENABLED: "true"
    EACH_LIMIT: "100"
    JAVASCRIPT_S3_BUCKET: "integrator-platform1-dev-scripts"
    JAVASCRIPT_SIZE_LIMIT: "2097152"
    LOOKUP_CACHE_SERVICE_URL: "http://lookup-cache.io.svc.cluster.local"
    NETSUITE_DISTRIBUTED_ADAPTOR_URL: "ws://netsuite-distributed-adaptor.io.svc.cluster.local"
    S3_HEAP_DUMPS: "integrator-platform1-dev-heap-dumps"
    SALESFORCE_ADAPTOR_URL: "ws://salesforce-adaptor.io.svc.cluster.local"
    FILE_ADAPTOR_URL: "ws://file-adaptor.io.svc.cluster.local"
    s3_integrator_error_files: "integrator-platform1-dev-error-files"
    s3_integrator_errors: "integrator-platform1-dev-errors"
    s3_integrator_files: "integrator-platform1-dev-files"
    s3_integrator_mongo_fields_data: "integrator-platform1-dev-mongo-fields"
    s3_integrator_revisions: "integrator-platform1-dev-revisions"
    s3_integrator_templates: "integrator-platform1-dev-templates"
    s3_integrator_templates_published: "integrator-platform1-dev-templates-published"
    FMS_SERVICE_URL: "http://flow-management.io.svc.cluster.local"
    ENDPOINT_SERVICE_URL: "http://endpoint-service.io.svc.cluster.local"
    NEW_USER_SIGNUP_ENABLED: "true"
    DISPOSABLE_DOMAINS_URL: "https://raw.githubusercontent.com/disposable/disposable-email-domains/master/domains.txt"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    GPTVERSE_URL: "http://gptverse.io.svc.cluster.local"
    ENABLE_SEARCH_FOR_RESOURCES: "true"
    "PINECONE_USER_TOOL_NAMESPACE": "user-tools-ai-descriptions"
