microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: ai-agent-adaptor
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 500m
          memory: 1024Mi
        requests:
          cpu: 250m
          memory: 512Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-02-17-14-01
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 1
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::857438227645:role/ai-agent-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - ai-agent-adaptor.io.svc.cluster.local
      - ai-agent-adaptor.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - ai-agent-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.60.0
      subsetConfig:
        selectorLabels: {}
        routes: []
