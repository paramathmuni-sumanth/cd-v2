microservice:
  env:
    NODE_ENV: cd
    NODE_OPTIONS: "--max-old-space-size=512"
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-platform1-dev-env-vars
    SQS_QUEUE_URL: "https://sqs.ap-south-1.amazonaws.com/857438227645 /stitch_enterprise_logs.fifo"
    NEW_RELIC_APP_NAME: platform1-dev-stitcher-service
    EFS_PATH: "/mnt/efs/enterprise-logging"
    EFS_BASE_PATH: "/mnt/efs/enterprise-logging"
    ENABLE_EFS_DELETION: "true"
    DEBUG: "true"
    GO_ENV: "staging"
    SERVER_PORT: ":8080"
    LOG_DIR: "logs"
    LOG_CONSOLE: "true"
    DISABLE_FILE_LOGS: "false"
    LOG_MAX_SIZE: 10
    LOG_MAX_BACKUPS: 5
    LOG_MAX_AGE: 30
    LOG_COMPRESS: "true"
    ENVIRONMENT: ci
    S3_BUCKET_ENVVARS: celigo-k8s-platform1-dev-env-vars
    SQS_ENABLED: "true"
    S3_BUCKET: integrator-platform1-dev-userdata-delete-30
    MAX_RETRIES: 5
    WORKER_COUNT: 8
    S3_UPLOADER_PART_SIZE: 5242880
    S3_UPLOADER_CONCURRENCY: 1
    POLLER_BUFFER_SIZE: 4
    WORKER_MESSAGE_TIMEOUT: 80
    SQS_VISIBILITY_TIMEOUT: 180
