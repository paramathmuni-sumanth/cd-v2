microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform1-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform1-dev-integrator-workers"
    NODE_OPTIONS: "--max-old-space-size=512"
    CANARY_SERVICE_NAME_AND_KEYS_LIST: "http-adaptor:http-adaptor,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,endpoint-service:endpoint-service,as2-adaptor:as2-adaptor,salesforce-adaptor:salesforce-adaptor,file-adaptor:file-adaptor,netsuite-distributed-adaptor:netsuite-distributed-adaptor,netsuite-webservices-adaptor:netsuite-webservices-adaptor,file-service:file-service,file-adaptor:file-adaptor,js-runtime:js-runtime,api-execution:api-execution,lookup-cache:lookup-cache"
    JS_RUNTIME_KEEP_ALIVE: "true"
    JS_RUNTIME_KEEP_ALIVE_MSECS: "60000"
    FILE_ADAPTOR_URL: "ws://file-adaptor.io.svc.cluster.local"
    AI_AGENT_ADAPTOR_URL: "ws://ai-agent-adaptor.io.svc.cluster.local"
    MAX_CONSUMER_CHILD_PROCESSES: 2
