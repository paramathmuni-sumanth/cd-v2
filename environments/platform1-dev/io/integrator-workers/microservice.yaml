microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    secretRef: newrelic-no-secrets
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "integrator-workers"
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        failureThreshold: 6
      readinessProbe:
        failureThreshold: 3
      revisionHistoryLimit: 1
      replicaCount: 2
      containerPort: 5000
      resources:
        limits:
          cpu: 2000m
          memory: 12Gi
        requests:
          cpu: 2000m
          memory: 8Gi
      startupProbe:
        enabled: true
        path: "/"
        port: "9999"
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 10
        successThreshold: 1
        failureThreshold: 5
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; wget -qO- "http://localhost:5000/openConnections?terminate=true"; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- "http://localhost:5000/openConnections"); sleep 5; done; wget -qO- "http://localhost:5000/stopServer"; echo "Done";
      podAnnotations:
        redeployTimestamp: 2026-05-08-22-30
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
    customToken:
      enabled: true
      image:
        name: "token-refresher"
        tag: "generic-v31"
      refreshInterval: "43200"
      expiryTime: "86700"
      env:
        MAX_RETRIES: 20
        WAIT_TIME_BEFORE_RETRY: 2
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::857438227645:role/integrator-workers-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - integrator-workers.celigo.io
      - integrator-workers.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - integrator-workers
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      env:
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
      deployment:
        image:
          tag: 2026.5.1-ai-tools-fb-1.0.0.649.0
      subsetConfig:
        selectorLabels: {}
        routes: []
