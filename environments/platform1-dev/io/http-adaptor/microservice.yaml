microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/salesforce-adaptor
                  - cluster.local/ns/io/sa/as2-adaptor
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/testing/sa/loadtesting
                  - cluster.local/ns/io/sa/ai-agent-adaptor
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "http-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2500m
          memory: 3814Mi
        requests:
          cpu: 500m
          memory: 3302Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: '15001'
        redeployTimestamp: 2025-11-19-17-45
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
        behavior:
          scaleDown:
            policies:
              - periodSeconds: 60
                type: Pods
                value: 1
            selectPolicy: Max
            stabilizationWindowSeconds: 120
          scaleUp:
            policies:
              - periodSeconds: 15
                type: Percent
                value: 50
            selectPolicy: Max
            stabilizationWindowSeconds: 60
  destinationRules:
    enabled: true
    trafficPolicy:
      connectionPool:
        tcp:
          connectTimeout: 30s
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::857438227645:role/http-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - http-adaptor.celigo.io
      - http-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - http-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  PersistentVolumeClaims:
    - name: http-adaptor-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc
  configVolume:
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAPDUMP_ENABLED": false
      }
  volumes:
    - name: probe-config-volume
      configMap:
        name: http-adaptor-config-volume
    - name: http-adaptor-nfs-storage
      persistentVolumeClaim:
        claimName: http-adaptor-nfs-pvc
  volumeMounts:
    - mountPath: "/service-core-dumps"
      name: http-adaptor-nfs-storage
    - mountPath: "/opt/probe-config"
      name: probe-config-volume
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.438.0
      subsetConfig:
        selectorLabels: {}
        routes: []
