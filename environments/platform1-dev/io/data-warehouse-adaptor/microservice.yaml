microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "data-warehouse-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1100m
          memory: 1000Mi
        requests:
          cpu: 190m
          memory: 500Mi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::857438227645:role/data-warehouse-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - data-warehouse-adaptor.celigo.io
      - data-warehouse-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - data-warehouse-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.1.2.139.0
      subsetConfig:
        selectorLabels: {}
        routes: []
