microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    IO_DOMAIN: "platform3.dev.integrator.io"
    PORT: "5000"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform3-dev-env-vars"
    s3_integrator_debug: "integrator-platform3-dev-debug"
    s3_integrator_error_files: "integrator-platform3-dev-error-files"
    s3_integrator_errors: "integrator-platform3-dev-errors"
    s3_integrator_event_reports: "integrator-platform3-dev-event-reports"
    s3_integrator_files: "integrator-platform3-dev-files"
    s3_integrator_mongo_fields_data: "integrator-platform3-dev-mongo-fields"
    s3_integrator_pages: "integrator-platform3-dev-pages"
    s3_integrator_retries: "integrator-platform3-dev-retries"
    s3_integrator_retry_data_keys: "integrator-platform3-dev-retry-data-keys"
    s3_integrator_sqs: "integrator-platform3-dev-sqs"
    s3_integrator_userdata_delete_30: "integrator-platform3-dev-userdata-delete-30"
    MONGODB_DATABASE: "integrator"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    MAX_CONSUMER_CHILD_PROCESSES: "1"
    MAX_LOAD: "1000"
    MAX_OPEN_FILE_DESCRIPTORS: "65535"
