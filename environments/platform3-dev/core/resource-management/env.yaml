microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform3-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform3-dev-resource-management"
    NODE_OPTIONS: "--max-old-space-size=900"
    ACCESSCONTROL_FOR_API_ROUTES: "true"
    AUDIT_ENABLED: "true"
    EACH_LIMIT: "100"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    IO_DOMAIN: "platform3.dev.integrator.io"
    JAVASCRIPT_S3_BUCKET: "integrator-platform3-dev-scripts"
    JAVASCRIPT_SIZE_LIMIT: "2097152"
    LOOKUP_CACHE_SERVICE_URL: "http://lookup-cache.io.svc.cluster.local"
    NETSUITE_DISTRIBUTED_ADAPTOR_URL: "ws://netsuite-distributed-adaptor.io.svc.cluster.local"
    S3_HEAP_DUMPS: "integrator-platform3-dev-heap-dumps"
    SALESFORCE_ADAPTOR_URL: "ws://salesforce-adaptor.io.svc.cluster.local"
    s3_integrator_error_files: "integrator-platform3-dev-error-files"
    s3_integrator_errors: "integrator-platform3-dev-errors"
    s3_integrator_files: "integrator-platform3-dev-files"
    s3_integrator_mongo_fields_data: "integrator-platform3-dev-mongo-fields"
    s3_integrator_revisions: "integrator-platform3-dev-revisions"
    s3_integrator_templates: "integrator-platform3-dev-templates"
    s3_integrator_templates_published: "integrator-platform3-dev-templates-published"
    FMS_SERVICE_URL: "http://flow-management.io.svc.cluster.local"
    ENDPOINT_SERVICE_URL: "http://endpoint-service.io.svc.cluster.local"
    NEW_USER_SIGNUP_ENABLED: true
