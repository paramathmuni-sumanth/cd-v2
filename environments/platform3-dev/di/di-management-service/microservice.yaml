microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/internal-gateway
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: di-management-service
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2000m
          memory: 2300Mi
        requests:
          cpu: 300m
          memory: 1800Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      livenessProbe:
        failureThreshold: 15
      readinessProbe:
        failureThreshold: 5
      podAnnotations:
        redeployTimestamp: 2026-06-09-16-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 20
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::620736318138:role/di-management-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - di-management-service.di.svc.cluster.local
      - di-management-service.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - di-management-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  configVolume:
    logLevel.json: |
      {
        "default": "debug",
        "configPerPod": true,
        "pods": {
          "pod1": "info",
          "pod2": "info"
        }
      }
  volumes:
    - name: log-level
      configMap:
        name: di-management-service-config-volume
  volumeMounts:
    - mountPath: "/etc/config/"
      name: log-level
  deployments:
    - name: app
      deployment:
        image:
          tag: io-182892-connector-framework-fb-1.0.0.331.0
      subsetConfig:
        selectorLabels: {}
        routes: []
