microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform3-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform3-dev-di-error-notification"
    NODE_OPTIONS: "--max-old-space-size=250"
    AWS_SES_REGION: "ap-south-1"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    IO_DOMAIN: "platform3.dev.integrator.io"
    PORT: "5000"
    SESSION_TIMEOUT: "60000"
    REBALANCE_TIMEOUT: "60000"
    CONSUMER_HEARTBEAT_INTERVAL: "20000"
    HEARTBEAT_INTERVAL_CONSUMER: "3000"
    MAX_WAIT_TIME_IN_MS: "5000"
    MIN_BYTES: "512 * 1024"
    MAX_BYTES_PER_PARTITION: "1048576"
    POLLING_INTERVAL: "5000"
    MAX_RECOVERY_ATTEMPTS: "5"
    GROUP_ID: "di-error-notification-group"
    NEEDS_NOTIFICATION_PAUSE_WAIT: "900000"
    ENABLE_LOGGING_KCGW: "true"
    WATCHDOG_ENABLED: "false"
