microservice:
  common:
    deployment:
      resources:
        limits:
          cpu: 260m
          memory: 250Mi
        requests:
          cpu: 60m
          memory: 150Mi
    hpa:
      autoscaling:
        maxReplicas: 2
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-platform3-dev-env-vars
    NEW_RELIC_APP_NAME: platform3-dev-hello-world
    NODE_OPTIONS: --max-old-space-size=250
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::620736318138:role/hello-world-s3-role-k8s
  deployments:
    - name: app
      deployment:
        image:
          tag: test
