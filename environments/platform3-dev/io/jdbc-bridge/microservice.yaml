microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/io/sa/rdbms-adaptor
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/endpoint-service
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "jdbc-bridge"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      livenessProbe:
        enabled: false
      readinessProbe:
        enabled: false
      containerPort: 8080
      resources:
        limits:
          cpu: 1500m
          memory: 1000Mi
        requests:
          cpu: 500m
          memory: 700Mi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - 'echo prestop stage ; sleep 300 ; catalina.sh stop'
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::620736318138:role/jdbc-bridge-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - jdbc-bridge.celigo.io
      - jdbc-bridge.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - jdbc-bridge
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app-do-not-remove
      deployment:
        image:
          tag: ml-1.0.13.105.0
        resources:
          limits:
            cpu: 2.25
            memory: 4Gi
          requests:
            cpu: 800m
            memory: 3.5Gi
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-gitops-server.prometheus.svc.cluster.local:80
                query: quantile(0.80, celigo_metrics_open_connections{deploymentName="jdbc-bridge-app"})
                threshold: "50"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
