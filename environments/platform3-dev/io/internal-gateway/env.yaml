microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform3-dev-env-vars"
    IO_SERVICE_ENDPOINT_CONFIG: "authenticationservice:authentication-service.io,webhooks:webhooks.io,gptverse:gptverse.io,systemservice:system-apis.core,resourcemanagement:resource-management.core,flowmgmtservice:flow-management.io,as2microservice:as2-adaptor.io,endpointservice:endpoint-service.io,dimanagementservice:di-management-service.di,datacatalogservice:data-catalog-service.di,apiexecution:api-execution.core"
    NEW_RELIC_APP_NAME: "platform3-dev-internal-gateway"
    NODE_OPTIONS: "--max-old-space-size=512"
    HEAP_PROFILER_ENABLED: "true"
    S3_HEAP_DUMPS_BUCKET: "integrator-platform3-dev-heap-dumps"
