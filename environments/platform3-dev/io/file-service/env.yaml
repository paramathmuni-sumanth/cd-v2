microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform3-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform3-dev-file-service"
    NODE_OPTIONS: "--max-old-space-size=1024"
    S3_FILES_BUCKET: "integrator-platform3-dev-userdata-delete-30"
    S3_FILES_BUCKET_OLD: "integrator-platform3-dev-files"
    OPENPGP_MIN_RSA_BITS: 1024
    SERVER_PORT: "5000"
    STREAM_SORT_AND_GROUP: "true"
