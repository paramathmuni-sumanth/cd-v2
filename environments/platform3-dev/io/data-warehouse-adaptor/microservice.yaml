microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/core/sa/api-execution
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: data-warehouse-adaptor
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1100m
          memory: 1000Mi
        requests:
          cpu: 190m
          memory: 500Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-04-11-12-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::620736318138:role/data-warehouse-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - data-warehouse-adaptor.io.svc.cluster.local
      - data-warehouse-adaptor.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - data-warehouse-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  PersistentVolumeClaims:
    - name: data-warehouse-adaptor-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-ws-sc
  volumes:
    - name: data-warehouse-adaptor-nfs-storage
      persistentVolumeClaim:
        claimName: data-warehouse-adaptor-nfs-pvc
  volumeMounts:
    - mountPath: "/data-warehouse-adaptor/bulk_load_files/"
      name: data-warehouse-adaptor-nfs-storage
  deployments:
    - name: app-do-not-remove
      deployment:
        image:
          tag: 2026.5.1-fb-0.1.14.211.0
        resources:
          limits:
            cpu: 1.5
            memory: 3000Mi
          requests:
            cpu: 450m
            memory: 2500Mi
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-gitops-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="data-warehouse-adaptor-app"})
                threshold: "60"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
