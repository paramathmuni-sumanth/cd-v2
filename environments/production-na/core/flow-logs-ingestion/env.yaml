microservice:
  env:
    NODE_ENV: production
    aws_region: us-east-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-production-na-env-vars
    NEW_RELIC_APP_NAME: production-na-flow-logs-ingestion
    NODE_OPTIONS: --max-old-space-size=2048
    EACH_LIMIT: 5
    s3_integrator_kcgw: "integrator-kcgw"
    IO_DOMAIN: "integrator.io"
    CLICKHOUSE_DATABASE: "integrator"
    CLICKHOUSE_TABLE: "flow_logs"
    CLICKHOUSE_CHILD_TABLE: "flow_child_logs"
    MIN_FILE_BYTES_IN_MB: 10
