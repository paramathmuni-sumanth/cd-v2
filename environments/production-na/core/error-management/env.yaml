microservice:
  env:
    NODE_ENV: "production"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-na-env-vars"
    NEW_RELIC_APP_NAME: "production-na-error-management"
    NODE_OPTIONS: "--max-old-space-size=2048"
    MEMORY_SNAPSHOT_ENABLED: true
    HEAP_PROFILER_ENABLED: true
    S3_HEAP_DUMPS_BUCKET: "integrator-heap-dumps-1"
    HEAP_THRESHOLD_VALUE: 700000000
    HEAP_INTERVAL_CHECK: 300000
