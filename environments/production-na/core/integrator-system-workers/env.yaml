microservice:
  env:
    NODE_ENV: "production"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-na-env-vars"
    NEW_RELIC_APP_NAME: "production-na-integrator-system-workers"
    NODE_OPTIONS: "--max-old-space-size=2048"
    FTP_ADAPTOR_OTT_EXPIRY: "43200000"
    FTP_ADAPTOR_CACHE_OTT_OFFSET: "21600000"
    s3_connection_timeout: "60000"
    s3_max_sockets: "1000"
    s3_keep_alive: "false"
    DISABLE_FILE_LOGS: "true"
    FLOW_MANAGEMENT_SERVICE_URL: http://flow-management.io.svc.cluster.local
    RMS_URL: http://resource-management.core.svc.cluster.local
    STALE_JOB_THRESHOLD: "1209600000"
    CANCEL_STALE_JOBS_DISABLED: "false"
    AWS_SES_FROM: "noreply@celigo.com"
    AWS_SES_ENDPOINT: "email.us-east-1.amazonaws.com"
    sqs_delay_helper: "delay_helper"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30"
    s3_integrator_debug: "integrator-debug"
    REFRESH_QG_FREQUENCY: "1000"
    REFRESH_KCGW_FREQUENCY: "60000"
    PERSIST_JOB_FREQUENCY: "5000"
    MAX_LOAD: "100"
    LOOKUP_CACHE_SHARDING_ENABLED: "true"
    JAVASCRIPT_S3_BUCKET: "integrator-scripts"
    FA_LISTENER_BASE_URL: "https://api.integrator.io"
    ENABLE_API_GATING: "true"
    SANDBOX_MIGRATION_S3_COPY_CONCURRENCY: '10'
    SANDBOX_MIGRATION_S3_LIST_CONCURRENCY: '10'
    BARTENDER_LABEL_PRINTING_DISABLED: 'false'
    SANDBOX_MIGRATION_BATCH_QUERY_CHUNK_SIZE: '10000'
    SANDBOX_MIGRATION_BATCH_UPDATEMANY_SIZE: '10000'
    SANDBOX_MIGRATION_CLICKHOUSE_BATCH_SIZE: '10000'
    SEND_DATA_TO_PINECONE_WEBHOOK_ENDPOINT_TOOL: https://api.integrator.io/v1/exports/69a95cc15c5197579cc0cacb/data
