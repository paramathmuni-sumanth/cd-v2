microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/io/sa/mcp-servers
                  - cluster.local/ns/io/sa/ai-agent-executor
                  - cluster.local/ns/io/sa/endpoint-service
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: api-execution
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 3.5Gi
        requests:
          cpu: 1.5
          memory: 3Gi
      terminationGracePeriodSeconds: 600
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /livez
            port: http
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 30
        successThreshold: 1
        failureThreshold: 5
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        celigo.io/scrape: 'fast'
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 22
        maxReplicas: 30
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/api-execution-s3-role-k8s-production-na
  virtualService:
    enabled: true
    hosts:
      - api-execution.core.svc.cluster.local
      - api-execution.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - api-execution
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: api-exec-io-185241
      env:
        NODE_OPTIONS: "--max-old-space-size=512"
      hpa:
        autoscaling:
          enabled: false
      deployment:
        replicaCount: 2
        image:
          tag: 2026.5.3-patch-0.0.1.158.0
        resources:
          limits:
            cpu: 250m
            memory: 700Mi
          requests:
            cpu: 100m
            memory: 500Mi
      subsetConfig:
        selectorLabels: {}
        routes:
          - uri:
              regex: '/api/flows/69d945b365d2a8beb0816036/test/run'
            method:
              exact: POST
    - name: app
      deployment:
        image:
          tag: 2026.5.3-patch-0.0.1.158.0
      hpa:
        keda:
          enabled: true
          minReplicas: 20
          maxReplicas: 50
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="api-execution-app"})
                threshold: "15"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 30
      subsetConfig:
        selectorLabels: {}
        routes: []
