apiVersion: batch/v1
kind: CronJob
metadata:
  name: identify-unhealthy-target
  namespace: default
spec:
  suspend: true
  schedule: "* * * * *"
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          volumes:
          - name: script-volume
            configMap:
              name: identify-unhealthy-target
          serviceAccountName: identify-unhealthy-target
          containers:
          - name: identify-unhealthy-target
            image: 860378520032.dkr.ecr.us-east-1.amazonaws.com/identify_unhealthy_target:generic-v1
            command:
            - "/bin/sh"
            - "-c"
            args:
            - |
              python /scripts/identify_unhealthy_target.py $NLB_ARN $REGION
            volumeMounts:
            - name: script-volume
              mountPath: "/scripts"
            env:
            - name: NLB_ARN
              value: "arn:aws:elasticloadbalancing:us-east-1:860378520032:loadbalancer/net/ae494a25b016f4986a67684d07b91467/36c84cb72996e09b"
            - name: REGION
              value: "us-east-1"
