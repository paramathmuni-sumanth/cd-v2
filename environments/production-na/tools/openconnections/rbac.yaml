apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openconnections
rules:
- apiGroups: [""]
  resources: ["pods", "pods/exec"]
  verbs: ["get", "list", "create"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openconnections-binding
subjects:
- kind: ServiceAccount
  name: openconnections-serviceaccount
  namespace: default
roleRef:
  kind: ClusterRole
  name: openconnections
  apiGroup: rbac.authorization.k8s.io