microservice:
  env:
    NODE_ENV: "production"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-na-env-vars"
    NEW_RELIC_APP_NAME: "production-na-authentication-service"
    NODE_OPTIONS: "--max-old-space-size=1024"
    DISABLE_MULTI_ENV_SIGNUP: "false"
    ENABLE_ENTERPRISE_LOGGING_BY_DEFAULT: true
    DISABLE_MFA_ENFORCEMENT: 'false'
    DISABLE_MFA_ENFORCEMENT_DATE: 'false'
    DEBUG: "oidc-provider:server_error,oidc-provider:server_error:trace,oidc-provider:authentication:error"
    MFA_ENFORCEMENT_ENABLED_DOMAIN: celigo.com
