microservice:
  env:
    NODE_ENV: production
    aws_region: us-east-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-production-na-env-vars
    NEW_RELIC_APP_NAME: production-na-stitcher-service
    NODE_OPTIONS: --max-old-space-size=250
    SQS_QUEUE_URL: "https://sqs.us-east-1.amazonaws.com/860378520032/stitch_enterprise_logs.fifo"
    EFS_PATH: "/mnt/efs/enterprise-logging"
    ENABLE_EFS_DELETION: "true"
    GO_ENV: "production"
    SERVER_PORT: ":8080"
    LOG_DIR: "logs"
    LOG_CONSOLE: "true"
    DISABLE_FILE_LOGS: "false"
    LOG_MAX_SIZE: 10
    LOG_MAX_BACKUPS: 5
    LOG_MAX_AGE: 30
    LOG_COMPRESS: "true"
    ENVIRONMENT: "production"
    S3_BUCKET_ENVVARS: celigo-k8s-production-na-env-vars
    SQS_ENABLED: "true"
    S3_BUCKET: "integrator-userdata-delete-30"
    MAX_RETRIES: 1
    WORKER_COUNT: 8
    S3_UPLOADER_PART_SIZE: 5242880
    S3_UPLOADER_CONCURRENCY: 1
    POLLER_BUFFER_SIZE: 4
    WORKER_MESSAGE_TIMEOUT: 80
    SQS_VISIBILITY_TIMEOUT: 180
    SQS_REGION: us-east-1
