microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/integrator-workers-ping
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/celigo-agent
                  - cluster.local/ns/io/sa/io-mcp-server
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "internal-gateway"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 800m
          memory: 960Mi
        requests:
          cpu: 400m
          memory: 600Mi
      terminationGracePeriodSeconds: 480
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 30
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/internal-gateway-s3-role-k8s-production-na
  virtualService:
    enabled: true
    hosts:
      - internal-gateway.celigo.io
      - internal-gateway.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - internal-gateway
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: high-usage-temp-app
      deployment:
        image:
          tag: ml-0.0.1.59.0
      hpa:
        autoscaling:
          enabled: true
          minReplicas: 5
          maxReplicas: 50
          targetCPUUtilizationPercentage: 70
          targetMemoryUtilizationPercentage: 70
      subsetConfig:
        selectorLabels: {}
        routes:
          - uri:
              exact: /v1/exports/688aaf5e19c4dd2e82f9bed1/invoke
            method:
              exact: POST
          - uri:
              exact: /v1/exports/688aafaeca2ed22035711e07/invoke
            method:
              exact: POST
          - uri:
              exact: /v1/exports/677b5b23bbef2d4feb26d534/invoke
            method:
              exact: POST
    - name: celigo-agent-app
      deployment:
        image:
          tag: ml-0.0.1.59.0
      hpa:
        autoscaling:
          enabled: true
          minReplicas: 2
          maxReplicas: 10
      subsetConfig:
        selectorLabels: {}
        routes:
          - sourceLabels:
              app: celigo-agent
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.59.0
      subsetConfig:
        selectorLabels: {}
        routes: []
