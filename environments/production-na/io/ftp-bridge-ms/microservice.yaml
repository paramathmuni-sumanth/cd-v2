microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/io/sa/endpoint-service
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /ftp-bridge-ms/metrics
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: ftp-bridge-ms
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 8080
      resources:
        limits:
          cpu: 2824m
          memory: 6000Mi
        requests:
          cpu: 600m
          memory: 4200Mi
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /ftp-bridge-ms/livez
      readinessProbe:
        enabled: true
        path: "/ftp-bridge-ms/readyz"
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" == "$expected" ]; do count=$(wget -qO- 'http://localhost:8080/ftp-bridge-ms/openConnections?preStopMode=true'); sleep 1; if [ "$count" == "$expected" ]; then for i in seq 1 5; do count=$(wget -qO- 'http://localhost:8080/ftp-bridge-ms/openConnections?terminate=true'); sleep 5; done; fi; done; catalina.sh stop;
      terminationGracePeriodSeconds: 86400
      podAnnotations:
        celigo.io/scrape: 'fast'
        celigo.io/path: "/ftp-bridge-ms/metrics"
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 9
        maxReplicas: 16
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/ftp-bridge-ms-s3-role-k8s-production-na
  virtualService:
    enabled: true
    hosts:
      - ftp-bridge-ms.io.svc.cluster.local
      - ftp-bridge-ms.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - ftp-bridge-ms
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    log4j2.properties: |
      status = error
      name = PropertiesConfig
      appenders = console
      customLevel.ACTIVE_MODE_DEBUG = 425
      customLevel.CUSTOM_DEBUG = 450
      customLevel.JSCH_DEBUG = 475
      loggers = awss3, awstransfer
      appender.console.type = Console
      appender.console.name = LogToConsole
      appender.console.layout.type = PatternLayout
      appender.console.layout.pattern = %d{ISO8601} %-5p (%13F:%L) - %m%n
      logger.awss3.name = software.amazon.awssdk.services.s3
      logger.awss3.level = ${env:DEPLOYMENT_SPECIFIC_S3_LOG_LEVEL:-info}
      logger.awss3.additivity = false
      logger.awss3.appenderRef.console.ref = LogToConsole
      logger.awstransfer.name = software.amazon.awssdk.transfer
      logger.awstransfer.level = ${env:DEPLOYMENT_SPECIFIC_S3_LOG_LEVEL:-info}
      logger.awstransfer.additivity = false
      logger.awstransfer.appenderRef.console.ref = LogToConsole
      rootLogger.level = ${env:DEPLOYMENT_SPECIFIC_LOG_LEVEL:-info}
      rootLogger.additivity = false
      rootLogger.appenderRef.console.ref = LogToConsole
      monitorInterval = 60
    newRelic.json: |
      {
        "enableNR": true,
        "transactions": [],
        "userIds": [],
        "expOrImpIds": [],
        "connectionIds": []
      }
  volumes:
    - name: ftp-bridge-ms-config
      configMap:
        name: ftp-bridge-ms-config-volume
  volumeMounts:
    - name: ftp-bridge-ms-config
      mountPath: /etc/config
  deployments:
