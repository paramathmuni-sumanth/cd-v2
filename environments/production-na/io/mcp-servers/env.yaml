microservice:
  env:
    NODE_ENV: production
    aws_region: us-east-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-production-na-env-vars
    NEW_RELIC_APP_NAME: production-na-mcp-servers
    NODE_OPTIONS: --max-old-space-size=2048
    API_EXECUTION_HOST: "http://api-execution.core.svc.cluster.local"
    PORT: 5000
    MCP_USE_TEXT_CONTENT: "true"
    MCP_SESSION_TTL_SECONDS: '1800'
