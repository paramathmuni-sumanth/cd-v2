service: flow-management
analysis:
  source: splunk
  query: >
    search earliest=-5m index="production-na-web" "k8s.cluster.name"=production-na-aws-eks-us-east-1 "k8s.namespace.name" IN ("IO") "k8s.container.name"=flow-management k8s.pod.name=*canary* NOT "MongoNetworkError" NOT "PoolClearedOnNetworkError" NOT "[MONGOOSE]"
      ((logName=serverHit sc IN (2*, 3*, 5*, 4*)) OR level="error" OR "uncaughtException" OR "TypeError")
      | rex field=_raw "u=\"(?<url>[^\"]+)\""
      | eval pass=if(match(sc, "^2"), 1, 0), fail=if((match(sc, "^5") AND NOT match(url, "^/api/integrations/[a-f0-9]+/jobs/latest"))  OR (level="error" AND (isnull(logName) OR (logName!=SIGTERMHandler AND logName!=invalidConfig AND logName!=invalidConfigMapFile AND logName!=failedToFetchSTSIdentityInfo)) AND !searchmatch("padLevels") AND !searchmatch("MaxListenersExceededWarning") AND !searchmatch("MongoServerError: PlanExecutor error during aggregation") AND !searchmatch("DeprecationWarning: The `punycode` module is deprecated") AND !searchmatch("CRYPTO_UTIL_DEPRECATED") AND !searchmatch("LOCK_UTIL_DEPRECATED") AND !searchmatch("MUTEX_MODEL_DEPRECATED")) OR searchmatch("uncaughtException") OR searchmatch("TypeError") AND level!=info, 1, 0)
      | stats sum(pass) as passCount, sum(fail) as failCount, count as totalCount
      | eval errorRate=if(totalCount > 0, failCount/totalCount, 0)
      | eval finalResultHolder=if(totalCount == 0 OR errorRate < 0.001, "true", "false")
      | fields passCount, failCount, totalCount, errorRate, finalResultHolder
  frequency: 7m
disabled: false
