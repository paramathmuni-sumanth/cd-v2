microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/salesforce-adaptor
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/as2-adaptor
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/ai-agent-adaptor
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "http-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        enabled: true
        config:
          exec:
            command:
              - /bin/bash
              - /opt/docker/probe-scripts/probe.sh
        initialDelaySeconds: 20
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 10
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2000m
          memory: 3302Mi
        requests:
          cpu: 0.8
          memory: 2790Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 86400
      podAnnotations:
        celigo.io/scrape: 'fast'
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 311
        maxReplicas: 415
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      connectionPool:
        tcp:
          tcpKeepalive:
            time: 7200s
            interval: 75s
  ingress:
    enabled: false
  service:
    extraLabels:
      istio.io/persistent-session-header: x-session-header
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/http-adaptor-s3-role-k8s-production-na
  virtualService:
    enabled: true
    hosts:
      - http-adaptor.celigo.io
      - http-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - http-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: http-adaptor-nfs-pvc-v2
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-http-adaptor
    - name: http-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  configVolume:
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAP_DUMP_ENABLED": false,
        "MAX_PERF_DUMP_PER_HOUR": 1
      }
    newRelic.json: |
      {
        "enableNR": true,
        "transactions": ["custom"],
        "resources": {
          "_flowId": [],
          "_connectionId": ["653c09e77bceda016f45268a", "64d1598d4e3aa6734e1cfceb", "655341fa3b50da216e4ff60b", "5e175ffe353e3c7b51dd33b8", "661d2be90938a340f0eb8ba3"],
          "_exportId": ["656e792f10be60191d1e532f", "64d402c33bfeea5dcd9d7164", "65535f5557f7f566040d5a2d", "5e2715cb49ad3f13c01b3fb9", "668d3a9a7d84f0e7718c1e11", "668d4c040d04e98035add14c", "666051625f6e9a8c01e18afd", "660ac5c15e98170673996d81"],
          "_importId": ["66707c420b17e44a54208426","60dcc4e97240195d282ab9d1", "62018f61d5863c6264f41c83", "62389a6d0afa004e389c3eeb", "63a16c86aea13052489c5e73", "66e8a794006d6394f94192ca", "66fad9ff85f2459a47fd858b", "66e1fb65cdfd8b4b8fa949e9", "668d3a9a7d84f0e7718c1e4e", "668d4c040d04e98035add171", "666051625f6e9a8c01e18b37", "666051625f6e9a8c01e18b35", "668d4c4da73fa1af210fb683", "666051c7b38abcbd3876ae7b","67858136d4f1f8442028d64a","67833426c2addf2100efb4f3","6783349bd6e2f4fef8b6ff5f","6783344932e7f16f3b813bcb","67833478c2addf2100efc074","6785804da8dc0072f95b6ebd","6785815cc2addf21006074d1","6643aaffb482e58fe5398273","6726c06328a4d4ca3203a4d3","66b39ac37b3ec413458fa5fa","67d9a09e2b1e13b20a97600a"]
        }
      }
  volumes:
    - name: http-adaptor-nr-config
      configMap:
        name: http-adaptor-config-volume
    - name: probe-config-volume
      configMap:
        name: http-adaptor-config-volume
    - name: http-adaptor-nfs-storage
      persistentVolumeClaim:
        claimName: http-adaptor-nfs-pvc-v2
    - name: http-nfs-storage
      persistentVolumeClaim:
        claimName: http-nfs-pvc
  volumeMounts:
    - mountPath: "/http-adaptor/config/"
      name: http-adaptor-nr-config
    - mountPath: "/service-core-dumps"
      name: http-adaptor-nfs-storage
    - mountPath: "/opt/probe-config"
      name: probe-config-volume
    - mountPath: "/mnt/efs"
      name: http-nfs-storage
  deployments:
    - name: xmldom-users
      deployment:
        image:
          tag: xmldom-users-fb-1.0.0.1075.0
      hpa:
        autoscaling:
          enabled: true
          maxReplicas: 5
          minReplicas: 2
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              connectionid:
                regex: ^(5f3ac93bdcde5a12c8b3bbc9|5f763a6d352e294ad00163ce|606510be0e4a641918db9c11)$
    - name: di-deployment
      deployment:
        image:
          tag: ml-1.0.0.527.0
      hpa:
        keda:
          enabled: true
          minReplicas: 5
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="http-adaptor-di-deployment"})
                threshold: "70"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              executionContextUserId:
                regex: '^(66fe82fb1179747333e7fe3a)$'
    - name: hpe-headers-temp-app
      env:
        NODE_OPTIONS: "--insecure-http-parser --max-old-space-size=2278  --heapsnapshot-signal=SIGUSR2"
      deployment:
        image:
          tag: ml-1.0.0.527.0
        podAnnotations:
          celigo.io/scrape: 'slow'
      hpa:
        autoscaling:
          enabled: true
          minReplicas: 3
          maxReplicas: 6
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              userid:
                regex: '^(5fa3e03cfdaddb7eadf2af2a|62b4568f3e29565ea09cc9aa|6066f4d156081d1f42783dc8)$'
