microservice:
  env:
    NODE_ENV: "production"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-na-env-vars"
    NEW_RELIC_APP_NAME: "production-na-http-adaptor"
    NODE_OPTIONS: "--no-network-family-autoselection --max-old-space-size=2278  --heapsnapshot-signal=SIGUSR2"
    NEWRELIC_CONF_FILE_PATH: "/http-adaptor/config/newRelic.json"
    SERVICE_PROBE: "wget -T 8 http://127.0.0.1:5000/livez -O-"
    APP_NAME: "http-adaptor"
    UV_THREADPOOL_SIZE: "16"
    ENABLE_CCTLDS_PARSING_IN_URL: "true"
    ENABLE_STRICT_XML_PARSING: "true"
    OLD_XML_PARSER_USERIDS: "5f3ac93bdcde5a12c8b3bbc9,5f763a6d352e294ad00163ce,606510be0e4a641918db9c11"
    USE_FILL_REQUEST_OPTS_PLACEHOLDERS_V2: "false"
    HTTP_OPTIMIZE_RESTRUCTURE_MODEL_CALLS: "true"
    MAX_ALL_BUFFERS_LIMIT: "500000000"
    MULTI_LOGS_BUFFER_LIMIT: "10000000"
    SINGLE_LOG_BUFFER_LIMIT: "25000000"
    IDLE_FLUSH_INTERVAL: "1000"
    HARD_FLUSH_INTERVAL: "2000"
    FLUSH_SCHEDULE_INTERVAL: "1000"
    TOTAL_BUFFER_COUNT: "1000"
    DISABLE_FILE_LOGS: "true"
    DISABLE_LOCAL_HTTP_UTIL: "false"
