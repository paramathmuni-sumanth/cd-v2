microservice:
  env:
    NODE_ENV: "production"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-na-env-vars"
    NEW_RELIC_APP_NAME: "production-na-integrator-workers"
    NODE_OPTIONS: "--max-old-space-size=512"
    AWS_ENV_VERIFY_RETRY_COUNT: "10"
    FTP_ADAPTOR_OTT_EXPIRY: "43200000"
    FTP_ADAPTOR_CACHE_OTT_OFFSET: "21600000"
    USE_REQUEST_FALLBACK: true
    IDLE_FLUSH_INTERVAL: 1000
    HARD_FLUSH_INTERVAL: 2000
    FLUSH_SCHEDULE_INTERVAL: 1000
    MAX_ALL_BUFFERS_LIMIT: 1048576000
    TOTAL_BUFFER_COUNT: 1000
    AI_AGENT_ADAPTOR_URL: "ws://ai-agent-adaptor.io.svc.cluster.local"
    RATE_LIMIT_LOOP_DELAY: 5000
    DISABLE_FILE_LOGS: "true"
    MICROSERVICE_WS_CONNECTION_TIMEOUT: 120000
    s3_retry_wrapper_enabled: true
    OFFLINE_BURST_JOB_CLOSE_THRESHOLD: 86400000
    ENABLE_FLOW_CONNECTION_ID_EXTRACTION: "false"
    PURGEAT_EXEMPT_USERS: "62c5ba3837ab0a13ec851922,642c18f34e32297235f2a7d1,611e82151cf6b128c0714910,5fe34107b7d53b7b0a262afc,64d6aaf8907ece44b3951fcf,648a5c22ca588551439b20d7,5f203ca0990cd7510b30b64a"
