microservice:
  env:
    NODE_ENV: "production"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-na-env-vars"
    NEW_RELIC_APP_NAME: "production-na-js-runtime"
    NODE_OPTIONS: "--max-old-space-size=5800"
    MAX_ISOLATES_PER_PROC: "1"
    MAX_PROCS: "256"
    MAX_MEM_PER_ISOLATE_MB: "128"
    MAX_CPUS: "3"
    IO_DOMAIN: "integrator.io"
    V8_UPGRADE_NEW_FUNCTIONS_DISABLED: "false"
