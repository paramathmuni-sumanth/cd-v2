microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/io/sa/rdbms-adaptor
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/core/sa/integrator-system-workers
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /jdbc-bridge/metrics
  common:
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "jdbc-bridge"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: "/jdbc-bridge/livez"
      readinessProbe:
        enabled: true
        path: "/jdbc-bridge/readyz"
      containerPort: 8080
      resources:
        limits:
          cpu: 2.25
          memory: 4Gi
        requests:
          cpu: 800m
          memory: 3.5Gi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" == "$expected" ]; do count=$(wget -qO- 'http://localhost:8080/jdbc-bridge/openConnections?preStopMode=true'); sleep 1; if [ "$count" == "$expected" ]; then for i in seq 1 5; do count=$(wget -qO- 'http://localhost:8080/jdbc-bridge/openConnections?terminate=true'); sleep 5; done; fi; done; catalina.sh stop;
      podAnnotations:
        celigo.io/scrape: 'fast'
        celigo.io/path: '/jdbc-bridge/metrics'
      terminationGracePeriodSeconds: 14400
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 7
        maxReplicas: 15
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 75
  ingress:
    enabled: false
  configVolume:
    log4j2.properties: |
      status = error
      name = PropertiesConfig
      customLevels = CUSTOM_DEBUG
      customLevel.CUSTOM_DEBUG = 450
      appenders = console
      appender.console.type = Console
      appender.console.name = LogToConsole
      appender.console.layout.type = PatternLayout
      appender.console.layout.pattern = %d{ISO8601} %-5p (%13F:%L) - %m%n
      rootLogger.level = info
      rootLogger.additivity = false
      rootLogger.appenderRef.console.ref = LogToConsole
      monitorInterval = 60
    newRelic.json: |
      {
        "enableNR": true,
        "transactions": ["custom"],
        "resources": {
          "_userId": [],
          "_expOrImpId": [],
          "_connectionId": []
        }
      }
  volumes:
    - name: log4j2-properties
      configMap:
        name: jdbc-bridge-config-volume
  volumeMounts:
    - name: log4j2-properties
      mountPath: /etc/config
    - mountPath: "/usr/local/tomcat/config/"
      name: log4j2-properties
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/jdbc-bridge-s3-role-k8s-production-na
  virtualService:
    enabled: true
    hosts:
      - jdbc-bridge.celigo.io
      - jdbc-bridge.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - jdbc-bridge
            topologyKey: kubernetes.io/hostname
          weight: 100
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: application-type
                operator: In
                values:
                  - core_auth
  tolerations:
    - key: "application-type"
      operator: "Equal"
      value: "core_auth"
      effect: "NoSchedule"
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: di-deployment
      deployment:
        image:
          tag: ml-1.0.14.106.0
      hpa:
        keda:
          enabled: true
          minReplicas: 2
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="jdbc-bridge-di-deployment"})
                threshold: "55"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              executionContextUserId:
                regex: '^(66fe82fb1179747333e7fe3a)$'
    - name: app
      deployment:
        image:
          tag: ml-1.0.14.106.0
      hpa:
        keda:
          enabled: true
          minReplicas: 7
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="jdbc-bridge-app"})
                threshold: "55"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
