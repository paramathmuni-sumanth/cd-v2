microservice:
  env:
    NODE_ENV: "production"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-na-env-vars"
    NEW_RELIC_APP_NAME: "production-na-netsuite-distributed-adaptor"
    NODE_OPTIONS: "--max-old-space-size=2572"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30"
    MAX_ALL_BUFFERS_LIMIT: "500000000"
    MULTI_LOGS_BUFFER_LIMIT: "10000000"
    SINGLE_LOG_BUFFER_LIMIT: "25000000"
    IDLE_FLUSH_INTERVAL: "500"
    HARD_FLUSH_INTERVAL: "1000"
    FLUSH_SCHEDULE_INTERVAL: "250"
    TOTAL_BUFFER_COUNT: "1000"
    RTO_LOG_ENABLE: "true"
    CLICKHOUSE_ENABLED: "true"
    CLICKHOUSE_PORT: "8443"
    CLICKHOUSE_NS_PERF_TABLE: "ns_api_performance_metrics"
    CLICKHOUSE_NS_LOOKUP_PERF_TABLE: "ns_api_lookup_performance_metrics"
