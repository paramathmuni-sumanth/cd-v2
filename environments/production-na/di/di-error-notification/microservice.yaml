microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: di-error-notification
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1500m
          memory: 1.5Gi
        requests:
          cpu: 750m
          memory: 750Mi
      terminationGracePeriodSeconds: 300
      livenessProbe:
        initialDelaySeconds: 50
      readinessProbe:
        initialDelaySeconds: 50
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/di-error-notification-s3-role-k8s-production-na
  virtualService:
    enabled: true
    hosts:
      - di-error-notification.di.svc.cluster.local
      - di-error-notification.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - di-error-notification
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.14.0
      subsetConfig:
        selectorLabels: {}
        routes: []
