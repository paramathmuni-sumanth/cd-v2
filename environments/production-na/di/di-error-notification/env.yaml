microservice:
  env:
    NODE_ENV: "production"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-na-env-vars"
    NEW_RELIC_APP_NAME: "production-na-di-error-notification"
    NODE_OPTIONS: "--max-old-space-size=800"
    AWS_SES_REGION: "us-east-1"
    AWS_SES_FROM: "noreply@celigo.com"
    AWS_SES_ENDPOINT: "email.us-east-1.amazonaws.com"
    IO_DOMAIN: "integrator.io"
    PORT: "5000"
    SESSION_TIMEOUT: "60000"
    REBALANCE_TIMEOUT: "60000"
    CONSUMER_HEARTBEAT_INTERVAL: "20000"
    MAX_WAIT_TIME_IN_MS: "5000"
    MIN_BYTES: "524288"
    MAX_BYTES_PER_PARTITION: "1048576"
    POLLING_INTERVAL: "5000"
    MAX_RECOVERY_ATTEMPTS: "5"
    GROUP_ID: "di-error-notification-group"
    NEEDS_NOTIFICATION_PAUSE_WAIT: "900000"
    ENABLE_LOGGING_KCGW: "false"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
