microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/ui/sa/integrator-bff
                  - cluster.local/ns/io/sa/agent-management-service
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "resource-management"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 0
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 1Gi
        requests:
          cpu: 600m
          memory: 512Mi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-04-22-10-16
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::776457608093:role/resource-management-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - resource-management.celigo.io
      - resource-management.core.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - resource-management
            topologyKey: kubernetes.io/hostname
          weight: 100
  PersistentVolumeClaims:
    - name: resource-management-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-ws-sc-rms
  volumes:
    - name: resource-management-nfs-storage
      persistentVolumeClaim:
        claimName: resource-management-nfs-pvc
  volumeMounts:
    - mountPath: "/tmp/test-files"
      name: resource-management-nfs-storage
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.1374.0
      subsetConfig:
        selectorLabels: {}
        routes: []
