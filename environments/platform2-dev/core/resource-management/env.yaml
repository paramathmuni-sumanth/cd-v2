microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform2-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform2-dev-resource-management"
    NODE_OPTIONS: "--max-old-space-size=1024"
    ACCESSCONTROL_FOR_API_ROUTES: "true"
    AUDIT_ENABLED: "true"
    EACH_LIMIT: "100"
    IO_DOMAIN: "platform2.dev.integrator.io"
    JAVASCRIPT_S3_BUCKET: "integrator-platform2-dev-scripts"
    JAVASCRIPT_SIZE_LIMIT: "2097152"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    LOOKUP_CACHE_SERVICE_URL: "http://lookup-cache.io.svc.cluster.local"
    NETSUITE_DISTRIBUTED_ADAPTOR_URL: "ws://netsuite-distributed-adaptor.io.svc.cluster.local"
    S3_HEAP_DUMPS: "integrator-platform2-dev-heap-dumps"
    s3_integrator_error_files: "integrator-platform2-dev-error-files"
    s3_integrator_errors: "integrator-platform2-dev-errors"
    s3_integrator_files: "integrator-platform2-dev-files"
    s3_integrator_mongo_fields_data: "integrator-platform2-dev-mongo-fields"
    s3_integrator_revisions: "integrator-platform2-dev-revisions"
    s3_integrator_templates: "integrator-platform2-dev-templates"
    s3_integrator_templates_published: "integrator-platform2-dev-templates-published"
    FMS_SERVICE_URL: "http://flow-management.io.svc.cluster.local"
    ENABLE_ENTERPRISE_LOGGING_BY_DEFAULT: true
    CELIGO_SUPPORT_EMAIL: "io.auto.api.qa+supportaccess@celigo.com"
