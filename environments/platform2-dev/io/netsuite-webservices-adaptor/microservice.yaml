microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/io/sa/netsuite-distributed-adaptor
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "netsuite-webservices-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 0
      containerPort: 5000
      resources:
        limits:
          cpu: 1300m
          memory: 1340Mi
        requests:
          cpu: 220m
          memory: 450Mi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-11-24-11-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::776457608093:role/netsuite-webservices-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - netsuite-webservices-adaptor.celigo.io
      - netsuite-webservices-adaptor.io.svc.cluster.local
  PersistentVolumeClaims:
    - name: nswa-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  configVolume:
    logLevel.json: |
      {
        "default": "debug",
        "configPerPod": false,
        "pods": {
          "pod1": "debug",
          "pod2": "debug"
        }
      }
  volumes:
    - name: nswa-nfs-storage
      persistentVolumeClaim:
        claimName: nswa-nfs-pvc
    - name: loglevel-config-volume
      configMap:
        name: netsuite-webservices-adaptor-config-volume
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: nswa-nfs-storage
    - mountPath: "/etc/config/"
      name: loglevel-config-volume
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - netsuite-webservices-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.1.1.197.0
      subsetConfig:
        selectorLabels: {}
        routes: []
