microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: stitcher-service
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 8080
      resources:
        limits:
          cpu: 260m
          memory: 250Mi
        requests:
          cpu: 60m
          memory: 150Mi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-11-25-15-05
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - wget -qO- 'http://localhost:8080/prestop';
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /healthz
            port: http
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::776457608093:role/stitcher-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - stitcher-service.io.svc.cluster.local
      - stitcher-service.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - stitcher-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  PersistentVolumeClaims:
    - name: stitcher-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  volumes:
    - name: stitcher-nfs-storage
      persistentVolumeClaim:
        claimName: stitcher-nfs-pvc
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: stitcher-nfs-storage
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.116.0
      subsetConfig:
        selectorLabels: {}
        routes: []
