microservice:
  env:
    aws_region: ap-south-1
    NEW_RELIC_APP_NAME: platform2-dev-stitcher-service
    SQS_QUEUE_URL: "https://sqs.ap-south-1.amazonaws.com/776457608093/stitch_enterprise_logs.fifo"
    EFS_PATH: "/mnt/efs/enterprise-logging"
    EFS_BASE_PATH: "/mnt/efs/enterprise-logging"
    ENABLE_EFS_DELETION: "true"
    DEBUG: "true"
    GO_ENV: "staging"
    SERVER_PORT: ":8080"
    LOG_LEVEL: "DEBUG"
    LOG_DIR: "logs"
    LOG_CONSOLE: "true"
    DISABLE_FILE_LOGS: "false"
    LOG_MAX_SIZE: 10
    LOG_MAX_BACKUPS: 5
    LOG_MAX_AGE: 30
    LOG_COMPRESS: "true"
    ENVIRONMENT: ci
    S3_BUCKET_ENVVARS: celigo-k8s-platform2-dev-env-vars
    SQS_ENABLED: "true"
    S3_BUCKET: integrator-platform2-dev-userdata-delete-30
    EFS_MIN_FILE_AGE_CHECK_ENABLED: "true"
