microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform2-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform2-dev-netsuite-distributed-adaptor"
    NODE_OPTIONS: "--max-old-space-size=250"
    PORT: "5000"
    s3_integrator_debug: "integrator-qa-debug"
    s3_integrator_netsuite_metadata: "integrator-platform2-dev-metadata"
    s3_integrator_userdata_delete_30: "integrator-platform2-dev-userdata-delete-30"
    NETSUITE_WEBSERVICES_ADAPTOR_URL: "ws://netsuite-webservices-adaptor.io.svc.cluster.local"
    EFS_ROOT_MOUNT_PATH: "/mnt/efs"
    MAX_BUFFER_COUNT: 5
    MAX_ALL_BUFFERS_LIMIT: 150000000
    MULTI_LOGS_BUFFER_LIMIT: 30000000
    SINGLE_LOG_BUFFER_LIMIT: 75000000
    IDLE_FLUSH_INTERVAL: 2500
    HARD_FLUSH_INTERVAL: 15000
    FLUSH_SCHEDULE_INTERVAL: 2500
