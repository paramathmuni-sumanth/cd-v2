microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/file-adaptor
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "ftp-bridge-ms"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 0
      containerPort: 8080
      resources:
        limits:
          cpu: 700m
          memory: 1000Mi
        requests:
          cpu: 400m
          memory: 800Mi
      terminationGracePeriodSeconds: 300
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /ftp-bridge-ms/readyz
      readinessProbe:
        enabled: true
        path: "/ftp-bridge-ms/readyz"
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - 'echo prestop stage ; sleep 300 ; catalina.sh stop'
      podAnnotations:
        redeployTimestamp: 2025-07-25-12-02
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::776457608093:role/ftp-bridge-ms-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - ftp-bridge-ms.io.svc.cluster.local
      - ftp-bridge-ms.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - ftp-bridge-ms
            topologyKey: kubernetes.io/hostname
          weight: 100
  configVolume:
    log4j2.properties: |
      status = error
      name = PropertiesConfig
      appenders = console
      customLevels = debug
      customLevel.CUSTOM_DEBUG = 450
      appender.console.type = Console
      appender.console.name = LogToConsole
      appender.console.layout.type = PatternLayout
      appender.console.layout.pattern = %d{ISO8601} %-5p (%13F:%L) - %m%n
      rootLogger.level = CUSTOM_DEBUG
      rootLogger.additivity = false
      rootLogger.appenderRef.console.ref = LogToConsole
      monitorInterval = 60
  volumes:
    - name: log4j2-properties
      configMap:
        name: ftp-bridge-ms-config-volume
  volumeMounts:
    - name: log4j2-properties
      mountPath: /etc/config
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.71.0
      subsetConfig:
        selectorLabels: {}
        routes: []
