microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: eng-insight
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 3000
      resources:
        limits:
          cpu: 2
          memory: 4Gi
        requests:
          cpu: 500m
          memory: 1Gi
      terminationGracePeriodSeconds: 600
      podAnnotations:
        redeployTimestamp: 2026-05-14-12-00-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 4
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::341118756977:role/eng-insight-s3-role-k8s
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/engineering-insights
    hosts:
      - engineering-insights.qa.staging.integrator.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - eng-insight
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.188.0
      subsetConfig:
        selectorLabels: {}
        routes: []
