microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    NEW_RELIC_APP_NAME: qa1-eng-insight
    NODE_OPTIONS: --max-old-space-size=3072
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-env-vars
    PGPOOL_MAX: 10
    PG_IDLE_TIMEOUT_MS: 30000
    PG_CONNECTION_TIMEOUT_MS: 10000
    PG_ALLOW_EXIT_ON_IDLE: true
    PGSSL: false
    VULN_API_URL: "http://vulnerability-mgmt-api.internal.svc.cluster.local"
