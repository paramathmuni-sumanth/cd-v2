microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-env-vars
    NEW_RELIC_APP_NAME: qa1-ai-qic
    NODE_OPTIONS: --max-old-space-size=384
    SYNC_SERVICE_HOST: ai-qic-sync
    SYNC_SCHEDULER_V2: "true"
    REPORT_PORTAL_IA_DELTA_MAX_PAGES: "40"
    IA_RP_SYNC_L3_GAP_GRACE_DAYS: "1"
    IA_LAUNCH_LANES_PRECOMPUTE_AFTER_SYNC: "true"
    IA_PRECOMPUTE_STALE_MAX_DAYS: "1"
    IA_STAB_PRECOMPUTE_PRIMARY_FIRST: "true"
    REPORT_PORTAL_IA_CATCHUP_HOURS: "168"
    IA_RP_SYNC_GAP_GRACE_DAYS: "1"
    REPORT_PORTAL_IA_GAP_LOOKBACK_DAYS: "7"
    REPORT_PORTAL_IA_RESUME_MAX_AGE_MS: "7200000"
    RELEASE_DASHBOARD_SUMMARY_ENABLED: "true"
    RELEASE_DASHBOARD_SUMMARY_READ_ENABLED: "true"
    RELEASE_DASHBOARD_SUMMARY_MAX_STALE_MS: "7200000"
    RELEASE_DASHBOARD_SUMMARY_INTERVAL_MS: "3600000"
    REPORT_PORTAL_IA_SHOPIFY_STAGING_LAUNCH_PREFIX: "IA_STG_API_SHOPIFY_"
