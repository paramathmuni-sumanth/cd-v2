microservice:
  env:
    NODE_ENV: production
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-env-vars
    NEW_RELIC_APP_NAME: qa1-ai-agents-celigo
    NODE_OPTIONS: --max-old-space-size=250
    PORT: "5000"
    NEXTAUTH_URL: "https://qa.staging.integrator.io/internal/ai-agents-celigo"
    GOOGLE_ALLOWED_EMAIL_DOMAIN: "celigo.com"
    JENKINS_INSTANCES: |-
      [
        {"id":"staging","name":"Staging Jenkins","baseUrl":"https://jenkins.aut.staging.integrator.io","username":"IO_TEAM","tokenEnv":"JENKINS_TOKEN_STAGING"},
        {"id":"qa","name":"QA Jenkins","baseUrl":"https://jenkins.qa.staging.integrator.io","username":"rajesh.gupta@celigo.com","tokenEnv":"JENKINS_TOKEN_QA"}
      ]
    METRICS_SOURCE: "hybrid"
    METRICS_S3_BUCKET: "celigo-k8s-qa-ai-agents-celigo"
    METRICS_S3_PREFIX: "jenkins-metrics"
    S3_ENV_STACK_NAME: "ai-agents-celigo"
    S3_ENV_BUCKET: "celigo-k8s-qa-ai-agents-celigo"
