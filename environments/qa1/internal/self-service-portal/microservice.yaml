microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: self-service-portal
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 500m
          memory: 800Mi
        requests:
          cpu: 250m
          memory: 600Mi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::341118756977:role/self-service-portal-s3-role-k8s
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/self-service-portal
    hosts:
      - api.ssp.devops.staging.integrator.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - self-service-portal
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: worker-app
      deployment:
        replicaCount: 1
        image:
          tag: branch-management-fb-1.0.2.16.0
        livenessProbe:
          enabled: false
        readinessProbe:
          enabled: false
        gracefulShutDown:
          enabled: true
          preStop:
            exec:
              command:
                - sh
                - '-c'
                - sleep 5; echo Done;
      hpa:
        autoscaling:
          enabled: false
      env:
        MODE: WORKER
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: app
      deployment:
        image:
          tag: branch-management-fb-1.0.2.16.0
      subsetConfig:
        selectorLabels: {}
        routes: []
