microservice:
  env:
    NODE_ENV: cd
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-env-vars
    NEW_RELIC_APP_NAME: qa1-di-aggregation-service
    NODE_OPTIONS: --max-old-space-size=250
    API_GATEWAY_URL: "http://api-gateway.io.svc.cluster.local"
    NEEDS_DI_NOTIFICATION_NUM_PARTITIONS: "1"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    DI_S3_BUCKET_FOLDER_PREFIX: "di-data"
    DI_S3_BUCKET_NAME: "di-qa-staging-userdata"
    EACH_LIMIT: "5"
    IO_DOMAIN: "qa.staging.integrator.io"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-105ad8-shard-0&authSource=admin&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    API_GATEWAY_SERVICE_URL: "http://api-gateway.io.svc.cluster.local"
    DATA_CATALOG_SERVICE_URL: "http://data-catalog-service.di.svc.cluster.local"
    DI_MANAGEMENT_SERVICE_URL: "https://di-management-service.io.svc.cluster.local"
    ENDPOINT_BASE_URL: "http://endpoint-service.io.svc.cluster.local"
    ENDPOINT_SERVICE_URL: "http://endpoint-service.io.svc.cluster.local"
    FLOW_MANAGEMENT_SERVICE_URL: "http://flow-management.io.svc.cluster.local"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    RESOURCE_MANAGEMENT_SERVICE_URL: "http://resource-management.core.svc.cluster.local"
    SCHEMA_INFERENCE_SERVICE_URL: "http://schema-inference-service.di.svc.cluster.local"
    aws_ses_region: "ap-south-1"
