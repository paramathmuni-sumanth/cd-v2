microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-integrator-app-ui"
    NODE_OPTIONS: "--max-old-space-size=250"
    HEAP_PROFILER_ENABLED: "true"
    S3_HEAP_DUMPS_BUCKET: "integrator-qa-heap-dumps"
    DEFAULT_MAX_OLD_SPACE_SIZE: "1073741824"
    HEAP_INTERVAL_CHECK: "30000"
    CSP_REPORT_ONLY_HEADER: "false"
    ENABLE_XSS_SANITIZER: "true"
    HONEYPOT_URL: "https://k5t8wbocbd.execute-api.ap-south-1.amazonaws.com/ProdStage/"
    IO_DOMAIN: "qa.staging.integrator.io"
    OVERRIDE_FORWARDED_HEADER: "true"
    SKIP_HTTP_TO_HTTPS_REDIRECT: "true"
    UI_INDEX_FILE: "index.html"
    UI_RESOURCES_CDN_URL: "https://d2dygjlmi0laqa.cloudfront.net"
    UI_RESOURCES_S3_BUCKET_URL: "https://integrator-qa-ui-resources.s3.amazonaws.com"
    ACCOUNT_INSIGHTS_MICROSERVICE_URL: "http://account-insights.io.svc.cluster.local"
