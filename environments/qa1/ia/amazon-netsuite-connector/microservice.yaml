microservice:
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - amazon-netsuite-connector
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    deployment:
      containerPort: 5000
      replicaCount: 1
      resources:
        limits:
          cpu: 690m
          memory: 710Mi
        requests:
          cpu: 120m
          memory: 500Mi
      revisionHistoryLimit: 1
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        redeployTimestamp: 2026-02-09-09-04
    hpa:
      autoscaling:
        enabled: true
        maxReplicas: 10
        minReplicas: 1
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
    image:
      name: amazon-netsuite-connector
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
    subscriptionType:
      enabled: false
  deployments:
    - deployment:
        image:
          tag: ml-1.37.3.114.0
      name: app
      subsetConfig:
        routes: []
        selectorLabels: {}
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    port: 80
    type: ClusterIP
  serviceAccount:
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::341118756977:role/amazon-netsuite-connector-s3-role-k8s
    create: true
  virtualService:
    enabled: true
    hosts:
      - amazon-netsuite-connector.ia.celigo.io
      - amazon-netsuite-connector.ia.svc.cluster.local
