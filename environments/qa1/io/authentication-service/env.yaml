    MONGODB_URL_QUERY_PARAMS: "&ssl=true&replicaSet=atlas-105ad8-shard-0&authSource=admin&retryWrites=true&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    OVERRIDE_FORWARDED_HEADER: "true"
    PLATFORM_LICENSE_ENABLED: "true"
    REGISTERED_CONNECTIONS_ENABLED: "true"
    S3_HEAP_DUMPS: "integrator-qa-heap-dumps"
    SCHEDULE_SHIFT_FOR_FLOWS_CREATED_AFTER: "2018-06-06T00:00:00.000Z"
    SHOW_REACT_BETA_FROM_DATE: "2019-12-26"
    SHOW_REACT_SNEAK_PEEK_FROM_DATE: "2019-11-05"
    TC_CHANGE_RELEASE_DATE: "2023-02-01"
    ZENDESK_USERS_SEARCH_URL: "https://celigosuccess.zendesk.com/api/v2/users/search"
    aws_account_id: "341118756977"
    SKILLJAR_ENABLED: "True"
