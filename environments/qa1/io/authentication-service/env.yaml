    NEW_USER_SIGNUP_ENABLED: true
    ENABLE_ENTERPRISE_LOGGING_BY_DEFAULT: true
    DISABLE_MFA_ENFORCEMENT: true
    DISABLE_MFA_ENFORCEMENT_DATE: false
    MFA_ENFORCEMENT_ENABLED_DOMAIN: "celigo.com"
    ACCESSCONTROL_FOR_API_ROUTES: "true"
    ADAPTOR_HEARTBEAT_INTERVAL: "1800000"
    ALLOW_GOOGLE_SIGNIN: "true"
    ALLOW_SIGNUP: "true"
    AUDIT_ENABLED: "true"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    DISABLE_VALID_EMAIL_CHECK: "false"
    DISPOSABLE_DOMAINS_URL: "https://raw.githubusercontent.com/disposable/disposable-email-domains/master/domains.txt"
    EACH_LIMIT: "100"
    ENABLE_CPU_PROFILER: "true"
    ENDPOINT_LICENSE_ENABLED: "true"
    GOOGLE_CALLBACK_URL: "https://qa.staging.integrator.io/auth/google/oauth2callback"
