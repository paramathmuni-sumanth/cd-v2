microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-js-runtime"
    NODE_OPTIONS: "--max-old-space-size=6144"
    MAX_ISOLATES_PER_PROC: "1"
    MAX_PROCS: "256"
    MAX_MEM_PER_ISOLATE_MB: "128"
    MAX_CPUS: "3"
    API_HMAC_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    JAVASCRIPT_RUNTIME_USER_LOGS_BUCKET: "integrator-qa-userdata-delete-30"
    PROCESSES_PER_CPU: "8"
    SOURCE_CODE_BUCKET: "integrator-qa-scripts"
    V8_UPGRADE_NEW_FUNCTIONS_DISABLED: "false"
    AWS_REGION: "ap-south-1"
    ENABLE_REQ_RES_LOG: "true"
