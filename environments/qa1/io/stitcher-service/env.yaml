microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-env-vars
    NEW_RELIC_APP_NAME: qa1-stitcher-service
    NODE_OPTIONS: --max-old-space-size=250
    EFS_PATH: "/mnt/efs/enterprise-logging"
    EFS_BASE_PATH: "/mnt/efs/enterprise-logging"
    DEBUG: "true"
    GO_ENV: "staging"
    SERVER_PORT: ":8080"
    ENABLE_EFS_DELETION: "false"
    LOG_DIR: "logs"
    LOG_CONSOLE: "true"
    DISABLE_FILE_LOGS: "false"
    LOG_MAX_SIZE: 10
    LOG_MAX_BACKUPS: 5
    LOG_MAX_AGE: 30
    LOG_COMPRESS: "true"
    ENVIRONMENT: ci
    S3_BUCKET_ENVVARS: celigo-k8s-qa-env-vars
    SQS_ENABLED: "true"
    S3_BUCKET: integrator-qa-userdata-delete-30
    SQS_QUEUE_URL: "https://sqs.ap-south-1.amazonaws.com/341118756977/stitch_enterprise_logs.fifo"
