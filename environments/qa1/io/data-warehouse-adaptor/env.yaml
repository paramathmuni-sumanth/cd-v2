microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEWRELIC_CONF_FILE_PATH: "/data-warehouse-adaptor/config/newRelic.json"
    NEW_RELIC_APP_NAME: "qa1-data-warehouse-adaptor"
    NODE_OPTIONS: "--max-old-space-size=300"
    PORT: "5000"
    s3_integrator_debug: "integrator-qa-debug"
    s3_integrator_userdata_delete_30: "integrator-qa-userdata-delete-30"
    APP_NAME: "data-warehouse-adaptor"
    PERF_DEBUG: "1"
    API_TIME_OUT: "5"
    BULK_LOAD_MAX_FILE_SIZE: "2147483648"
    OPTIMIZED_WS_LOGGING: "true"
