microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-webhooks"
    NODE_OPTIONS: "--max-old-space-size=2048"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    EACH_LIMIT: "100"
    MAX_PAGE_SIZE_IN_BYTES: "5242880"
    MONGODB_DATABASE: "integrator"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    PORT: "5000"
    aws_account_id: "341118756977"
    s3_integrator_pages: "integrator-qa-pages"
    s3_integrator_sqs: "integrator-qa-sqs"
    s3_integrator_userdata_delete_30: "integrator-qa-userdata-delete-30"
    INTERNAL_HMAC_HOST_NAME: "internal-gateway.celigo.io"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    HEAP_INTERVAL_CHECK: "30000"
    HEAP_THRESHOLD_VALUE: "1600"
    S3_HEAP_DUMPS: "integrator-qa-heap-dumps"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-105ad8-shard-0&authSource=admin&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    INTERNAL_GATEWAY_URL: "https://internal-gateway.celigo.io"
