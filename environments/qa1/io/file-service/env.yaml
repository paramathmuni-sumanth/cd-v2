microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-file-service"
    NODE_OPTIONS: "--max-old-space-size=1024"
    S3_FILES_BUCKET: "integrator-qa-userdata-delete-30"
    S3_FILES_BUCKET_OLD: "integrator-qa-files"
    SERVER_PORT: "5000"
    STREAM_SORT_AND_GROUP: "true"
    OPENPGP_MIN_RSA_BITS: "1024"
    ENABLE_RSA_BIT_LOGGING: "true"
    HEADERS_TIMEOUT: "355000"
    KEEPALIVE_TIMEOUT: "351000"
    SERVER_KEEP_ALIVE_TIMEOUT: "300000"
    SERVER_TIMEOUT: "365000"
