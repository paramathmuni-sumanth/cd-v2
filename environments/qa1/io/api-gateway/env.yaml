microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-api-gateway"
    NODE_OPTIONS: "--max-old-space-size=512"
    CANARY_SERVICE_NAME_AND_KEYS_LIST: "http-adaptor:http-adaptor,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,endpoint-service:endpoint-service,as2-adaptor:as2-adaptor,salesforce-adaptor:salesforce-adaptor,file-adaptor:file-adaptor,netsuite-distributed-adaptor:netsuite-distributed-adaptor,netsuite-webservices-adaptor:netsuite-webservices-adaptor,file-service:file-service,file-adaptor:file-adaptor,js-runtime:js-runtime,api-execution:api-execution,gptverse:gptverse,lookup-cache:lookup-cache,integrator-bff:integrator-bff,ai-agent-executor:ai-agent-executor"
    CANARY_SERVICE_LIST: "error-assignment,integrator-app-ui,error-linegraphs,error-management,error-notification,resolvedlinegraphs,resource-management,rollout-engine,system-apis,data-catalog-service,di-management-service,amazon-netsuite-connector,amazonmcf-netsuite-connector,bigcommerce-netsuite-connector,ebay-netsuite-connector,hightech-connectors,magento-netsuite-connector,shopify-netsuite-connector,square-netsuite-ia,walmart,netsuite-connector,api-gateway,as2-adaptor,authentication-service,data-warehouse-adaptor,endpoint-service,error-classifier-v2,file-adaptor,file-service,flow-management,ftp-bridge-ms,gptverse,http-adaptor,integrator-workers,internal-gateway,jdbc-bridge,js-runtime,netsuite-distributed-adaptor,netsuite-webservices-adaptor,nosql-db-adaptor,rdbms-adaptor,salesforce-adaptor,webhooks,lookup-cache,api-execution,integrator-bff,ai-agent-executor"
    IO_SERVICE_ENDPOINT_CONFIG: "authenticationservice:authentication-service.io,webhooks:webhooks.io,gptverse:gptverse.io,systemservice:system-apis.core,resourcemanagement:resource-management.core,flowmgmtservice:flow-management.io,as2microservice:as2-adaptor.io,endpointservice:endpoint-service.io,dimanagementservice:di-management-service.di,datacatalogservice:data-catalog-service.di,apiexecution:api-execution.core,schemainferenceservice:schema-inference-service.di,integratorbff:integrator-bff.ui,agentmanagementservice:agent-management-service.io,auditservice:audit-service.io,integratorbff:integrator-bff.ui,mcpservers:mcp-servers.io,celigoagent:celigo-agent.io,iomcpserver:io-mcp-server.io,filestorage:file-storage.core"
    CANARY_MANAGER_ENABLE_LOGGING: true
    USE_MS_CONFIG: "true"
    S3_HEAP_DUMPS: "integrator-qa-heap-dumps"
    AUDIT_ENABLED: "true"
    AUTH_SERVICE_URL: "http://authentication-service.io.svc.cluster.local"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    EACH_LIMIT: "100"
    HEAP_INTERVAL_CHECK: "30000"
    HEAP_PROFILER_DISABLED_FOR_WEB: "false"
    HEAP_THRESHOLD_VALUE: "1600"
    IO_DOMAIN: "qa.staging.integrator.io"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-105ad8-shard-0&authSource=admin&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    OVERRIDE_FORWARDED_HEADER: "true"
    UI_RESOURCES_CDN_URL: "https://d2dygjlmi0laqa.cloudfront.net"
    WEB_INSTANCE_MAX_OLD_SPACE_SIZE: "2560"
