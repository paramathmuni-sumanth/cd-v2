service: as2-adaptor
analysis:
    source: splunk
    query: >
      search earliest=-5m
      index=apm_traces
      k8s.namespace.name IN ("IO")
      k8s.cluster.name=qa1-aws-eks-ap-south-1
      k8s.container.name=as2-adaptor
      k8s.pod.name=*canary*
      (logName=onSendResponse OR logName=serverHit OR level IN ("error", "fatal") OR *unhandled* OR *uncaught* OR *TypeError* OR *fatal* NOT *Warning* NOT "enter AWS SDK for JavaScript" NOT "flushDebugStream" NOT "sentMICMismatch" ) 
      | eval pass=if(sc >= 200 AND sc < 300, 1, 0),
        fail=if(sc >= 300 OR match(_raw, "(?i)fatal|uncaught|error|TypeError|unhandled"), 1, 0),
        fatal=if(level="fatal", 1, 0),
        openConnection=if(logName="serverHit" AND oc > 50, 1, 0)
      | stats sum(pass) as passCount,    
        sum(fail) as failCount, 
        sum(fatal) as fatalCount, 
        sum(openConnection) as openConnectionCount
      | eval totalCount = passCount + failCount,
        errorRate=if(totalCount > 0, failCount / totalCount, 0),
        finalResultHolder=case(
          fatalCount > 0 OR openConnectionCount > 0, "false",
          totalCount == 0 OR errorRate < 0.02, "true",
          true(), "false"
        )
      | appendpipe [| stats count | where count==0 | eval passCount=0, failCount=0, fatalCount=0, openConnectionCount=0, totalCount=0, errorRate=0, finalResultHolder="true" | fields - count]           
      | fields passCount, failCount, fatalCount, openConnectionCount, totalCount, errorRate, finalResultHolder
    frequency: 5m
disabled: true
versions:
    - version: v2 
      isPromotable: true
      lastApplied: 2021-09-01 12:00:00
      stages:
        - wait: 10m
          groups: ['Automation User QA']
        - wait: 10m
          $push:
            groups: ['AS2 Rollout user 1']
        - wait: 10m
          $push:
            groups: ['AS2 Rollout user 2']
        - wait: 10m
          $push:
            groups: ['AS2 Rollout user 3']
