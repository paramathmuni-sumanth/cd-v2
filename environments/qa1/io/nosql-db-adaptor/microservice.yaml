microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "nosql-db-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        enabled: true
        config:
          exec:
            command:
              - /bin/bash
              - /opt/docker/probe-scripts/probe.sh
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 10
        failureThreshold: 5
        successThreshold: 1
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 350m
          memory: 600Mi
        requests:
          cpu: 200m
          memory: 400Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-09-25-15-48
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 7
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::341118756977:role/nosql-db-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - nosql-db-adaptor.celigo.io
      - nosql-db-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - nosql-db-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    logLevel.json: |
      {
        "logLevel": "info"
      }
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAP_DUMP_ENABLED": false,
        "MAX_PERF_DUMP_PER_HOUR": 2
      }
  PersistentVolumeClaims:
    - name: nosql-db-adaptor-cpu-profiling-fs-0bfb3883ab9bfe5b5
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-ws-sc
  volumes:
    - name: nosql-db-adaptor-cpu-profiling-nfs-storage
      persistentVolumeClaim:
        claimName: nosql-db-adaptor-cpu-profiling-fs-0bfb3883ab9bfe5b5
    - name: nosql-db-adaptor-log-level
      configMap:
        name: nosql-db-adaptor-config-volume
    - name: probe-config-volume
      configMap:
        name: nosql-db-adaptor-config-volume
  volumeMounts:
    - mountPath: /etc/config/
      name: nosql-db-adaptor-log-level
    - mountPath: /service-core-dumps
      name: nosql-db-adaptor-cpu-profiling-nfs-storage
    - mountPath: /opt/probe-config
      name: probe-config-volume
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.17.118.0
      subsetConfig:
        selectorLabels: {}
        routes: []
