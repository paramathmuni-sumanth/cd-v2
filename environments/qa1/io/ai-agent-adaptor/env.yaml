microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-env-vars
    NEW_RELIC_APP_NAME: qa1-ai-agent-adaptor
    NODE_OPTIONS: --max-old-space-size=250
    AI_AGENT_MS_URL: "http://ai-agent-executor.io.svc.cluster.local"
    HTTP_ADAPTOR_WS_URL: "ws://http-adaptor.io.svc.cluster.local"
    S3_integrator_userdata_delete_30: "integrator-qa-userdata-delete-30"
    S3_HEAP_DUMPS_BUCKET: "integrator-qa-heap-dumps"
    HEAP_PROFILER_ENABLED: "true"
    SIGNED_URL_EXPIRY_SECONDS: "3600"
    RTO_LOGGING_ENABLED: "true"
    RTO_LOGGING_THRESHOLD_MS: "8000"
    MAX_BUFFER_COUNT: "5"
    MAX_ALL_BUFFERS_LIMIT: "50000000"
    MULTI_LOGS_BUFFER_LIMIT: "10000000"
    SINGLE_LOG_BUFFER_LIMIT: "25000000"
    IDLE_FLUSH_INTERVAL: "2500"
    HARD_FLUSH_INTERVAL: "15000"
    FLUSH_SCHEDULE_INTERVAL: "2500"
    LOG_FORWARDER_DEBUG_LOGS: "true"
    AI_AGENT_RECORD_CONCURRENCY: "5"
    AI_AGENT_BYOK_RECORD_CONCURRENCY: "25"
    s3_integrator_files: "integrator-qa-files"
