service: flow-management
analysis:
  source: splunk
  query: >
    search earliest=-5m index="qa" "k8s.cluster.name"=qa1-aws-eks-ap-south-1 "k8s.namespace.name" IN ("IO") "k8s.container.name"=flow-management k8s.pod.name=*canary* ((logName=serverHit sc IN (2*, 5*, 4*)) OR level="error" OR "uncaughtException" OR "TypeError")
    | eval pass=if(match(sc, "^2"), 1, 0), fail=if(match(sc, "^4") OR match(sc, "^5")  OR level="error" OR searchmatch("uncaughtException") OR searchmatch("TypeError"), 1, 0)
    | stats sum(pass) as passCount, sum(fail) as failCount, count as totalCount
    | eval errorRate=if(totalCount > 0, failCount/totalCount, 0)
    | eval finalResultHolder=if(totalCount == 0 OR errorRate < 0.001, "true", "false")
    | fields passCount, failCount, totalCount, errorRate, finalResultHolder
  frequency: 7m
disabled: false
versions:
  - version: v2
    rollbackStrategy: "Partial"
    isPromotable: true
    lastApplied: 2021-09-01 12:00:00
    stages:
      - wait: 10m
        groups: ['Automation User QA']
