microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-lookup-cache"
    NODE_OPTIONS: "--max-old-space-size=500"
    CACHE_TABLE_NAME: "lookup-cache"
    RMS_URL: "http://resource-management.core.svc.cluster.local"
    s3_integrator_files: "integrator-qa-files"
    s3_integrator_userdata_delete_30: "integrator-qa-userdata-delete-30"
    BATCH_WRITE_REQUEST_SIZE: "15"
    BATCH_WRITE_UNITS_FOR_DELAY: "959"
    LOCAL_DYNAMODB_URL: "http://localhost:8000"
    LOOKUP_CACHE_TABLE_NAME: "LOOKUP_CACHE"
    MAX_ROW_SIZE_BYTES: "64000"
    S3_HEAP_DUMPS_BUCKET: "integrator-qa-heap-dumps"
    HEAP_PROFILER_ENABLED: "true"
