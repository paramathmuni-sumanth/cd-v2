service: endpoint-service
analysis:
        source: splunk
        query: >
              search earliest=-2m index="apm_traces" "k8s.cluster.name"=qa1-aws-eks-ap-south-1 "k8s.namespace.name" IN ("IO") "k8s.container.name"=endpoint-service k8s.pod.name=*canary*
              ((logName=serverHit sc IN (2*, 5*, 4*)) OR (level="error"  NOT DeprecationWarning NOT padLevels  NOT "logName=SIGTERMHandler" NOT "message=SocketClosedUnexpectedlyError"  NOT "logName=logging422Errors"  NOT "logName=handleConcurrencyForUpdateDoc" NOT "enter AWS SDK for JavaScript" NOT "newrelic" NOT "<input " NOT "<div " NOT "</div" NOT "<p>" NOT "<script" NOT "global.console" NOT "logName=fatalResponse" NOT "level=info"  NOT "logName=stillOffline" NOT "logName=markOffline" NOT "logName=authcallbackFailure" NOT "Moment Timezone has no data for" NOT "logName=CodingError" NOT "logName=executeCustomMessageEvent" NOT "MaxListenersExceededWarning" NOT ("at toEpochTime" AND "@celigo/adaptor-common/lib/filterUtil.js") NOT "connector Parse error on line 1:" NOT ("logName=callbackAlreadyCalled" AND "adaptorType=HTTPExport")) OR "uncaughtException" OR "TypeError")
              | eval pass=if(match(sc, "^2"), 1, 0), fail=if(match(sc, "^5")  OR level="error" OR searchmatch("uncaughtException") OR searchmatch("TypeError"), 1, 0)
              | stats sum(pass) as passCount, sum(fail) as failCount, count as totalCount 
              | eval errorRate=if(totalCount > 0, failCount/totalCount, 0)
              | eval finalResultHolder=if(totalCount == 0 OR errorRate < 0.001, "true", "false")
              | fields passCount, failCount, totalCount, errorRate, finalResultHolder
            frequency: 2m
disabled: true
versions:
    - version: v2
      lastApplied: 2021-09-01 12:00:00 
      stages:
        - wait: 5m 
          groups: [ 'EP Canary User IDs']
