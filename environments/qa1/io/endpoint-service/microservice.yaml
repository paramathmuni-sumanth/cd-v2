microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/di/sa/di-management-service
                  - cluster.local/ns/io/sa/internal-gateway
                  - cluster.local/ns/io/sa/gptverse
                  - cluster.local/ns/io/sa/celigo-agent
                  - cluster.local/ns/io/sa/internal-gateway
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "endpoint-service"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2.5
          memory: 2560Mi
        requests:
          cpu: 750m
          memory: 2304Mi
      terminationGracePeriodSeconds: 600
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        redeployTimestamp: 2026-06-11-12-00
      livenessProbe:
        failureThreshold: 3
      readinessProbe:
        failureThreshold: 3
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::341118756977:role/endpoint-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - endpoint-service.celigo.io
      - endpoint-service.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - endpoint-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: core-dump-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-endpoint-service
  configVolume:
    logLevel.json: |
      {
        "default": "info"
      }
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAPDUMP_ENABLED": false,
        "MAX_PERF_DUMP_PER_HOUR": 1
      }
  volumes:
    - name: loglevel-config-volume
      configMap:
        name: js-runtime-config-volume
    - name: probe-config-volume
      configMap:
        name: endpoint-service-config-volume
    - name: core-dump-volume
      persistentVolumeClaim:
        claimName: core-dump-nfs-pvc
  volumeMounts:
    - mountPath: "/opt/probe-config/"
      name: probe-config-volume
    - mountPath: "/service-core-dumps/"
      name: core-dump-volume
    - mountPath: "/etc/config/"
      name: loglevel-config-volume
  deployments:
    - name: temp-app
      deployment:
        image:
          tag: 2026.7.1-fb-0.0.1.801.0
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              userid:
                regex: '^(6192a46d75f94b333a5645ae)$'
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.685.0
      subsetConfig:
        selectorLabels: {}
        routes: []
