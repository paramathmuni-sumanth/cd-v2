microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-netsuite-webservices-adaptor"
    NODE_OPTIONS: "--max-old-space-size=1340"
    PORT: "5000"
    APP_NAME: "netsuite-webservices-adaptor"
    s3_integrator_debug: "integrator-qa-debug"
    s3_integrator_files: "integrator-qa-files"
    s3_integrator_netsuite_metadata: "integrator-qa-metadata"
    s3_integrator_userdata_delete_30: "integrator-qa-userdata-delete-30"
    DONT_USE_AXIOS: "false"
    MAX_ALL_BUFFERS_LIMIT: 150000000
    MULTI_LOGS_BUFFER_LIMIT: 30000000
    SINGLE_LOG_BUFFER_LIMIT: 75000000
    IDLE_FLUSH_INTERVAL: 2500
    HARD_FLUSH_INTERVAL: 15000
    FLUSH_SCHEDULE_INTERVAL: 2500
    RTO_LOG_ENABLE: "false"
    NSRT_THRESHOLD_MS: 0
    S3RT_THRESHOLD_MS: 0
    DEFAULT_MAX_OLD_SPACE_SIZE: "2684354560"
    HEAP_INTERVAL_CHECK: "30000"
    HEAP_PROFILER_ENABLED: "true"
    NETSUITE_APPLICATION_ID: "00997F3C-FD81-400B-9E36-BB673D757DE3"
    S3_HEAP_DUMPS_BUCKET: "integrator-qa-heap-dumps"
