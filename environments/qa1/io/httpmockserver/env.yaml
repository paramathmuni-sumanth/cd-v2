microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-httpmockserver"
    NODE_OPTIONS: "--max-old-space-size=512"
    NS_CUSTOM_EXPORT_RECORDS_COUNT: "100000"
    NS_CUSTOM_EXPORT_FIELDS_COUNT: "50"
    NS_CUSTOM_SEARCHES_COUNT: "2000"
    NS_BASE_RES_TIME_PER_PAGE: "3000"
    NS_BASE_PARALLEL_COUNT: "100"
    NS_RAMP_UP_TIME: "5000"
    AUTHX_ISSUER_URL: "https://qa.staging.integrator.io/internal/celigo-authx"
    AUTHX_FRONTEND_URL: "https://qa.staging.integrator.io/internal/celigo-authx"
    ACCESS_TOKEN_TTL: "3600"
    REFRESH_TOKEN_TTL: "2592000"
    ID_TOKEN_TTL: "3600"
    AUTHORIZATION_CODE_TTL: "600"
    VITE_BASE_PATH: "/internal/celigo-authx/"
    VITE_API_BASE: "/internal/celigo-authx/authx"
    AUTHX_BASE_PATH: "/internal/celigo-authx/authx"
    AUTHX_FRONTEND_BASE_PATH: "/internal/celigo-authx"
    CORS_ORIGINS: "https://qa.staging.integrator.io"
    MONGODB_DATABASE: "celigo_oauth"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-105ad8-shard-0&authSource=admin&w=majority"
