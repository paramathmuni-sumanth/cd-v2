microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/io/sa/mcp-servers
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/ai-agent-executor
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    secretRef: newrelic-secrets
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: api-execution
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 3Gi
        requests:
          cpu: 500m
          memory: 2.5Gi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        celigo.io/scrape: 'fast'
        redeployTimestamp: 2026-06-12-06-49
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::341118756977:role/api-execution-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - api-execution.core.svc.cluster.local
      - api-execution.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - api-execution
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    logLevel.json: |
      {
        "default": "info",
        "configPerPod": false
      }
  volumes:
    - name: log-level-config
      configMap:
        name: api-execution-config-volume
  volumeMounts:
    - mountPath: "/etc/config/"
      name: log-level-config
  deployments:
    - name: app-canary
      deployment:
        image:
          tag: ml-0.0.1.344.0
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              x-celigo-version:
                exact: v2
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.344.0
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 2
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="api-execution-app"})
                threshold: "5"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "50"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
