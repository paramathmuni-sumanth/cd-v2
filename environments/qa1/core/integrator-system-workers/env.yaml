microservice:
  env:
    # General Configuration
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    IO_DOMAIN: "integrator.io"
    PORT: "5000"
    # S3 Configuration
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    s3_connection_timeout: "45000"
    s3_max_sockets: "500"
    s3_integrator_debug: "integrator-qa-debug"
    s3_integrator_error_files: "integrator-qa-error-files"
    s3_integrator_errors: "integrator-qa-errors"
    s3_integrator_event_reports: "integrator-qa-event-reports"
    s3_integrator_files: "integrator-qa-files"
    s3_integrator_metadata_bucket: "integrator-qa-metadata"
    s3_integrator_mongo_fields_data: "integrator-qa-mongo-fields"
    s3_integrator_netsuite_metadata: "integrator-qa-metadata"
    s3_integrator_pages: "integrator-qa-pages"
    s3_integrator_retries: "integrator-qa-retries"
    s3_integrator_retry_data_keys: "integrator-qa-retry-data-keys"
    s3_integrator_revisions: "integrator-qa-revisions"
    s3_integrator_states: "integrator-qa-states"
    s3_integrator_sqs: "integrator-qa-sqs"
    s3_integrator_templates: "integrator-qa-templates"
    s3_integrator_templates_published: "integrator-qa-templates-published"
    s3_integrator_userdata_delete_30: "integrator-qa-userdata-delete-30"
    JAVASCRIPT_S3_BUCKET: "integrator-qa-scripts"
    # MongoDB Configuration
    MONGODB_DATABASE: "integrator"
    MONGODB_CLIENT_APP_NAME: "integrator-system-workers"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    # Kafka Configuration
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    # AWS SES Configuration
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    # Worker Configuration
    MAX_CONSUMER_CHILD_PROCESSES: "1"
    MAX_LOAD: "1000"
    MAX_OPEN_FILE_DESCRIPTORS: "65535"
    WORKER_TEST_SERVER_PORT: "5060"
    # Frequency Configuration
    HEALTH_CHECK_FREQUENCY: "60000"
    PERSIST_JOB_FREQUENCY: "5000"
    REFRESH_QG_FREQUENCY: "1000"
    REFRESH_KCGW_FREQUENCY: "60000"
    ADAPTOR_HEARTBEAT_INTERVAL: "50"
    LICENSE_SYSTEM_BATCH_PROCESS_PERIOD: "86400000"
    # Feature Flags
    AUDIT_ENABLED: "true"
    MONGOOSE_QUERY_USERID_PARSER_ENABLED: "true"
    ENABLE_API_GATING: "true"
    DISABLE_FILE_LOGS: "true"
    NUM_PARTITION_FLOW_EVENTS: 5
    LOOKUP_CACHE_SHARDING_ENABLED: "true"
    # Migration Flags
    SKIP_CLICKHOUSE_MIGRATION: "false"
    SKIP_DYNAMODB_LOOKUPCACHE_MIGRATION: "false"
    SKIP_INFLUXDB_FLOWEVENTS_MIGRATION: "true"
    # Sandbox Migration
    SANDBOX_MIGRATION_REMINDER_DAYS: "17"
    SANDBOX_MIGRATION_WORKER_TYPE: "sandboxMigration"
    # InfluxDB Configuration
    INFLUXDB_FLOWEVENTS_BUCKETNAME: "flowEvents"
    INFLUXDB_FLOWEVENTS_1HR_BUCKETNAME: "flowEvents_1hr"
    # API Usage Configuration
    GRAVITEE_API_BASE_URL: "management.apim.qa.staging.integrator.io"
    OVERAGE_EMAIL_DAY_OF_MONTH: "16"
    # Queue Configuration
