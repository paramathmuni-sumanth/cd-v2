microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: integrator-system-workers
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1000m
          memory: 6Gi
        requests:
          cpu: 600m
          memory: 4Gi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; wget -qO- "http://localhost:5000/openConnections?terminate=true"; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- "http://localhost:5000/openConnections"); sleep 5; done; wget -qO- "http://localhost:5000/stopServer"; echo "Done";
      podAnnotations:
        redeployTimestamp: 2026-06-05-16-03
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 2
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::341118756977:role/integrator-system-workers-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - integrator-system-workers.core.svc.cluster.local
      - integrator-system-workers.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - integrator-system-workers
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: sandbox-migration-do-not-remove
      env:
        MAX_CONSUMER_LOAD: 1
        MAX_CONSUMER_CHILD_PROCESSES: 1
        WORKER_TYPE: "sandboxMigration"
      deployment:
        replicaCount: 2
        image:
          tag: migration-new-model-fb-1.0.0.265.0
        resources:
          requests:
            cpu: 1000m
            memory: 6Gi
          limits:
            cpu: 1500m
            memory: 8Gi
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: app
      env:
        MAX_CONSUMER_LOAD: 100
      deployment:
        image:
          tag: ml-1.0.0.344.0
      subsetConfig:
        selectorLabels: {}
        routes: []
