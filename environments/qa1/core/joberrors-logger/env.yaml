microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-joberrors-logger"
    NODE_OPTIONS: "--max-old-space-size=2048"
    KAFKA_TOPIC: "flow_events"
    MIN_FILE_BYTES_IN_MB: 2
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    EACH_LIMIT: "5"
    ENABLE_LOGGING_KCGW: "true"
    IO_DOMAIN: "qa.staging.integrator.io"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    REFRESH_KCGW_FREQUENCY: "10000"
    s3_integrator_errors: "integrator-qa-errors"
    s3_integrator_kcgw: "integrator-qa-kcgw"
    s3_integrator_retries: "integrator-qa-retries"
    s3_integrator_userdata_delete_30: "integrator-qa-userdata-delete-30"
    sqs_delay_helper: "delay_helper_qa"
    MAX_DATA_SIZE_BYTES: "2"
    aws_account_id: "341118756977"
