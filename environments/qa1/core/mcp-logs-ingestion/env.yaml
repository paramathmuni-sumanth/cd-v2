microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-env-vars
    NEW_RELIC_APP_NAME: qa1-mcp-logs-ingestion
    NODE_OPTIONS: --max-old-space-size=250
    EACH_LIMIT: "5"
    s3_integrator_kcgw: "integrator-qa-kcgw"
    IO_DOMAIN: "qa.staging.integrator.io"
    CLICKHOUSE_DATABASE: "integrator-qa"
    CLICKHOUSE_TABLE: "mcpUsages"
    GROUP_ID: "mcp-logs-ingestion"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
