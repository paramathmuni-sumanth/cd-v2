microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: flow-logs-ingestion
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1
          memory: 2Gi
        requests:
          cpu: 200m
          memory: 512Mi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 2
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::341118756977:role/flow-logs-ingestion-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - flow-logs-ingestion.core.svc.cluster.local
      - flow-logs-ingestion.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - flow-logs-ingestion
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app-extended
      env:
        GROUP_ID: "flow-logs-ingestion-extended"
      deployment:
        image:
          tag: ml-0.0.1.15.0
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: app
      env:
        GROUP_ID: "flow-logs-ingestion"
      deployment:
        image:
          tag: ml-0.0.1.17.0
      subsetConfig:
        selectorLabels: {}
        routes: []
