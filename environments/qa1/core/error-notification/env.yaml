microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-env-vars"
    NEW_RELIC_APP_NAME: "qa1-error-notification"
    NODE_OPTIONS: "--max-old-space-size=512"
    EACH_LIMIT: "5"
    INTIAL_RETRY_DELAY_FOR_AUTO: "60000"
    IO_DOMAIN: "qa.staging.integrator.io"
    MAX_ERRORS_TO_PROCESS_PER_EXP_IMP: "5"
    MAX_LOAD: "25"
    NEEDS_NOTIFICATION_NUM_PARTITIONS: "5"
    REFRESH_KCGW_FREQUENCY: "10000"
    s3_integrator_errors: "integrator-qa-errors"
    s3_integrator_kcgw: "integrator-qa-kcgw"
    s3_integrator_mongo_fields_data: "integrator-qa-mongo-fields"
    s3_integrator_retries: "integrator-qa-retries"
    s3_integrator_userdata_delete_30: "integrator-qa-userdata-delete-30"
    sqs_delay_helper: "delay_helper_qa"
    s3_connection_timeout: "75000"
    s3_max_sockets: "1000"
    EM_BATCH_TIMEOUT: "1800000"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-105ad8-shard-0&authSource=admin&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    OPSWORKS_STACK_ID: "e5cb7c6c-3a2c-4443-8060-cc210e445427"
    AWS_SES_REGION: "ap-south-1"
