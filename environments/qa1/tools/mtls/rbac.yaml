apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mtls-access
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["*"]
- apiGroups: ["networking.istio.io"]
  resources: ["gateways"]
  verbs: ["*"]

---

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mtls-access-binding
subjects:
- kind: ServiceAccount
  name: mtls-access-serviceaccount
  namespace: default
roleRef:
  kind: ClusterRole
  name: mtls-access
  apiGroup: rbac.authorization.k8s.io