apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pod-manager
  namespace: core
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["list", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: pod-manager-binding
  namespace: core
subjects:
- kind: ServiceAccount
  name: default
  namespace: core
roleRef:
  kind: Role
  name: pod-manager
  apiGroup: rbac.authorization.k8s.io