microservice:
  env:
    JAVA_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-streaming-service"
    JAVA_OPTS: "-Xms512m -Xmx3584m -XX:+UseG1GC -Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager"
    SERVER_PORT: "5000"
    WEBHOOK_SERVICE_URL: "http://webhooks.master-dev-io.svc.cluster.local"
    RESOURCE_MANAGEMENT_SERVICE_URL: "http://resource-management.master-dev-core.svc.cluster.local"
    SERVICE_TIMEOUT: "30000"
    POD_EXPORT_LOCK_POLL_INTERVAL: "60"
    SHUTDOWN_TIMEOUT_SECONDS: "300"
    S3_INTEGRATOR_PAGES_BUCKET: "integrator-pages-master-dev"
    AWS_REGION: "us-east-1"
    MONGODB_DATABASE: "integrator-master-dev"
    S3_REGION: "us-east-1"
