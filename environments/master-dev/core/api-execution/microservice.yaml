microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/master-dev-io/sa/api-gateway
                  - cluster.local/ns/master-dev-io/sa/lookup-cache
                  - cluster.local/ns/master-dev-io/sa/mcp-servers
                  - cluster.local/ns/master-dev-io/sa/ai-agent-executor
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: api-execution
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2000m
          memory: 3Gi
        requests:
          cpu: 200m
          memory: 2.5Gi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        redeployTimestamp: 2025-08-08-11-00
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/api-execution-s3-role-k8s-master-dev
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/master-dev
    hosts:
      - api-execution.master-dev-core.svc.cluster.local
      - api-execution.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - api-execution
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    logLevel.json: |
      {
        "default": "info",
        "configPerPod": false
      }
  volumes:
    - name: log-level-config
      configMap:
        name: api-execution-config-volume
  volumeMounts:
    - mountPath: "/etc/config/"
      name: log-level-config
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.332.0
      subsetConfig:
        selectorLabels: {}
        routes: []
