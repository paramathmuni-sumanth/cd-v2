microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-api-execution"
    NODE_OPTIONS: "--max-old-space-size=2765"
    JS_RUNTIME_FREE_SOCKET_TIMEOUT: "330000"
    JS_RUNTIME_KEEP_ALIVE: "true"
    JS_RUNTIME_KEEP_ALIVE_MSECS: "60000"
    JS_RUNTIME_REQUEST_TIMEOUT: "300000"
    JS_RUNTIME_SOCKET_ACTIVE_TTL: "420000"
    JS_RUNTIME_SOCKET_TIMEOUT: "300000"
    AI_AGENT_ADAPTOR_HTTP_URL: "http://ai-agent-adaptor.master-dev-io.svc.cluster.local"
    AI_AGENT_ADAPTOR_URL: "ws://ai-agent-adaptor.master-dev-io.svc.cluster.local"
    CELIGO_SUPPORT_EMAIL: "io.auto.api.qa+supportaccess@celigo.com"
    HEAP_PROFILER_DISABLED_FOR_WEB: "false"
    AS2_ADAPTOR_URL: "ws://as2-adaptor.master-dev-io.svc.cluster.local"
    AWS_SES_ENDPOINT: "email.us-east-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    CRASH_RECOVERY_DISABLED: "true"
    DATA_WAREHOUSE_ADAPTOR_URL: "ws://data-warehouse-adaptor.master-dev-io.svc.cluster.local"
    EACH_LIMIT: "100"
    FILE_ADAPTOR_URL: "ws://file-adaptor.master-dev-io.svc.cluster.local"
    HTTP_ADAPTOR_URL: "ws://http-adaptor.master-dev-io.svc.cluster.local"
    INTERNAL_HMAC_HOST_NAME: "internal-gateway.celigo.io"
    JAVASCRIPT_RUNTIME_HOST: "internal-js-runtime-staging-402578350.us-east-1.elb.amazonaws.com/"
    JAVASCRIPT_S3_BUCKET: "integrator-scripts-master-dev"
    JAVASCRIPT_S3_REYCLEBIN_BUCKET: "integrator-scripts-recyclebin-master-dev"
    JAVASCRIPT_SIZE_LIMIT: "2097152"
    JS_RUNTIME_URL_K8S: "http://js-runtime.master-dev-io.svc.cluster.local"
    LOOKUP_CACHE_SERVICE_URL: "http://lookup-cache.master-dev-io.svc.cluster.local"
    MAX_PAGE_SIZE_IN_BYTES: "5242880"
    MONGODB_DATABASE: "integrator-master-dev"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
    NETSUITE_DISTRIBUTED_ADAPTOR_URL: "ws://netsuite-distributed-adaptor.master-dev-io.svc.cluster.local"
    NETSUITE_WEBSERVICES_ADAPTOR_URL: "http://netsuite-webservices-adaptor.master-dev-io.svc.cluster.local"
    NETSUITE_WEBSERVICES_ADAPTOR_WS_URL: "ws://netsuite-webservices-adaptor.master-dev-io.svc.cluster.local"
    NOSQL_ADAPTOR_URL: "ws://nosql-db-adaptor.master-dev-io.svc.cluster.local"
    RDBMS_ADAPTOR_URL: "ws://rdbms-adaptor.master-dev-io.svc.cluster.local"
    S3_HEAP_DUMPS: "integrator-heap-dumps-master-dev"
    SALESFORCE_ADAPTOR_URL: "ws://salesforce-adaptor.master-dev-io.svc.cluster.local"
    s3_integrator_chunks: "integrator-chunks-master-dev"
    s3_integrator_debug: "integrator-debug-master-dev"
    s3_integrator_error_files: "integrator-error-files-master-dev"
    s3_integrator_errors: "integrator-errors-master-dev"
    s3_integrator_files: "integrator-files-master-dev"
    s3_integrator_mongo_fields_data: "integrator-mongo-fields-master-dev"
    s3_integrator_pages: "integrator-pages-master-dev"
    s3_integrator_retries: "integrator-retries-master-dev"
    s3_integrator_retry_data_keys: "integrator-retry-data-keys-master-dev"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
