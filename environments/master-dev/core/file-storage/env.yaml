microservice:
  env:
    NODE_ENV: cd
    aws_region: us-east-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-env-vars-master-dev
    NEW_RELIC_APP_NAME: master-dev-file-storage
    NODE_OPTIONS: --max-old-space-size=250
    PORT: "5000"
    STORAGE_S3_BUCKET_NAME: integrator-userdata-delete-never
    STORAGE_PRESIGN_EXPIRY: "86400"
    REDIS_KEY_PREFIX_ACTIVE: "storage:active:"
    REDIS_KEY_PREFIX_RECYCLE_BIN: "storage:recycleBin:"
