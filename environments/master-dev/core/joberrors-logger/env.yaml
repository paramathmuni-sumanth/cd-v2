microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-joberrors-logger"
    NODE_OPTIONS: "--max-old-space-size=2048"
    AWS_SES_ENDPOINT: "email.us-east-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    EACH_LIMIT: "5"
    ENABLE_LOGGING_KCGW: "true"
    IO_DOMAIN: "master.dev.integrator.io"
    KAFKA_TOPIC: "flow_events"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    REFRESH_KCGW_FREQUENCY: "10000"
    s3_integrator_errors: "integrator-errors-master-dev"
    s3_integrator_kcgw: "integrator-kcgw-master-dev"
    s3_integrator_retries: "integrator-retries-master-dev"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
    sqs_delay_helper: "master-dev-delay_helper"
