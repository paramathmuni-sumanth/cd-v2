microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/master-dev-io/sa/api-gateway
                  - cluster.local/ns/master-dev-io/sa/integrator-workers
                  - cluster.local/ns/master-dev-io/sa/integrator-workers-ping
                  - cluster.local/ns/master-dev-core/sa/integrator-system-workers
                  - cluster.local/ns/master-dev-io/sa/flow-management
                  - cluster.local/ns/master-dev-io/sa/gptverse
                  - cluster.local/ns/master-dev-io/sa/internal-gateway
                  - cluster.local/ns/master-dev-di/sa/di-management-service
                  - cluster.local/ns/master-dev-di/sa/data-catalog-service
                  - cluster.local/ns/master-dev-io/sa/edi-service
                  - cluster.local/ns/master-dev-io/sa/lookup-cache
                  - cluster.local/ns/master-dev-ui/sa/integrator-bff
                  - cluster.local/ns/master-dev-core/sa/streaming-service
                  - cluster.local/ns/master-dev-io/sa/agent-management-service
                  - cluster.local/ns/master-dev-io/sa/audit-service
                  - cluster.local/ns/master-dev-io/sa/ai-agent-executor
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "resource-management"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 2.5Gi
        requests:
          cpu: 600m
          memory: 2Gi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-12-10-16-37
      livenessProbe:
        config:
          exec:
            command:
              - /bin/bash
              - /opt/docker/probe-scripts/probe.sh
        initialDelaySeconds: 20
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 10
        failureThreshold: 10
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/resource-management-s3-role-k8s-master-dev
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/master-dev
    hosts:
      - resource-management.celigo.io
      - resource-management.master-dev-core.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - resource-management
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: resource-management-fs-rms
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-resource-management-master-dev
  configVolume:
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAPDUMP_ENABLED": false,
        "MAX_PERF_DUMP_PER_HOUR": 1
      }
  volumes:
    - name: probe-configmap-volume
      configMap:
        name: resource-management-config-volume
    - name: resource-management-nfs-storage
      persistentVolumeClaim:
        claimName: resource-management-fs-rms
  volumeMounts:
    - mountPath: /service-core-dumps
      name: resource-management-nfs-storage
    - mountPath: /opt/probe-config/
      name: probe-configmap-volume
  deployments:
    - name: app
      deployment:
        image:
          tag: 2026.5.2-patch-0.0.1.1693.0
      subsetConfig:
        selectorLabels: {}
        routes: []
