microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-error-notification"
    NODE_OPTIONS: "--max-old-space-size=512"
    EACH_LIMIT: "5"
    INTIAL_RETRY_DELAY_FOR_AUTO: "60000"
    IO_DOMAIN: "master.dev.integrator.io"
    MAX_ERRORS_TO_PROCESS_PER_EXP_IMP: "25"
    MAX_LOAD: "25"
    NEEDS_NOTIFICATION_NUM_PARTITIONS: "5"
    REFRESH_KCGW_FREQUENCY: "10000"
    s3_integrator_errors: "integrator-errors-master-dev"
    s3_integrator_kcgw: "integrator-kcgw-master-dev"
    s3_integrator_mongo_fields_data: "integrator-mongo-fields-master-dev"
    s3_integrator_retries: "integrator-retries-master-dev"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
    sqs_delay_helper: "master-dev-delay_helper"
    s3_connection_timeout: "120000"
    s3_max_sockets: "1000"
    AWS_SES_ENDPOINT: "email.us-east-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    MONGODB_DATABASE: "integrator-master-dev"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
    MONGOOSE_QUERY_USERID_PARSER_ENABLED: "true"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    OPSWORKS_STACK_ID: "e5ce1d3a-5083-4a7a-8836-0a344bde34a3"
    s3_integrator_errors_replay: "integrator-errors-replay-master-dev"
    s3_read_timeout: "20000"
