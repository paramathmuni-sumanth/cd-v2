microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-mcp-logs-ingestion"
    NODE_OPTIONS: "--max-old-space-size=250"
    EACH_LIMIT: "5"
    s3_integrator_kcgw: "integrator-kcgw-master-dev"
    IO_DOMAIN: "master.dev.integrator.io"
    CLICKHOUSE_DATABASE: "integrator-master-dev"
    CLICKHOUSE_TABLE: "mcpUsages"
    GROUP_ID: "mcp-logs-ingestion"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
