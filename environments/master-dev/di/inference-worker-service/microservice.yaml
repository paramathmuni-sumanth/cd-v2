microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/master-dev-io/sa/api-gateway
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: inference-worker-service
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 4000m
          memory: 8Gi
        requests:
          cpu: 2000m
          memory: 4Gi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /actuator/health/liveness
        initialDelaySeconds: 60
      readinessProbe:
        enabled: true
        path: /actuator/health/readiness
        initialDelaySeconds: 60
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/inference-worker-service-s3-role-k8s-master-dev
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/master-dev
    hosts:
      - inference-worker-service.master-dev-di.svc.cluster.local
      - inference-worker-service.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - inference-worker-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.67.0
      subsetConfig:
        selectorLabels: {}
        routes: []
