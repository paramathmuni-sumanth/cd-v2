microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-data-catalog-service"
    NODE_OPTIONS: "--max-old-space-size=250"
    NEW_RELIC_LOG: "stdout"
    NEW_RELIC_LOG_LEVEL: "info"
    gms_server: "https://celigo-dev3.acryl.io/gms"
    GUNICORN_THREADS: "15"
    GUNICORN_WORKERS: "1"
    readyz_pre_stop_timeout_max: "10"
    readyz_pre_stop_timeout_min: "5"
