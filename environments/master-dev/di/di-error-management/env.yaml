microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-di-error-management"
    NODE_OPTIONS: "--max-old-space-size=250"
    PORT: "5000"
    SESSION_TIMEOUT: "60000"
    REBALANCE_TIMEOUT: "60000"
    CONSUMER_HEARTBEAT_INTERVAL: "20000"
    MAX_WAIT_TIME_IN_MS: "5000"
    MIN_BYTES: "524288"
    MAX_BYTES_PER_PARTITION: "1048576"
    POLLING_INTERVAL: "5000"
    MAX_RECOVERY_ATTEMPTS: "5"
    GROUP_ID: "di-error-management-group"
    IO_DOMAIN: "master.dev.integrator.io"
    IO_SERVICE_URL: "https://api.master.dev.integrator.io"
    API_GATEWAY_SERVICE_URL: "http://api-gateway.master-dev-io.svc.cluster.local"
    NEEDS_DI_NOTIFICATION_NUM_PARTITIONS: 1
    ENABLE_LOGGING_KCGW: "false"
    WATCHDOG_ENABLED: "false"
    MONGODB_DATABASE: "integrator-master-dev"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
