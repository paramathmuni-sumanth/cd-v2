microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-schema-inference-service"
    NODE_OPTIONS: "--max-old-space-size=250"
    SQS_QUEUE_PREFIX: "master-dev-"
    ENABLE_SQS_QUEUE_CREATION: true
    SQS_JOBS_VISIBILITY_TIMEOUT: "300"
    SQS_JOBS_RETENTION_PERIOD: "345600"
    SQS_JOBS_MAX_RECEIVE_COUNT: "3"
    SQS_STATUS_VISIBILITY_TIMEOUT: "120"
    SQS_STATUS_RETENTION_PERIOD: "345600"
    SQS_STATUS_MAX_RECEIVE_COUNT: "3"
    MONGODB_DATABASE: "schema_inference-master-dev"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
