microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-di-aggregation-service"
    NODE_OPTIONS: "--max-old-space-size=250"
    EACH_LIMIT: "100"
    API_GATEWAY_URL: "http://api-gateway.master-dev-io.svc.cluster.local"
    NEEDS_DI_NOTIFICATION_NUM_PARTITIONS: "1"
    DI_S3_BUCKET_FOLDER_PREFIX: "di-data"
    DI_S3_BUCKET_NAME: "integrator-di-userdata-master-dev"
    IO_DOMAIN: "master.dev.integrator.io"
    AWS_SES_ENDPOINT: "email.us-east-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    MONGODB_DATABASE: "integrator-master-dev"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
