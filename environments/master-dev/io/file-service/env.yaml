microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-file-service"
    NODE_OPTIONS: "--max-old-space-size=2048"
    NEWRELIC_CONF_FILE_PATH: "/file-service/config/newRelic.json"
    S3_FILES_BUCKET: "integrator-userdata-delete-30-master-dev"
    OPENPGP_MIN_RSA_BITS: "1024"
    SERVER_PORT: "5000"
    STREAM_SORT_AND_GROUP: "true"
    ENABLE_RSA_BIT_LOGGING: "true"
    HEADERS_TIMEOUT: "355000"
    KEEPALIVE_TIMEOUT: "351000"
    SERVER_KEEP_ALIVE_TIMEOUT: "300000"
    SERVER_TIMEOUT: "365000"
