microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-ai-agent-adaptor"
    NODE_OPTIONS: "--max-old-space-size=250"
    AI_AGENT_RECORD_CONCURRENCY: "5"
    AI_AGENT_MS_URL: "http://ai-agent-executor.master-dev-io.svc.cluster.local"
    HTTP_ADAPTOR_WS_URL: "ws://http-adaptor.master-dev-io.svc.cluster.local"
    MAX_BUFFER_COUNT: "5"
    MAX_ALL_BUFFERS_LIMIT: "50000000"
    MULTI_LOGS_BUFFER_LIMIT: "10000000"
    SINGLE_LOG_BUFFER_LIMIT: "25000000"
    IDLE_FLUSH_INTERVAL: "2500"
    HARD_FLUSH_INTERVAL: "15000"
    FLUSH_SCHEDULE_INTERVAL: "2500"
    RTO_LOGGING_ENABLED: true
    RTO_LOGGING_THRESHOLD_MS: "120000"
    S3_HEAP_DUMPS_BUCKET: "integrator-heap-dumps-master-dev"
    S3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
    s3_integrator_files: "integrator-files-master-dev"
