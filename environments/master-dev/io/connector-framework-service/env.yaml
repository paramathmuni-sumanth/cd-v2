microservice:
  env:
    NODE_ENV: cd
    aws_region: us-east-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-env-vars-master-dev
    NEW_RELIC_APP_NAME: master-dev-connector-framework-service
    NEW_RELIC_ENABLED: "true"
    NODE_OPTIONS: --max-old-space-size=250
    PORT: "5000"
    SERVICE: connector-framework-service
    IO_DOMAIN: master.dev.integrator.io
    MONGODB_URL_SCHEME: mongodb://
    MONGODB_DATABASE: integrator-master-dev
    MONGODB_REPLICASET: ""
    MONGODB_URL_QUERY_PARAMS: ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority
    MONGODB_CLIENT_APP_NAME: connector-framework-service
    MONGODB_DISCONNECT_TIMEOUT: "500"
    MONGO_POOL_SIZE: "5"
    REDIS_URL: redis-server-master.master-dev.svc.cluster.local:6379
    REDIS_CONNECT_TIMEOUT: "5000"
    REDIS_PING_INTERVAL: "60000"
    PUBLISHED_HTTP_CONNECTORS_RATE_LIMIT: "4"
    RATE_LIMITER_ENABLED: "true"
    RATE_LIMITER_REDIS_PORT: "6379"
