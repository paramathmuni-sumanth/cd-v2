microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-netsuite-webservices-adaptor"
    NODE_OPTIONS: "--max-old-space-size=2500"
    PORT: "5000"
    s3_integrator_debug: "integrator-debug-master-dev"
    s3_integrator_files: "integrator-files-master-dev"
    s3_integrator_netsuite_metadata: "integrator-metadata-master-dev"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
    EFS_ROOT_MOUNT_PATH: "/mnt/efs"
    MAX_ALL_BUFFERS_LIMIT: "100000000"
    TOTAL_BUFFER_COUNT: "10"
    MULTI_LOGS_BUFFER_LIMIT: "10000000"
    SINGLE_LOG_BUFFER_LIMIT: "25000000"
    IDLE_FLUSH_INTERVAL: "500"
    HARD_FLUSH_INTERVAL: "1000"
    FLUSH_SCHEDULE_INTERVAL: "250"
    LOG_FORWARDER_DEBUG_LOGS: "true"
    APP_NAME: "netsuite-webservices-adaptor"
    DEFAULT_MAX_OLD_SPACE_SIZE: "2684354560"
    HEAP_INTERVAL_CHECK: "30000"
    HEAP_PROFILER_ENABLED: true
    RTO_LOG_ENABLE: "true"
    S3_HEAP_DUMPS_BUCKET: "integrator-heap-dumps-master-dev"
    NETSUITE_APPLICATION_ID: "00997F3C-FD81-400B-9E36-BB673D757DE3"
