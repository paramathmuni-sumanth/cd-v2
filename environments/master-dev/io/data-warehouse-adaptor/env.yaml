microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEWRELIC_CONF_FILE_PATH: "/data-warehouse-adaptor/config/newRelic.json"
    NEW_RELIC_APP_NAME: "master-dev-data-warehouse-adaptor"
    NODE_OPTIONS: "--max-old-space-size=1000"
    PORT: "5000"
    s3_integrator_debug: "integrator-debug-master-dev"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
    APP_NAME: "data-warehouse-adaptor"
    BULK_LOAD_MAX_FILE_SIZE: "2147483648"
    API_TIME_OUT: "10"
    SNOWFLAKE_DEBUG_TRACE: "true"
