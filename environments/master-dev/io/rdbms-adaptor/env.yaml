microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-rdbms-adaptor"
    terminationGracePeriodSeconds: "86400"
    NODE_OPTIONS: "--max-old-space-size=1000"
    NEWRELIC_CONF_FILE_PATH: "/rdbms-adaptor/config/newRelic.json"
    JDBC_BRIDGE_URL: "ws://jdbc-bridge.master-dev-io.svc.cluster.local/jdbc-bridge"
    PORT: "5000"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
