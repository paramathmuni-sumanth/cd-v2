microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-gptverse"
    NODE_OPTIONS: "--max-old-space-size=512"
    s3_integrator_files: "integrator-files-master-dev"
    s3_integrator_ai_resources: "integrator-ai-resources-master-dev"
    NUM_ATTEMPTS_FOR_CANCELLATION: "5"
    NUM_MESSAGES_TO_KEEP: "3"
    PINECONE_USER_TOOL_NAMESPACE: "master-dev-user-tools-ai-descriptions"
    SHOPIFY_CONVERSION_USE_ASSISTANT: "False"
    SQL_USE_ASSISTANT: "True"
    TOKEN_THRESHOLD_DEFAULT_KB_ARTICLE: "50"
    FILTER_USE_ASSISTANT: "True"
    HANDLEBAR_USE_ASSISTANT: "True"
    IO_API_ENDPOINT_SESSION: "https://staging.integrator.io/api"
    JAVASCRIPT_USE_ASSISTANT: "True"
    KB_USE_ASSISTANT: "True"
    MARKETPLACE_MAX_RESOURCES_LIMIT: "100"
    MODEL_FILTER: "gpt-3.5-turbo-0125"
    PINECONE_ENVIRONMENT: "us-east-1-aws"
    PINECONE_INDEX: "platform-1-knowledge-base"
    PINECONE_SCORE_THRESHOLD_DEFAULT: "0.75"
    PINECONE_TEMP_EXPORT_NAMESPACE: "staging-marketplace-exports-ai-descriptions"
    PINECONE_TEMP_IMPORT_NAMESPACE: "staging-marketplace-imports-ai-descriptions"
    PINECONE_USER_EXPORT_NAMESPACE: "staging-user-exports-ai-descriptions"
    PINECONE_USER_IMPORT_NAMESPACE: "staging-user-imports-ai-descriptions"
    PRINT_VERBOSE: "TRUE"
    USER_MAX_RESOURCES_LIMIT: "700"
