microservice:
  env:
    NODE_ENV: cd
    aws_region: us-east-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-env-vars-master-dev
    NEW_RELIC_APP_NAME: master-dev-edi-service
    NODE_OPTIONS: --max-old-space-size=250
    PORT: "5000"
    IO_DOMAIN: master.dev.integrator.io
    INTERNAL_HMAC_HOST_NAME: internal-gateway.celigo.io
    REDIS_URL: redis-server-master.master-dev.svc.cluster.local:6379
    MONGODB_URL_SCHEME: mongodb://
    MONGODB_DATABASE: integrator-master-dev
    MONGODB_URL_QUERY_PARAMS: ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority
    MONGODB_CLIENT_APP_NAME: edi-service
    MONGODB_DISCONNECT_TIMEOUT: "500"
    MONGO_POOL_SIZE: "5"
    EDI_MONGODB_BASE_URL: mongodb://
    EDI_MONGODB_DATABASE: edi-integrator-master-dev
    EDI_MONGODB_URL_QUERY_PARAMS: ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority
    FMS_SERVICE_URL: http://flow-management.master-dev-io.svc.cluster.local
    RMS_SERVICE_URL: http://resource-management.master-dev-core.svc.cluster.local
    LICENSE_CACHE_SIZE: "5000"
    LICENSE_CACHE_TTL_MS: "30000"
    s3_integrator_files: integrator-files-master-dev
    s3_integrator_userdata_delete_30: integrator-userdata-delete-30-master-dev
    DOWNLOAD_EDITRANSACTIONS_LIMIT: "50000"
    FILE_PARSER_PREVIEW_LIMIT: "1000"
    FILE_SERVICE_K8S_URL: http://file-service.master-dev-io.svc.cluster.local
    ACCESSCONTROL_FOR_API_ROUTES: "true"
    S3_HEAP_DUMPS: integrator-heap-dumps-master-dev
    HEAP_INTERVAL_CHECK: "30000"
    WEB_INSTANCE_MAX_OLD_SPACE_SIZE: "1024"
    HEAP_THRESHOLD_VALUE: "800"
    HEAP_PROFILER_DISABLED: "false"
