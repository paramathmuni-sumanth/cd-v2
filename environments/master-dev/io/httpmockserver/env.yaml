microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-httpmockserver"
    NODE_OPTIONS: "--max-old-space-size=512"
    NS_CUSTOM_EXPORT_RECORDS_COUNT: "10000"
    NS_CUSTOM_EXPORT_FIELDS_COUNT: "10"
    NS_BASE_RES_TIME_PER_PAGE: "200"
    NS_BASE_PARALLEL_COUNT: "100"
    NS_RAMP_UP_TIME: "1000"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
    MONGODB_DATABASE: "integrator-master-dev"
    CORS_ORIGINS: "https://master.dev.integrator.io"
