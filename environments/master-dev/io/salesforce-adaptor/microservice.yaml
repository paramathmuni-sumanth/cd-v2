microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/master-dev-io/sa/flow-management
                  - cluster.local/ns/master-dev-core/sa/resource-management
                  - cluster.local/ns/master-dev-io/sa/integrator-workers
                  - cluster.local/ns/master-dev-io/sa/integrator-workers-ping
                  - cluster.local/ns/master-dev-core/sa/integrator-system-workers
                  - cluster.local/ns/master-dev-io/sa/endpoint-service
                  - cluster.local/ns/master-dev-core/sa/api-execution
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "salesforce-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      startupProbe:
        enabled: true
        path: /livez
        port: 5000
        initialDelaySeconds: 0
        periodSeconds: 2
        timeoutSeconds: 1
        failureThreshold: 30
      livenessProbe:
        failureThreshold: 6
        initialDelaySeconds: 0
      readinessProbe:
        failureThreshold: 3
        initialDelaySeconds: 0
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 2Gi
        requests:
          cpu: 100m
          memory: 1.5Gi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-10-31-11-43
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 50
  destinationRules:
    enabled: true
    trafficPolicy:
      connectionPool:
        tcp:
          maxConnections: 100
          tcpKeepalive:
            time: 7200s
            interval: 75s
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/salesforce-adaptor-s3-role-k8s-master-dev
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/master-dev
    hosts:
      - salesforce-adaptor.celigo.io
      - salesforce-adaptor.master-dev-io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - salesforce-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  configVolume:
    logLevel.json: |
      {
        "default": "info",
        "configPerPod": false
      }
  volumes:
    - name: loglevel-config-volume
      configMap:
        name: salesforce-adaptor-config-volume
  volumeMounts:
    - mountPath: "/etc/config/"
      name: loglevel-config-volume
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        podAnnotations:
          celigo.io/scrape: 'fast'
        image:
          tag: ml-0.0.1.158.0
      subsetConfig:
        selectorLabels: {}
        routes: []
