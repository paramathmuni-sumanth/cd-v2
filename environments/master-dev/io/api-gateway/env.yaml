    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-api-gateway"
    NODE_OPTIONS: "--max-old-space-size=2048"
    CANARY_SERVICE_NAME_AND_KEYS_LIST: "http-adaptor:http-adaptor,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,endpoint-service:endpoint-service,as2-adaptor:as2-adaptor,salesforce-adaptor:salesforce-adaptor,file-adaptor:file-adaptor,netsuite-distributed-adaptor:netsuite-distributed-adaptor,netsuite-webservices-adaptor:netsuite-webservices-adaptor,file-service:file-service,file-adaptor:file-adaptor,js-runtime:js-runtime,api-execution:api-execution"
    IO_SERVICE_ENDPOINT_CONFIG: "authenticationservice:authentication-service.master-dev-io,webhooks:webhooks.master-dev-io,gptverse:gptverse.master-dev-io,systemservice:system-apis.master-dev-core,resourcemanagement:resource-management.master-dev-core,flowmgmtservice:flow-management.master-dev-io,as2microservice:as2-adaptor.master-dev-io,endpointservice:endpoint-service.master-dev-io,dimanagementservice:di-management-service.master-dev-di,datacatalogservice:data-catalog-service.master-dev-di,apiexecution:api-execution.master-dev-core,schemainferenceservice:schema-inference-service.master-dev-di,integratorbff:integrator-bff.master-dev-ui,agentmanagementservice:agent-management-service.master-dev-io,auditservice:audit-service.master-dev-io,integratorbff:integrator-bff.master-dev-ui,mcpservers:mcp-servers.master-dev-io,celigoagent:celigo-agent.master-dev-io,iomcpserver:io-mcp-server.master-dev-io,connectorframeworkservice:connector-framework-service.master-dev-io,ediservice:edi-service.master-dev-io"
    CANARY_SERVICE_LIST: "error-assignment,integrator-app-ui,error-linegraphs,error-management,error-notification,resolvedlinegraphs,resource-management,rollout-engine,system-apis,data-catalog-service,di-management-service,amazon-netsuite-connector,amazonmcf-netsuite-connector,bigcommerce-netsuite-connector,ebay-netsuite-connector,hightech-connectors,magento-netsuite-connector,shopify-netsuite-connector,square-netsuite-ia,walmart,netsuite-connector,api-gateway,as2-adaptor,authentication-service,data-warehouse-adaptor,endpoint-service,error-classifier-v2,file-adaptor,file-service,flow-management,ftp-bridge-ms,gptverse,http-adaptor,integrator-workers,internal-gateway,jdbc-bridge,js-runtime,netsuite-distributed-adaptor,netsuite-webservices-adaptor,nosql-db-adaptor,rdbms-adaptor,salesforce-adaptor,webhooks,lookup-cache,api-execution,gptverse,integrator-bff"
    ENABLE_LOGGING_FOR_MEMORY_USAGE: "true"
    HEAP_INTERVAL_CHECK: "30000"
    HEAP_PROFILER_DISABLED_FOR_WEB: "false"
    HEAP_THRESHOLD_VALUE: "1600"
    S3_HEAP_DUMPS: "integrator-heap-dumps-master-dev"
    VALID_IO_DOMAIN_PREFIXES: "eu,qa,iaqa,qaprod,platform1,platform2,platform3,platform4,platform5,core,qa.staging,qaprod.staging"
    WEB_INSTANCE_MAX_OLD_SPACE_SIZE: "2560"
    AUDIT_ENABLED: "true"
    AUTH_SERVICE_URL: "http://authentication-service.master-dev-io.svc.cluster.local"
    AWS_SES_ENDPOINT: "email.us-east-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "us-east-1"
    EACH_LIMIT: "100"
    IO_DOMAIN: "master.dev.integrator.io"
    JWT_ALLOW_INVALID_ASYMMETRIC_KEY_TYPES: "true"
    MONGODB_CLIENT_APP_NAME: "api-gateway"
    MONGODB_DATABASE: "integrator-master-dev"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    OVERRIDE_FORWARDED_HEADER: "true"
    SERVER_HEADERS_TIMEOUT: "355000"
    SERVER_KEEP_ALIVE_TIMEOUT: "351000"
    SERVER_TIMEOUT: "365000"
    UI_RESOURCES_CDN_URL: "https://djlno0h78mbkc.cloudfront.net"
