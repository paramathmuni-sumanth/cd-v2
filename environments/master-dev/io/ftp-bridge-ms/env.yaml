microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-ftp-bridge-ms"
    NODE_OPTIONS: "--max-old-space-size=512"
    JAVA_ENV: "cd"
    JDK_JAVA_OPTIONS: "--add-opens=java.base/sun.security.ssl=ALL-UNNAMED --add-opens=java.base/sun.security.util=ALL-UNNAMED"
    CATALINA_OPTS: "-Xms800m -Xmx1600m -XX:MaxGCPauseMillis=200 -XX:ParallelGCThreads=5 -XX:ConcGCThreads=2 -XX:+UseParallelGC -Dnewrelic.config.file=/opt/newrelic/newRelic.yml"
    NEWRELIC_CONF_FILE_PATH: "/etc/config/newRelic.json"
    NEW_RELIC_AGENT_ENABLED: "true"
    NEW_RELIC_JFR_ENABLED: "false"
    CELIGO_SECRET_KEY: "CELIGO_SECRET_KEY"
    CELIGO_SECRET_KEY_WEB: "CELIGO_SECRET_KEY_WEB"
    CELIGO_SECRET_KEY_WORKER: "CELIGO_SECRET_KEY_WORKER"
    METADATA_OPTIMIZATION_ENABLED: "false"
    FTP_CONN_TIMEOUT: "60000"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
    LOG4J_CONFIGURATION_FILE: "/etc/config/log4j2.properties"
    ACTIVE_PORT_RANGE_MAX: "15030"
    ACTIVE_PORT_RANGE_MIN: "15000"
    ec2_metadata_ip_url: "http://169.254.169.254/latest/meta-data/public-ipv4"
    ec2_metadata_token_url: "http://169.254.169.254/latest/api/token"
