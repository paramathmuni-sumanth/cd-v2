microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-as2-adaptor"
    NODE_OPTIONS: "--max-old-space-size=922"
    NEWRELIC_CONF_FILE_PATH: "/as2-adaptor/config/newRelic.json"
    AS2_DEBUG_LOGS: "true"
    AS2_SPL_CHAR_SUPPORT_USERIDS: "63455a4563c1266abf0e97f9,617fbc41e9c97a0e4037ef27"
    AWS_SES_ENDPOINT: "email.us-east-1.amazonaws.com"
    AWS_SES_REGION: "us-east-1"
    EACH_LIMIT: "100"
    FILE_SERVICE_K8S_URL: "http://file-service.master-dev-io.svc.cluster.local"
    HTTP_ADAPTOR_URL: "ws://http-adaptor.master-dev-io.svc.cluster.local"
    IO_DOMAIN: "master.dev.integrator.io"
    JAVASCRIPT_RUNTIME_HOST: "js-runtime.master-dev-io.svc.cluster.local"
    JS_RUNTIME_URL_K8S: "http://js-runtime.master-dev-io.svc.cluster.local"
    MAX_PAGE_SIZE_IN_BYTES: "1000000"
    MONGODB_DATABASE: "integrator-master-dev"
    REDIS_PORT: "6379"
    s3_integrator_debug: "integrator-debug-master-dev"
    s3_integrator_error_files: "integrator-error-files-master-dev"
    s3_integrator_files: "integrator-files-master-dev"
    s3_integrator_mongo_fields_data: "integrator-mongo-fields-master-dev"
    s3_integrator_pages: "integrator-pages-master-dev"
    s3_integrator_userdata_delete_30: "integrator-userdata-delete-30-master-dev"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    MONGODB_CLIENT_APP_NAME: "as2-adaptor"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    aws_account_id: "028270547034"
