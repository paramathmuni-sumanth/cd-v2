microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/master-dev-io/sa/ai-agent-adaptor
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: ai-agent-executor
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1600m
          memory: 4Gi
        requests:
          cpu: 800m
          memory: 1.5Gi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-04-14-00-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/ai-agent-executor-s3-role-k8s-master-dev
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/master-dev
    hosts:
      - ai-agent-executor.celigo.io
      - ai-agent-executor.master-dev-io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - ai-agent-executor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.1.0.31.0
      subsetConfig:
        selectorLabels: {}
        routes: []
