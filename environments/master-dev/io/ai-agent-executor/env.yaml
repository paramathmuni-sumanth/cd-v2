microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-env-vars-master-dev"
    NEW_RELIC_APP_NAME: "master-dev-ai-agent-executor"
    NODE_OPTIONS: "--max-old-space-size=250"
    API_EXECUTION_BASE_URL: "http://api-execution.master-dev-core.svc.cluster.local"
    RMS_SERVICE_ENDPOINT_TOKEN: "http://resource-management.master-dev-core.svc.cluster.local"
    FILTER_DOCUMENT_WITH_AGENT_ID: true
    AGENT_MAX_TURNS: "25"
    API_EXECUTION_TIMEOUT_SECONDS: "120"
    MAX_SAME_TOOL_ATTEMPTS_PER_RUN: "8"
    MAX_DUPLICATE_NORMALIZED_TOOL_CALLS: "3"
    MAX_RETRIES_PER_TOOL_CALL: "2"
    MAX_TOOL_TIMEOUT: "300"
    MONGODB_DATABASE: "integrator-master-dev"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-pdd2n1-shard-0&authSource=admin&w=majority"
    MONGODB_URL_SCHEME: "mongodb+srv://"
