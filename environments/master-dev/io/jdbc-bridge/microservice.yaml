microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/master-dev-io/sa/rdbms-adaptor
                  - cluster.local/ns/master-dev-io/sa/integrator-workers
                  - cluster.local/ns/master-dev-io/sa/integrator-workers-ping
                  - cluster.local/ns/master-dev-core/sa/integrator-system-workers
                  - cluster.local/ns/master-dev-io/sa/endpoint-service
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /jdbc-bridge/metrics
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "jdbc-bridge"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: "/jdbc-bridge/livez"
      readinessProbe:
        enabled: true
        path: "/jdbc-bridge/readyz"
      containerPort: 8080
      resources:
        limits:
          cpu: 2250m
          memory: 1750Mi
        requests:
          cpu: 1125m
          memory: 1250Mi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" == "$expected" ]; do count=$(wget -qO- 'http://localhost:8080/jdbc-bridge/openConnections?preStopMode=true'); sleep 1; if [ "$count" == "$expected" ]; then for i in seq 1 5; do count=$(wget -qO- 'http://localhost:8080/jdbc-bridge/openConnections?terminate=true'); sleep 5; done; fi; done; catalina.sh stop;
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2024-08-12-14-45
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/jdbc-bridge-s3-role-k8s-master-dev
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/master-dev
    hosts:
      - jdbc-bridge.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - jdbc-bridge
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    newRelic.json: |
      {
        "enableNR": true,
        "transactions": ["all", "custom"],
        "resources": {
          "_userId": [],
          "_expOrImpId": [],
          "_connectionId": []
        }
      }
  volumes:
    - name: jdbc-bridge-nr-config
      configMap:
        name: jdbc-bridge-config-volume
  volumeMounts:
    - mountPath: "/usr/local/tomcat/config/"
      name: jdbc-bridge-nr-config
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.14.106.0
      subsetConfig:
        selectorLabels: {}
        routes: []
