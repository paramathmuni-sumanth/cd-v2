microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/master-dev-io/sa/flow-management
                  - cluster.local/ns/master-dev-core/sa/resource-management
                  - cluster.local/ns/master-dev-io/sa/integrator-workers
                  - cluster.local/ns/master-dev-io/sa/integrator-workers-ping
                  - cluster.local/ns/master-dev-core/sa/integrator-system-workers
                  - cluster.local/ns/master-dev-io/sa/endpoint-service
                  - cluster.local/ns/master-dev-core/sa/api-execution
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "netsuite-distributed-adaptor"
    subscriptionType:
      enabled: true
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2.5
          memory: 3.5Gi
        requests:
          cpu: 60m
          memory: 3Gi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-12-10-19-56
        celigo.io/scrape: 'true'
      livenessProbe:
        enabled: true
        failureThreshold: 6
      readinessProbe:
        enabled: true
        failureThreshold: 3
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/netsuite-distributed-adaptor-s3-role-k8s-master-dev
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/master-dev
    hosts:
      - netsuite-distributed-adaptor.celigo.io
      - netsuite-distributed-adaptor.master-dev-io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - netsuite-distributed-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: nsda-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs-master-dev
  volumes:
    - name: nsda-nfs-storage
      persistentVolumeClaim:
        claimName: nsda-nfs-pvc
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: nsda-nfs-storage
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.201.0
      subsetConfig:
        selectorLabels: {}
        routes: []
