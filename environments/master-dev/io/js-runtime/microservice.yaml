microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/master-dev-io/sa/integrator-workers
                  - cluster.local/ns/master-dev-io/sa/integrator-workers-ping
                  - cluster.local/ns/master-dev-core/sa/integrator-system-workers
                  - cluster.local/ns/master-dev-core/sa/resource-management
                  - cluster.local/ns/master-dev-io/sa/flow-management
                  - cluster.local/ns/master-dev-io/sa/as2-adaptor
                  - cluster.local/ns/master-dev-io/sa/endpoint-service
                  - cluster.local/ns/master-dev-core/sa/api-execution
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "js-runtime"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 4
          memory: 6Gi
        requests:
          cpu: 250m
          memory: 5Gi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2024-08-12-14-45
        celigo.io/scrape: 'true'
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      connectionPool:
        http:
          idleTimeout: 330s
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/js-runtime-s3-role-k8s-master-dev
  virtualService:
    enabled: true
    gateways:
      - istio-gateway/master-dev
    hosts:
      - js-runtime.celigo.io
      - js-runtime.master-dev-io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - js-runtime
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    logLevel.json: |
      {
        "default": "info"
      }
  volumes:
    - name: loglevel-config-volume
      configMap:
        name: js-runtime-config-volume
  volumeMounts:
    - mountPath: "/etc/config/"
      name: loglevel-config-volume
  deployments:
    - name: app
      deployment:
        image:
          tag: v8upgrade-fb-1.6.11.72.0
      subsetConfig:
        selectorLabels: {}
        routes: []
