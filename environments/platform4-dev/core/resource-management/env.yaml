microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform4-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform4-dev-resource-management"
    NODE_OPTIONS: "--max-old-space-size=1024"
    ACCESSCONTROL_FOR_API_ROUTES: "true"
    AUDIT_ENABLED: "true"
    EACH_LIMIT: "100"
    JAVASCRIPT_S3_BUCKET: "integrator-platform4-dev-scripts"
    JAVASCRIPT_SIZE_LIMIT: "2097152"
    LOOKUP_CACHE_SERVICE_URL: "http://lookup-cache.io.svc.cluster.local"
    NETSUITE_DISTRIBUTED_ADAPTOR_URL: "ws://netsuite-distributed-adaptor.io.svc.cluster.local"
    S3_HEAP_DUMPS: "integrator-platform4-dev-heap-dumps"
    SALESFORCE_ADAPTOR_URL: "ws://salesforce-adaptor.io.svc.cluster.local"
    s3_integrator_error_files: "integrator-platform4-dev-error-files"
    s3_integrator_errors: "integrator-platform4-dev-errors"
    s3_integrator_files: "integrator-platform4-dev-files"
    s3_integrator_mongo_fields_data: "integrator-platform4-dev-mongo-fields"
    s3_integrator_revisions: "integrator-platform4-dev-revisions"
    s3_integrator_templates: "integrator-platform4-dev-templates"
    s3_integrator_templates_published: "integrator-platform4-dev-templates-published"
    FMS_SERVICE_URL: "http://flow-management.io.svc.cluster.local"
    ENDPOINT_SERVICE_URL: "http://endpoint-service.io.svc.cluster.local"
    ec2_metadata_ip_url: "http://169.254.169.254/latest/meta-data/public-ipv4"
    ec2_metadata_token_url: "http://169.254.169.254/latest/api/token"
