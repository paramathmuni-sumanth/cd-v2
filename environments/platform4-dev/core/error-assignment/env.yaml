microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform4-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform4-dev-error-assignment"
    NODE_OPTIONS: "--max-old-space-size=250"
    EACH_LIMIT: "5"
    MAX_ERRORS_TO_PROCESS_PER_EXP_IMP: "25"
    MAX_LOAD: "25"
    NEEDS_NOTIFICATION_NUM_PARTITIONS: "5"
    REFRESH_KCGW_FREQUENCY: "10000"
    s3_integrator_errors: "integrator-platform4-dev-errors"
    s3_integrator_kcgw: "integrator-platform4-dev-kcgw"
    s3_integrator_mongo_fields_data: "integrator-platform4-dev-mongo-fields"
    s3_integrator_retries: "integrator-platform4-dev-retries"
    s3_integrator_userdata_delete_30: "integrator-platform4-dev-userdata-delete-30"
    sqs_delay_helper: "delay_helper"
