microservice:
  env:
    NODE_ENV: "cd"
    JAVA_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform4-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform4-dev-ftp-bridge-ms-active"
    NODE_OPTIONS: "--max-old-space-size=512"
    s3_integrator_userdata_delete_30: "integrator-platform4-dev-userdata-delete-30"
    CATALINA_OPTS: "-Xms400m -Xmx600m -XX:+UseG1GC -XX:G1HeapRegionSize=2m -XX:InitiatingHeapOccupancyPercent=30 -XX:MaxGCPauseMillis=250 -XX:ParallelGCThreads=3 -XX:ConcGCThreads=2 -XX:NewRatio=3 -Xlog:gc*,gc+ref=debug:file=gc.log:time -XX:+PrintGCDetails"
