microservice:
  env:
    NODE_ENV: "staging"
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-platform5-dev-env-vars
    NEW_RELIC_APP_NAME: platform5-dev-integrator-system-workers
    NODE_OPTIONS: --max-old-space-size=250
    DISABLE_FILE_LOGS: "true"
    FTP_ADAPTOR_OTT_EXPIRY: "43200000"
    FTP_ADAPTOR_CACHE_OTT_OFFSET: "21600000"
    OVERAGE_EMAIL_DAY_OF_MONTH: "18"
    CRASH_RECOVERY_DISABLED: "false"
    WORKER_TEST_SERVER_PORT: "5060"
