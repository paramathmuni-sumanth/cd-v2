microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/io/sa/lookup-cache
          to:
            - operation:
                methods:
                  - PUT
                paths:
                  - '*/lookupCacheSize'
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/io/sa/gptverse
                  - cluster.local/ns/ui/sa/converse-bot-api
                  - cluster.local/ns/io/sa/salesforce-adaptor
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/io/sa/celigo-agent
                  - cluster.local/ns/ui/sa/integrator-bff
                  - cluster.local/ns/io/sa/internal-gateway
                  - cluster.local/ns/io/sa/agent-management-service
                  - cluster.local/ns/io/sa/audit-service
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "resource-management"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1000m
          memory: 1Gi
        requests:
          cpu: 500m
          memory: 512Mi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-08-20-15-41
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::380555188672:role/resource-management-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - resource-management.celigo.io
      - resource-management.core.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - resource-management
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: user-token-fb-0.0.1.1735.0
      subsetConfig:
        selectorLabels: {}
        routes: []
