microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform5-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform5-dev-netsuite-distributed-adaptor"
    NODE_OPTIONS: "--max-old-space-size=250"
    PORT: "5000"
    s3_integrator_netsuite_metadata: "integrator-platform5-dev-metadata"
    s3_integrator_userdata_delete_30: "integrator-platform5-dev-userdata-delete-30"
    MAX_ALL_BUFFERS_LIMIT: "500000000"
    MULTI_LOGS_BUFFER_LIMIT: "10000000"
    SINGLE_LOG_BUFFER_LIMIT: "25000000"
    IDLE_FLUSH_INTERVAL: "500"
    HARD_FLUSH_INTERVAL: "1000"
    FLUSH_SCHEDULE_INTERVAL: "250"
    TOTAL_BUFFER_COUNT: "1000"
