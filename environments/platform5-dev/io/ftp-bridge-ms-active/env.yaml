microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-platform5-dev-env-vars"
    NEW_RELIC_APP_NAME: "platform5-dev-ftp-bridge-ms-active"
    LOG4J_CONFIGURATION_FILE: "/etc/config/log4j2.properties"
    JDK_JAVA_OPTIONS: "--add-opens=java.base/sun.security.ssl=ALL-UNNAMED --add-opens=java.base/sun.security.util=ALL-UNNAMED"
    NODE_OPTIONS: "--max-old-space-size=512"
    JAVA_ENV: "cd"
    CATALINA_OPTS: "-Xms3072m -Xmx4096m -XX:+UseG1GC -XX:G1HeapRegionSize=2m -XX:InitiatingHeapOccupancyPercent=30 -XX:MaxGCPauseMillis=250 -XX:ParallelGCThreads=3 -XX:ConcGCThreads=2 -XX:NewRatio=3 -Xlog:gc*,gc+ref=debug:file=gc.log:time -XX:+PrintGCDetails"
    s3_integrator_userdata_delete_30: "integrator-platform5-dev-userdata-delete-30"
    METADATA_OPTIMIZATION_ENABLED: "true"
