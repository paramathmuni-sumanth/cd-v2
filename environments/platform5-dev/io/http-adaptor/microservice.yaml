microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/salesforce-adaptor
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/as2-adaptor
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/io/sa/ai-agent-adaptor
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/infra-tasks/sa/infra-tasks
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: http-adaptor
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        initialDelaySeconds: 20
        periodSeconds: 15
        timeoutSeconds: 15
        failureThreshold: 5
        config:
          exec:
            command:
              - /bin/sh
              - /opt/docker/probe-scripts/probe.sh
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 260m
          memory: 250Mi
        requests:
          cpu: 60m
          memory: 150Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: '15001'
        redeployTimestamp: 2025-08-20-15-40
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::380555188672:role/http-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - http-adaptor.io.svc.cluster.local
      - http-adaptor.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - http-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.532.0
      subsetConfig:
        selectorLabels: {}
        routes: []
