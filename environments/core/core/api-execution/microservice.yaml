microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/io/sa/api-gateway
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: api-execution
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2000m
          memory: 3Gi
        requests:
          cpu: 200m
          memory: 2.5Gi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        redeployTimestamp: 2025-07-10-06-39
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/api-execution-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - api-execution.core.svc.cluster.local
      - api-execution.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - api-execution
            topologyKey: kubernetes.io/hostname
          weight: 100
  configVolume:
    logLevel.json: |
      {
        "default": "info",
        "configPerPod": false
      }
  PersistentVolumeClaims:
    - name: api-execution-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  volumes:
    - name: api-execution-nfs-storage
      persistentVolumeClaim:
        claimName: api-execution-nfs-pvc
    - name: log-level-config
      configMap:
        name: api-execution-config-volume
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: api-execution-nfs-storage
    - mountPath: "/etc/config/"
      name: log-level-config
  deployments:
    - name: app
      deployment:
        image:
          tag: api-logs-fb-0.0.1.149.0
      subsetConfig:
        selectorLabels: {}
        routes: []
