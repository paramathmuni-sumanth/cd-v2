microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-core-env-vars"
    NEW_RELIC_APP_NAME: "core-file-storage"
    NODE_OPTIONS: "--max-old-space-size=250"
    PORT: "5000"
    STORAGE_S3_BUCKET_NAME: "integrator-core-userdata-delete-never"
    STORAGE_SKIP_SNS_SIGNATURE_VALIDATION: "false"
    STORAGE_PRESIGN_EXPIRY: "86400"
    REDIS_KEY_PREFIX_ACTIVE: "storage:active:"
    REDIS_KEY_PREFIX_RECYCLE_BIN: "storage:recycleBin:"
    MAX_PART_SIZE: "1"
    STORAGE_SNS_TOPIC_ARNS: "arn:aws:sns:ap-south-1:028270547034:file-storage-core"
    IO_DOMAIN: "api.core.dev.integrator.io"
    STORAGE_FOLDER_CASCADE_QUEUE_URL: "https://sqs.ap-south-1.amazonaws.com/028270547034/core-file-storage-async-operations.fifo"
    AUDIT_ENABLED: "true"
    AUDIT_SERVICE_BASE_URL: "http://audit-service.io.svc.cluster.local"
