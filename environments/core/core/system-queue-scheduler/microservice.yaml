microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  roles:
    enabled: true
    rules:
      - apiGroups:
          - coordination.k8s.io
        resources:
          - leases
        verbs:
          - get
          - create
          - update
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: system-queue-scheduler
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 260m
          memory: 250Mi
        requests:
          cpu: 260m
          memory: 250Mi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-04-13-3-10
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - wget -qO- --post-data="" --timeout=5 'http://localhost:5000/releaseLeaderLease' || true; expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/system-queue-scheduler-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - system-queue-scheduler.core.svc.cluster.local
      - system-queue-scheduler.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - system-queue-scheduler
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.18.0
      subsetConfig:
        selectorLabels: {}
        routes: []
