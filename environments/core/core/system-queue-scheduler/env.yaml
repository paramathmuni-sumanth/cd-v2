microservice:
  env:
    NODE_ENV: production
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-core-env-vars
    NEW_RELIC_APP_NAME: core-system-queue-scheduler
    NODE_OPTIONS: --max-old-space-size=250
    PORT: 5000
    MONGODB_CLIENT_APP_NAME: system-queue-scheduler
    SCHEDULER_LOOP_INTERVAL: 3000
    LEADER_ELECTION_ENABLED: "true"
    LEADER_ELECTION_LEASE_NAME: system-queue-scheduler-leader
    LEADER_ELECTION_LEASE_NAMESPACE: core
    LEADER_ELECTION_LEASE_DURATION_SECONDS: "30"
    LEADER_ELECTION_RENEW_DEADLINE_SECONDS: "20"
    LEADER_ELECTION_RETRY_PERIOD_SECONDS: "5"
