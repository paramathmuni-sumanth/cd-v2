microservice:
  env:
    # General Configuration
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    IO_DOMAIN: "core.dev.integrator.io"
    PORT: "5000"
    # S3 Configuration
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-core-env-vars"
    s3_connection_timeout: "60000"
    s3_max_sockets: "1000"
    s3_integrator_debug: "integrator-core-debug"
    s3_integrator_error_files: "integrator-core-error-files"
    s3_integrator_errors: "integrator-core-errors"
    s3_integrator_event_reports: "integrator-core-event-reports"
    s3_integrator_files: "integrator-core-files"
    s3_integrator_metadata_bucket: "integrator-core-metadata"
    s3_integrator_mongo_fields_data: "integrator-core-mongo-fields"
    s3_integrator_netsuite_metadata: "integrator-core-metadata"
    s3_integrator_pages: "integrator-core-pages"
    s3_integrator_retries: "integrator-core-retries"
    s3_integrator_retry_data_keys: "integrator-core-retry-data-keys"
    s3_integrator_revisions: "integrator-core-revisions"
    s3_integrator_states: "integrator-core-states"
    s3_integrator_sqs: "integrator-core-sqs"
    s3_integrator_templates: "integrator-core-templates"
    s3_integrator_templates_published: "integrator-core-templates-published"
    s3_integrator_userdata_delete_30: "integrator-core-userdata-delete-30"
    JAVASCRIPT_S3_BUCKET: "integrator-core-scripts"
    # MongoDB Configuration
    MONGODB_DATABASE: "integrator"
    MONGODB_CLIENT_APP_NAME: "integrator-system-workers"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    # Kafka Configuration
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    # AWS SES Configuration
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    # Worker Configuration
    MAX_CONSUMER_CHILD_PROCESSES: "1"
    MAX_LOAD: "1000"
    MAX_OPEN_FILE_DESCRIPTORS: "65535"
    WORKER_TEST_SERVER_PORT: "5060"
    # Frequency Configuration
    HEALTH_CHECK_FREQUENCY: "60000"
    PERSIST_JOB_FREQUENCY: "5000"
    REFRESH_QG_FREQUENCY: "1000"
    REFRESH_KCGW_FREQUENCY: "60000"
    ADAPTOR_HEARTBEAT_INTERVAL: "50"
    LICENSE_SYSTEM_BATCH_PROCESS_PERIOD: "86400000"
    # Feature Flags
    AUDIT_ENABLED: "true"
    MONGOOSE_QUERY_USERID_PARSER_ENABLED: "true"
    ENABLE_API_GATING: "true"
    DISABLE_FILE_LOGS: "true"
    NUM_PARTITION_FLOW_EVENTS: 5
    LOOKUP_CACHE_SHARDING_ENABLED: "true"
    # Migration Flags
    SKIP_CLICKHOUSE_MIGRATION: "true"
    SKIP_DYNAMODB_LOOKUPCACHE_MIGRATION: "false"
    SKIP_INFLUXDB_FLOWEVENTS_MIGRATION: "true"
    # Sandbox Migration
    SANDBOX_MIGRATION_REMINDER_DAYS: "18"
    SANDBOX_MIGRATION_WORKER_TYPE: "sandboxMigration"
    # InfluxDB Configuration
    INFLUXDB_FLOWEVENTS_BUCKETNAME: "flowEvents"
    INFLUXDB_FLOWEVENTS_1HR_BUCKETNAME: "flowEvents_1hr"
    # API Usage Configuration
    GRAVITEE_API_BASE_URL: "management.apim.core.integrator.io"
    OVERAGE_EMAIL_DAY_OF_MONTH: "18"
    # Queue Configuration
    SQS_PREFIX: "$"
    sqs_delay_helper: "delay_helper"
    # Service URLs
    NEW_RELIC_APP_NAME: "core-integrator-system-workers"
    NETSUITE_DISTRIBUTED_ADAPTOR_URL: "ws://netsuite-distributed-adaptor.io.svc.cluster.local"
    NODE_OPTIONS: "--max-old-space-size=2048"
    FLOW_MANAGEMENT_SERVICE_URL: http://flow-management.io.svc.cluster.local
    RMS_URL: http://resource-management.core.svc.cluster.local
    SALESFORCE_ADAPTOR_URL: "ws://salesforce-adaptor.io.svc.cluster.local"
    SALESFORCE_DA_PACKAGE_URL: "/packaging/installPackage.apexp?p0=04t3m000000Q89d"
    LOOKUP_CACHE_SERVICE_URL: "http://lookup-cache.io.svc.cluster.local"
    # FTP Adaptor Configuration
    FTP_ADAPTOR_OTT_EXPIRY: "43200000"
    FTP_ADAPTOR_CACHE_OTT_OFFSET: "21600000"
    # Adaptor URLs (Non-sensitive - internal k8s cluster-local)
    API_GATEWAY_URL: "http://api-gateway.io.svc.cluster.local"
    AS2_ADAPTOR_URL: "ws://as2-adaptor.io.svc.cluster.local"
    DATA_WAREHOUSE_ADAPTOR_URL: "ws://data-warehouse-adaptor.io.svc.cluster.local"
    FA_LISTENER_BASE_URL: "https://api.core.integrator.io"
    FILE_ADAPTOR_URL: "ws://file-adaptor.io.svc.cluster.local"
    FILE_SERVICE_K8S_URL: "http://file-service.io.svc.cluster.local"
    GPTVERSE_MICROSERVICE_URL: "http://gptverse.io.svc.cluster.local"
    HTTP_ADAPTOR_URL: "ws://http-adaptor.io.svc.cluster.local"
    JS_RUNTIME_URL_K8S: "http://js-runtime.io.svc.cluster.local"
    NOSQL_ADAPTOR_URL: "ws://nosql-db-adaptor.io.svc.cluster.local"
    RDBMS_ADAPTOR_URL: "ws://rdbms-adaptor.io.svc.cluster.local"
    SYSTEM_APIS_URL: "http://system-apis.core.svc.cluster.local"
