microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/file-adaptor
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: as2-adaptor
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 750m
          memory: 2.17Gi
        requests:
          cpu: 100m
          memory: 1.66Gi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
        celigo.io/scrape: 'true'
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 2
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::028270547034:role/as2-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - as2-adaptor.io.svc.cluster.local
      - as2-adaptor.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - as2-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: app
      deployment:
        image:
          tag: newplatformlicensev2-fb-0.0.1.104.0
      subsetConfig:
        selectorLabels: {}
        routes: []
