microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-core-env-vars
    NEW_RELIC_APP_NAME: core-agent-management-service
    NODE_OPTIONS: --max-old-space-size=250
    PORT: "5000"
    MONGODB_DATABASE: "integrator"
    MONGODB_CLIENT_APP_NAME: "agent-management-service"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    REDIS_URL: "redis://redis.core.svc.cluster.local:6379"
    s3_integrator_agents: "integrator-core-agents"
    s3_integrator_files: "integrator-core-files"
    s3_integrator_states: "integrator-core-states"
    s3_integrator_errors: "integrator-core-errors"
    s3_integrator_debug: "integrator-core-debug"
    s3_integrator_revisions: "integrator-core-revisions"
    s3_integrator_retries: "integrator-core-retries"
    s3_integrator_mongo_fields_data: "integrator-core-mongo-fields"
    s3_integrator_userdata_delete_30: "integrator-core-userdata-delete-30"
    S3_HEAP_DUMPS: "integrator-core-heap-dumps"
    s3_integrator_sqs: "integrator-core-sqs"
    IO_DOMAIN: "core.dev.integrator.io"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    INTERNAL_HMAC_HOST_NAME: "internal-hmac.core.dev.integrator.io"
    NUM_PORTS: "10"
    AGENT_EXTENSION_NOTIFICATION_EMAIL: "agent-notifications@celigo.com"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    CELIGO_SUPPORT_EMAIL: "io.auto.api.core+supportaccess@celigo.com"
    AGENT_LOGS_VALIDATION_BATCH_SIZE: "100"
    AGENT_LOGS_WRITING_BATCH_SIZE: "50"
    MAX_MSG_BYTES_ALLOWED_PER_AGENT_LOG_REQUEST: "1048576"
    EACH_LIMIT: "100"
    HEAP_PROFILER_DISABLED_FOR_WEB: "true"
    WEB_INSTANCE_MAX_OLD_SPACE_SIZE: "1024"
    HEAP_THRESHOLD_VALUE: "1600"
    DELTA_HEAP_THRESHOLD_VALUE: "300"
    HEAP_INTERVAL_CHECK: "30000"
    MICROSERVICE_REQUEST_TIMEOUT: "300000"
    MICROSERVICE_MAX_CLIENT_IDLE_TIMEOUT_DURATION: "3600000"
    LOOKUP_CACHE_SERVICE_URL: "http://lookup-cache.io.svc.cluster.local"
    AUTHORIZED_USER_HEADER: "x-authorized-user"
    JAVASCRIPT_RUNTIME_HOST: "js-runtime.io.svc.cluster.local"
    JS_RUNTIME_URL_K8S: "http://js-runtime.io.svc.cluster.local"
    JAVASCRIPT_S3_BUCKET: "integrator-core-scripts"
    JAVASCRIPT_S3_REYCLEBIN_BUCKET: "integrator-core-scripts-recyclebin"
    JAVASCRIPT_SIZE_LIMIT: "2097152"
    SKIP_SSH_CONNECTION_VERIFICATION: "false"
    AUDIT_ENABLED: "true"
    ACCESSCONTROL_FOR_API_ROUTES: "true"
    NEW_RELIC_NO_CONFIG_FILE: "true"
    NEW_RELIC_DISTRIBUTED_TRACING_ENABLED: "true"
    NEW_RELIC_LOG: "stdout"
    TRANSFER_RATE_LIMITER_BUCKET_SIZE: "100"
    RMS_SERVICE_URL: "http://resource-management.core.svc.cluster.local"
