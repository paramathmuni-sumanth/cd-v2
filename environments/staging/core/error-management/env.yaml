microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-error-management"
    NODE_OPTIONS: "--max-old-space-size=2048"
    EACH_LIMIT: "5"
    IO_DOMAIN: "staging.integrator.io"
    MAX_ERRORS_TO_PROCESS_PER_EXP_IMP: "25"
    MAX_LOAD: "25"
    NEEDS_NOTIFICATION_NUM_PARTITIONS: "2"
    REFRESH_KCGW_FREQUENCY: "10000"
    s3_integrator_errors: "integrator-staging-errors"
    s3_integrator_kcgw: "integrator-staging-kcgw"
    s3_integrator_retries: "integrator-staging-retries"
    sqs_delay_helper: "delay_helper_staging"
    HEAP_PROFILER_ENABLED: true
    S3_HEAP_DUMPS: "integrator-staging-heap-dumps"
    S3_HEAP_DUMPS_BUCKET: "integrator-staging-heap-dumps"
    HEAP_THRESHOLD_VALUE: "262144000"
    MEMORY_SNAPSHOT_ENABLED: true
