microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: streaming-service
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 5
          memory: 5Gi
        requests:
          cpu: 500m
          memory: 4Gi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-03-30-14-00
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 2
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::609704034070:role/streaming-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - streaming-service.core.svc.cluster.local
      - streaming-service.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - streaming-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  deployments:
    - name: externalusers
      env:
        INTERNAL_USAGE: false
        INTERNAL_USAGE_USER_IDS: 5301043caa20740200000001,6698c19b2b5ae69ee08f61fa,64a6e1473a68b34f54ed35ef
      deployment:
        image:
          tag: ml-1.0.0.61.0
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: app
      env:
        INTERNAL_USAGE: true
        INTERNAL_USAGE_USER_IDS: 5301043caa20740200000001,6698c19b2b5ae69ee08f61fa,64a6e1473a68b34f54ed35ef
      deployment:
        image:
          tag: ml-1.0.0.61.0
      subsetConfig:
        selectorLabels: {}
        routes: []
