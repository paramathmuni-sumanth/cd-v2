microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-file-storage"
    NODE_OPTIONS: "--max-old-space-size=250"
    PORT: "5000"
    STORAGE_S3_BUCKET_NAME: "integrator-staging-userdata-delete-never"
    STORAGE_PRESIGN_EXPIRY: "86400"
    REDIS_KEY_PREFIX_ACTIVE: "storage:active:"
    REDIS_KEY_PREFIX_RECYCLE_BIN: "storage:recycleBin:"
    MAX_NESTING_DEPTH: "20"
    MAX_PART_SIZE: "100"
    STORAGE_FREE_TIER_OVERAGE_LIMIT: "50"
    STORAGE_LICENSED_OVERAGE_LIMIT: "200"
    MONGODB_CLIENT_APP_NAME: "file-storage"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    IO_DOMAIN: "staging.integrator.io"
    FILE_STORAGE_SNS_TOPIC_ARNS: "arn:aws:sns:us-east-1:609704034070:file-storage-notification"
    STORAGE_SNS_TOPIC_ARNS: "arn:aws:sns:us-east-1:609704034070:file-storage-notification"
