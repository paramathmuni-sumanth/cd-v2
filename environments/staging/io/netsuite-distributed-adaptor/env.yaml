microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-netsuite-distributed-adaptor"
    NODE_OPTIONS: "--max-old-space-size=2500"
    PORT: "5000"
    s3_integrator_debug: "integrator-qa-debug"
    s3_integrator_files: "integrator-staging-files"
    s3_integrator_netsuite_metadata: "integrator-staging-metadata"
    s3_integrator_userdata_delete_30: "integrator-staging-userdata-delete-30"
    APP_NAME: "netsuite-distributed-adaptor"
    NETSUITE_WEBSERVICES_ADAPTOR_URL: "ws://netsuite-webservices-adaptor.io.svc.cluster.local"
    MAX_ALL_BUFFERS_LIMIT: "500000000"
    MULTI_LOGS_BUFFER_LIMIT: "10000000"
    SINGLE_LOG_BUFFER_LIMIT: "25000000"
    IDLE_FLUSH_INTERVAL: "500"
    HARD_FLUSH_INTERVAL: "1000"
    FLUSH_SCHEDULE_INTERVAL: "250"
    TOTAL_BUFFER_COUNT: "1000"
    RTO_LOG_ENABLE: "true"
    CLICKHOUSE_ENABLED: "true"
    CLICKHOUSE_PORT: 8443
    CLICKHOUSE_NS_PERF_TABLE: "ns_staging_api_performance_metrics"
    CLICKHOUSE_NS_LOOKUP_PERF_TABLE: "ns_staging_api_lookup_performance_metrics"
