microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-authentication-service"
    NODE_OPTIONS: "--max-old-space-size=1024"
    CANARY_SERVICE_NAME_AND_KEYS_LIST: "http-adaptor:http-adaptor,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,endpoint-service:endpoint-service,as2-adaptor:as2-adaptor,salesforce-adaptor:salesforce-adaptor,integrator-app-ui:integrator-app-ui,netsuite-distributed-adaptor:netsuite-distributed-adaptor,netsuite-webservices-adaptor:netsuite-webservices-adaptor,file-adaptor:file-adaptor,file-service:file-service,api-execution:api-execution"
    IO_DOMAIN_FOR_GLOBAL_ID_SERVICE: "https://staging.integrator.io/system"
    CELIGO_SUPPORT_EMAIL: "io.auto.api.qa+supportaccess@celigo.com"
    SIGNIN_RATE_LIMIT_WINDOW_SEC: 60
    SIGNIN_RATE_LIMIT_REQUESTS: 1000
    SIGNIN_RATE_LIMIT_MAX_TOTAL: 10000
    DISABLE_MULTI_ENV_SIGNUP: false
    ENABLE_ENTERPRISE_LOGGING_BY_DEFAULT: true
    DISABLE_MFA_ENFORCEMENT: 'false'
    DISABLE_MFA_ENFORCEMENT_DATE: 'false'
