microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/integrator-workers-ping
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/internal-gateway
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "authentication-service"
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        failureThreshold: 15
      readinessProbe:
        failureThreshold: 5
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 3000m
          memory: 1536Mi
        requests:
          cpu: 800m
          memory: 1Gi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-06-12-18-00
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::609704034070:role/authentication-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - authentication-service.celigo.io
      - authentication-service.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - authentication-service
            topologyKey: kubernetes.io/hostname
          weight: 100
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: application-type
                operator: In
                values:
                  - core_auth
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  tolerations:
    - key: "application-type"
      operator: "Equal"
      value: "core_auth"
      effect: "NoSchedule"
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.457.0
      subsetConfig:
        selectorLabels: {}
        routes: []
