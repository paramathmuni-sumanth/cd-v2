microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: stitcher-service
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 8080
      resources:
        limits:
          cpu: 4
          memory: 5Gi
        requests:
          cpu: 500m
          memory: 4Gi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - wget -qO- 'http://localhost:8080/prestop';
      podAnnotations:
        celigo.io/scrape: 'fast'
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /healthz
            port: http
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 5
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::609704034070:role/stitcher-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - stitcher-service.io.svc.cluster.local
      - stitcher-service.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - stitcher-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  PersistentVolumeClaims:
    - name: stitcher-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  volumes:
    - name: stitcher-nfs-storage
      persistentVolumeClaim:
        claimName: stitcher-nfs-pvc
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: stitcher-nfs-storage
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.143.0
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 5
          pollingInterval: 15
          cooldownPeriod: 60
          triggerAuthentication:
            podIdentity:
              provider: aws
              identityOwner: keda
          triggers:
            - type: aws-sqs-queue
              authenticationRef:
                name: stitcher-service-app-trigger-auth
              metadata:
                queueURL: https://sqs.us-east-1.amazonaws.com/609704034070/stitch_enterprise_logs.fifo
                queueLength: "10"
                awsRegion: "us-east-1"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
      subsetConfig:
        selectorLabels: {}
        routes: []
