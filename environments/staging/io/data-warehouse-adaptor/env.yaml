microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-data-warehouse-adaptor"
    NODE_OPTIONS: "--max-old-space-size=1000"
    NEWRELIC_CONF_FILE_PATH: "/data-warehouse-adaptor/config/newRelic.json"
    PORT: "5000"
    s3_integrator_debug: "integrator-staging-debug"
    s3_integrator_userdata_delete_30: "integrator-staging-userdata-delete-30"
    APP_NAME: "data-warehouse-adaptor"
    API_TIME_OUT: "10"
