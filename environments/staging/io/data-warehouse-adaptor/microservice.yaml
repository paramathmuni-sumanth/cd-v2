microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/integrator-workers-ping
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "data-warehouse-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1500m
          memory: 2Gi
        requests:
          cpu: 750m
          memory: 1.5Gi
      livenessProbe:
        enabled: true
        config:
          exec:
            command:
              - /bin/bash
              - /opt/docker/probe-scripts/probe.sh
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 12
        failureThreshold: 5
        successThreshold: 1
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 7200
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::609704034070:role/data-warehouse-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - data-warehouse-adaptor.celigo.io
      - data-warehouse-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - data-warehouse-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAP_DUMP_ENABLED": false,
        "MAX_PERF_DUMP_PER_HOUR": 2
      }
    logLevel.json: |
      {
        "default": "debug"
      }
    newRelic.json: |
      {
        "enableNR": true,
        "distributedNR": true,
        "transactions": ["custom"],
        "resources": {
          "_userId": [],
          "_importId": [],
          "_exportId": [],
          "_connectionId": []
        }
      }
  PersistentVolumeClaims:
    - name: data-warehouse-adaptor-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-dwh
    - name: data-warehouse-adaptor-cpu-profiling-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-data-warehouse-adaptor-cpu-profiling
  volumes:
    - name: probe-config-volume
      configMap:
        name: data-warehouse-adaptor-config-volume
    - name: config-volume
      configMap:
        name: data-warehouse-adaptor-config-volume
    - name: data-warehouse-adaptor-nfs-storage
      persistentVolumeClaim:
        claimName: data-warehouse-adaptor-pvc
    - name: data-warehouse-adaptor-nr-config
      configMap:
        name: data-warehouse-adaptor-config-volume
    - name: data-warehouse-adaptor-cpu-profiling-volume
      persistentVolumeClaim:
        claimName: data-warehouse-adaptor-cpu-profiling-pvc
  volumeMounts:
    - mountPath: /service-core-dumps
      name: data-warehouse-adaptor-cpu-profiling-volume
    - mountPath: /opt/probe-config
      name: probe-config-volume
    - mountPath: "/data-warehouse-adaptor/bulk_load_files/"
      name: data-warehouse-adaptor-nfs-storage
    - mountPath: "/data-warehouse-adaptor/config/"
      name: data-warehouse-adaptor-nr-config
    - name: config-volume
      mountPath: /etc/config
  deployments:
    - name: app-cloudops-15102-di
      deployment:
        podAnnotations:
          celigo.io/scrape: 'fast'
        image:
          tag: 2026.5.2-patch-0.1.16.216.0
        resources:
          limits:
            cpu: 1.5
            memory: 2000Mi
          requests:
            cpu: 450m
            memory: 1500Mi
        livenessProbe:
          enabled: true
          config:
            exec:
              command:
                - /bin/bash
                - /opt/docker/probe-scripts/probe.sh
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 12
          failureThreshold: 5
          successThreshold: 1
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 5
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="data-warehouse-adaptor-app-cloudops-15102-di"})
                threshold: "60"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              executionContextUserId:
                regex: '^(66fbf6b4e883147f98d66988)$'
    - name: app
      deployment:
        image:
          tag: 2026.5.2-patch-0.1.16.216.0
      subsetConfig:
        selectorLabels: {}
        routes: []
