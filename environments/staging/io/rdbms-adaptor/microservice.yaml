microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/integrator-workers-ping
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    secretRef: newrelic-secrets
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "rdbms-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2500m
          memory: 2Gi
        requests:
          cpu: 400m
          memory: 1.5Gi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 86400
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::609704034070:role/rdbms-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - rdbms-adaptor.celigo.io
      - rdbms-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - rdbms-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    newRelic.json: |
      {
        "enableNR": true,
        "distributedNR": true,
        "transactions": ["custom"],
        "resources": {
          "_userId": [],
          "_importId": [],
          "_exportId": [],
          "_connectionId": []
        }
      }
  volumes:
    - name: rdbms-adaptor-nr-config
      configMap:
        name: rdbms-adaptor-config-volume
  volumeMounts:
    - mountPath: "/rdbms-adaptor/config/"
      name: rdbms-adaptor-nr-config
  deployments:
    - name: app-cloudops-15102-di
      deployment:
        podAnnotations:
          celigo.io/scrape: 'fast'
        image:
          tag: ml-0.7.5.243.0
        resources:
          limits:
            cpu: 3000m
            memory: 2000Mi
          requests:
            cpu: 1200m
            memory: 1500Mi
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 5
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="rdbms-adaptor-app-cloudops-15102-di"})
                threshold: "180"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              executionContextUserId:
                regex: '^(66fbf6b4e883147f98d66988)$'
    - name: app
      deployment:
        image:
          tag: ml-0.7.5.243.0
      subsetConfig:
        selectorLabels: {}
        routes: []
