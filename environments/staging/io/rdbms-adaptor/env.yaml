microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-rdbms-adaptor"
    NODE_OPTIONS: "--max-old-space-size=1000"
    NEWRELIC_CONF_FILE_PATH: "/rdbms-adaptor/config/newRelic.json"
    JDBC_BRIDGE_URL: "ws://jdbc-bridge.io.svc.cluster.local/jdbc-bridge"
    PORT: "5000"
    s3_integrator_userdata_delete_30: "integrator-staging-userdata-delete-30"
    HEAP_PROFILER_ENABLED: 'true'
    S3_HEAP_DUMPS_BUCKET: integrator-staging-heap-dumps
