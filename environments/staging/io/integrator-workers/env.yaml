microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    AWS_NODEJS_CONNECTION_REUSE_ENABLED: "1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-integrator-workers"
    NODE_OPTIONS: "--max-old-space-size=512"
    JS_RUNTIME_KEEP_ALIVE: "true"
    JS_RUNTIME_KEEP_ALIVE_MSECS: "60000"
    JS_RUNTIME_REQUEST_TIMEOUT: "300000"
    JS_RUNTIME_FREE_SOCKET_TIMEOUT: "330000"
    JS_RUNTIME_SOCKET_ACTIVE_TTL: "420000"
    JS_RUNTIME_SOCKET_TIMEOUT: "300000"
    DISABLE_FILE_LOGS: "true"
    FTP_ADAPTOR_OTT_EXPIRY: "43200000"
    FTP_ADAPTOR_CACHE_OTT_OFFSET: "21600000"
    AI_AGENT_ADAPTOR_URL: "ws://ai-agent-adaptor.io.svc.cluster.local"
    USE_REQUEST_FALLBACK: true
    IDLE_FLUSH_INTERVAL: 1000
    HARD_FLUSH_INTERVAL: 2000
    FLUSH_SCHEDULE_INTERVAL: 1000
    MAX_ALL_BUFFERS_LIMIT: 1048576000
    TOTAL_BUFFER_COUNT: 1000
    RATE_LIMIT_LOOP_DELAY: 5000
    MICROSERVICE_WS_CONNECTION_TIMEOUT: 120000
    s3_retry_wrapper_enabled: true
    OFFLINE_BURST_JOB_CLOSE_THRESHOLD: 120000
    ENABLE_FLOW_CONNECTION_ID_EXTRACTION: "true"
    ENABLE_CLICKHOUSE_FOR_ALL_USERS: "true"
    MONGODB_JOB_PURGE_DAYS: "7"
    PURGEAT_EXEMPT_USERS: "6978c2e865ebee0b8edfb8b0,6a193ebda2677bfd901c9a11"
