microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/salesforce-adaptor
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/integrator-workers-ping
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/as2-adaptor
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/infra-tasks/sa/infra-tasks
                  - cluster.local/ns/io/sa/ai-agent-adaptor
                  - cluster.local/ns/monitoring/sa/gatus-gitops
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
        - from:
            - source:
                principals:
                  - cluster.local/ns/monitoring/sa/gatus-gitops
          to:
            - operation:
                notPaths:
                  - "/readyz"
  common:
    secretRef: newrelic-secrets
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: http-adaptor
    subscriptionType:
      enabled: false
    deployment:
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 10%
          maxUnavailable: 10%
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1500m
          memory: 3814Mi
        requests:
          cpu: 1000m
          memory: 3302Mi
      livenessProbe:
        enabled: true
        config:
          exec:
            command:
              - /bin/bash
              - /opt/docker/probe-scripts/probe.sh
        initialDelaySeconds: 20
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 10
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 21600
      podAnnotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: '15001'
        redeployTimestamp: 2026-03-25-13-40
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  deployments:
    - name: app-cloudops-15102-di
      env:
        NODE_OPTIONS: "--no-network-family-autoselection --insecure-http-parser"
      deployment:
        podAnnotations:
          celigo.io/scrape: 'fast'
        image:
          tag: ml-1.0.0.527.0
        resources:
          limits:
            cpu: 2000m
            memory: 3302Mi
          requests:
            cpu: 0.8
            memory: 2790Mi
        livenessProbe:
          enabled: true
          config:
            exec:
              command:
                - /bin/bash
                - /opt/docker/probe-scripts/probe.sh
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 10
        terminationGracePeriodSeconds: 86400
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 10
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="http-adaptor-app-cloudops-15102-di"})
                threshold: "70"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              executionContextUserId:
                regex: '^(66fbf6b4e883147f98d66988)$'
    - name: app
      env:
        NODE_OPTIONS: "--no-network-family-autoselection --insecure-http-parser"
      deployment:
        image:
          tag: ml-1.0.0.527.0
      subsetConfig:
        selectorLabels: {}
        routes: []
  destinationRules:
    enabled: true
    trafficPolicy:
      connectionPool:
        tcp:
          tcpKeepalive:
            time: 7200s
            interval: 75s
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    extraLabels:
      istio.io/persistent-session-header: x-session-header
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: 'arn:aws:iam::609704034070:role/http-adaptor-s3-role-k8s'
  virtualService:
    enabled: true
    hosts:
      - http-adaptor.celigo.io
      - http-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - http-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: http-adaptor-nfs-pvc-v2
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-http-adaptor
    - name: http-adaptor-enterprise-logs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  configVolume:
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAP_DUMP_ENABLED": false,
        "MAX_PERF_DUMP_PER_HOUR": 1
      }
    newRelic.json: |
      {
        "enableNR": true,
        "distributedNR": true,
        "transactions": ["all", "custom"],
        "resources": {
          "_userId": [],
          "_importId": [],
          "_exportId": [],
          "_connectionId": []
        }
      }
  volumes:
    - name: probe-config-volume
      configMap:
        name: http-adaptor-config-volume
    - name: http-adaptor-nfs-storage
      persistentVolumeClaim:
        claimName: http-adaptor-nfs-pvc-v2
    - name: http-adaptor-nr-config
      configMap:
        name: http-adaptor-config-volume
    - name: http-adaptor-enterprise-logs-storage
      persistentVolumeClaim:
        claimName: http-adaptor-enterprise-logs-pvc
  volumeMounts:
    - mountPath: /service-core-dumps
      name: http-adaptor-nfs-storage
    - mountPath: /opt/probe-config
      name: probe-config-volume
    - mountPath: /http-adaptor/config/
      name: http-adaptor-nr-config
    - mountPath: /mnt/efs
      name: http-adaptor-enterprise-logs-storage
