microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-api-gateway"
    NODE_OPTIONS: "--max-old-space-size=1024"
    CANARY_SERVICE_NAME_AND_KEYS_LIST: "http-adaptor:http-adaptor,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,endpoint-service:endpoint-service,as2-adaptor:as2-adaptor,salesforce-adaptor:salesforce-adaptor,integrator-app-ui:integrator-app-ui,netsuite-distributed-adaptor:netsuite-distributed-adaptor,netsuite-webservices-adaptor:netsuite-webservices-adaptor,file-adaptor:file-adaptor,file-service:file-service,lookup-cache:lookup-cache,js-runtime:js-runtime,api-execution:api-execution,gptverse:gptverse,integrator-bff:integrator-bff"
    CANARY_SERVICE_LIST: "error-assignment,integrator-app-ui,error-linegraphs,error-management,error-notification,resolvedlinegraphs,resource-management,rollout-engine,system-apis,data-catalog-service,di-management-service,amazon-netsuite-connector,amazonmcf-netsuite-connector,bigcommerce-netsuite-connector,ebay-netsuite-connector,hightech-connectors,magento-netsuite-connector,shopify-netsuite-connector,square-netsuite-ia,walmart,netsuite-connector,api-gateway,as2-adaptor,authentication-service,data-warehouse-adaptor,endpoint-service,error-classifier-v2,file-adaptor,file-service,flow-management,ftp-bridge-ms,gptverse,http-adaptor,integrator-workers,internal-gateway,jdbc-bridge,js-runtime,netsuite-distributed-adaptor,netsuite-webservices-adaptor,nosql-db-adaptor,rdbms-adaptor,salesforce-adaptor,webhooks,lookup-cache,api-execution,gptverse,integrator-bff"
    HEAP_PROFILER_DISABLED_FOR_WEB: "false"
    S3_HEAP_DUMPS: "integrator-staging-heap-dumps"
    WEB_INSTANCE_MAX_OLD_SPACE_SIZE: "2560"
    HEAP_THRESHOLD_VALUE: "1600"
    HEAP_INTERVAL_CHECK: "30000"
    ENABLE_LOGGING_FOR_MEMORY_USAGE: "true"
    VALID_IO_DOMAIN_PREFIXES: "eu,qa,iaqa,qaprod,platform1,platform2,platform3,platform4,platform5,core,qa.staging,qaprod.staging"
    IO_SERVICE_ENDPOINT_CONFIG: "authenticationservice:authentication-service.io,webhooks:webhooks.io,gptverse:gptverse.io,systemservice:system-apis.core,resourcemanagement:resource-management.core,flowmgmtservice:flow-management.io,as2microservice:as2-adaptor.io,endpointservice:endpoint-service.io,dimanagementservice:di-management-service.di,datacatalogservice:data-catalog-service.di,apiexecution:api-execution.core,schemainferenceservice:schema-inference-service.di,integratorbff:integrator-bff.ui,agentmanagementservice:agent-management-service.io,auditservice:audit-service.io,mcpservers:mcp-servers.io,celigoagent:celigo-agent.io,iomcpserver:io-mcp-server.io,filestorage:file-storage.core"
    USE_MS_CONFIG: 'true'
