microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-file-service"
    NODE_OPTIONS: "--max-old-space-size=2048"
    NEWRELIC_CONF_FILE_PATH: "/file-service/config/newRelic.json"
    S3_FILES_BUCKET: "integrator-staging-userdata-delete-30"
    SERVER_PORT: "5000"
    STREAM_SORT_AND_GROUP: "true"
    OPENPGP_MIN_RSA_BITS: 1024
