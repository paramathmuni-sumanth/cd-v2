    CANARY_SERVICE_LIST: "error-assignment,integrator-app-ui,error-linegraphs,error-management,error-notification,resolvedlinegraphs,resource-management,rollout-engine,system-apis,data-catalog-service,di-management-service,amazon-netsuite-connector,amazonmcf-netsuite-connector,bigcommerce-netsuite-connector,ebay-netsuite-connector,hightech-connectors,magento-netsuite-connector,shopify-netsuite-connector,square-netsuite-ia,walmart,netsuite-connector,api-gateway,as2-adaptor,authentication-service,data-warehouse-adaptor,endpoint-service,error-classifier-v2,file-adaptor,file-service,flow-management,ftp-bridge-ms,gptverse,http-adaptor,integrator-workers,internal-gateway,jdbc-bridge,js-runtime,netsuite-distributed-adaptor,netsuite-webservices-adaptor,nosql-db-adaptor,rdbms-adaptor,salesforce-adaptor,webhooks,lookup-cache,api-execution"
    IO_SERVICE_ENDPOINT_CONFIG: "authenticationservice:authentication-service.io,webhooks:webhooks.io,gptverse:gptverse.io,systemservice:system-apis.core,resourcemanagement:resource-management.core,flowmgmtservice:flow-management.io,as2microservice:as2-adaptor.io,endpointservice:endpoint-service.io,dimanagementservice:di-management-service.di,apiexecution:api-execution.core"
