microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-js-runtime"
    ENABLE_NEW_RELIC_INSTRUMENTATION: "true"
    NODE_OPTIONS: "--max-old-space-size=2048"
    MAX_ISOLATES_PER_PROC: "1"
    MAX_PROCS: "256"
    MAX_MEM_PER_ISOLATE_MB: "128"
    MAX_CPUS: "2"
    IO_DOMAIN: "staging.integrator.io"
    API_HMAC_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    JAVASCRIPT_RUNTIME_USER_LOGS_BUCKET: "integrator-staging-userdata-delete-30"
    PROCESSES_PER_CPU: "8"
    SOURCE_CODE_BUCKET: "integrator-staging-scripts"
    V8_UPGRADE_NEW_FUNCTIONS_DISABLED: "false"
