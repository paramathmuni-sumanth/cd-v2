microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-gptverse"
    NODE_OPTIONS: "--max-old-space-size=1536"
    SQL_USE_ASSISTANT: "True"
    NUM_ATTEMPTS_FOR_CANCELLATION: 5
    SHOPIFY_CONVERSION_USE_ASSISTANT: "False"
    TOKEN_THRESHOLD_DEFAULT_KB_ARTICLE: 50
    NUM_MESSAGES_TO_KEEP: 3
    s3_integrator_ai_resources: "integrator-staging-ai-resources"
    PINECONE_USER_TOOL_NAMESPACE: "staging-user-tools-ai-descriptions"
