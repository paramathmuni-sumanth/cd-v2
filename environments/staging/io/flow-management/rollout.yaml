service: flow-management
analysis:
  source: splunk
  query: >
    search earliest=-5m index="staging-web" "k8s.cluster.name"=staging-aws-eks-us-east-1 "k8s.namespace.name" IN ("IO") "k8s.container.name"=flow-management k8s.pod.name=*canary*
    ((logName=serverHit sc IN (2*, 5*, 4*)) OR level="error" OR "uncaughtException" OR "TypeError") NOT "[MONGOOSE]"
    | eval pass=if(match(sc, "^2"), 1, 0), fail=if(match(sc, "^5")  OR (level="error" AND logName!=SIGTERMHandler AND logName!=invalidConfig
    AND logName!=invalidConfigMapFile AND !searchmatch("padLevels") AND !searchmatch("MaxListenersExceededWarning")) OR searchmatch("uncaughtException") OR searchmatch("TypeError") AND level!=info, 1, 0)
    | stats sum(pass) as passCount, sum(fail) as failCount, count as totalCount
    | eval errorRate=if(totalCount > 0, failCount/totalCount, 0)
    | eval finalResultHolder=if(totalCount == 0 OR errorRate < 0.001, "true", "false")
    | fields passCount, failCount, totalCount, errorRate, finalResultHolder
  frequency: 7m
disabled: true
