microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-schema-inference-service"
    NODE_OPTIONS: "--max-old-space-size=250"
    SQS_QUEUE_PREFIX: "staging-"
    ENABLE_SQS_QUEUE_CREATION: true
    SQS_JOBS_VISIBILITY_TIMEOUT: "300"
    SQS_JOBS_RETENTION_PERIOD: "345600"
    SQS_JOBS_MAX_RECEIVE_COUNT: "3"
    SQS_STATUS_VISIBILITY_TIMEOUT: "120"
    SQS_STATUS_RETENTION_PERIOD: "345600"
    SQS_STATUS_MAX_RECEIVE_COUNT: "3"
