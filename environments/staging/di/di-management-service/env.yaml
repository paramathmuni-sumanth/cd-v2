microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "us-east-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-staging-env-vars"
    NEW_RELIC_APP_NAME: "staging-di-management-service"
    NODE_OPTIONS: "--max-old-space-size=250"
    CELIGO_SUPPORT_EMAIL: "io.auto.api.qa+supportaccess@celigo.com"
    SQS_QUEUE_PREFIX: "staging-"
    SQS_QUEUE_NAME: "di-management-sync-delete"
    INTEGRATOR_API_BASE_URL: "https://api.staging.integrator.io"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    INTERNAL_HMAC_HOST_NAME: "internal-gateway.celigo.io"
    ENABLE_CLICKHOUSE_CLIENT: "true"
    DI_MAPPER_ENVELOPE_MODE_ENABLED: 'true'
    SNOWFLAKE_BULK_LOAD_DATA_AS_AVAILABLE: 'true'
