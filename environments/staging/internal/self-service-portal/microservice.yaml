microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: self-service-portal
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 260m
          memory: 250Mi
        requests:
          cpu: 60m
          memory: 150Mi
      terminationGracePeriodSeconds: 300
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::609704034070:role/self-service-portal-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - self-service-portal.internal.svc.cluster.local
      - self-service-portal.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - self-service-portal
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: cpu-worker
      deployment:
        image:
          tag: ml-1.0.2.115.0
        resources:
          limits:
            cpu: '1'
            memory: 1Gi
          requests:
            cpu: 100m
            memory: 256Mi
      subsetConfig:
        selectorLabels: {}
        routes: []
      env:
        MODE: WORKER
    - name: app
      deployment:
        image:
          tag: ml-1.0.2.115.0
      subsetConfig:
        selectorLabels: {}
        routes: []
