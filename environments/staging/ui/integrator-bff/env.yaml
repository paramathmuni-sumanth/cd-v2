microservice:
  env:
    NODE_ENV: staging
    aws_region: us-east-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-staging-env-vars
    NEW_RELIC_APP_NAME: staging-integrator-bff
    NODE_OPTIONS: --max-old-space-size=250
    RMS_SERVICE_URL: "http://resource-management.core.svc.cluster.local"
    IO_DOMAIN: "staging.integrator.io"
    HEAP_PROFILER_ENABLED: "true"
    S3_HEAP_DUMPS_BUCKET: "integrator-staging-heap-dumps"
    DEFAULT_MAX_OLD_SPACE_SIZE: "1073741824"
    HEAP_INTERVAL_CHECK: "30000"
    CELIGO_SUPPORT_EMAIL: "io.auto.api.qa+supportaccess@celigo.com"
