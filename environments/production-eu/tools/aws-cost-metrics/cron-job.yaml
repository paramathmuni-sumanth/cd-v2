apiVersion: batch/v1
kind: CronJob
metadata:
  name: aws-cost-metrics
  namespace: default
spec:
  schedule: "30 16 * * 1"
  successfulJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          serviceAccountName: aws-cost-metrics
          restartPolicy: Never
          containers:
          - name: aws-metrics
            image: 860378520032.dkr.ecr.us-east-1.amazonaws.com/aws-cost-metrics:ml-1.3.0.19.0
            env:
            - name: ENV_VARS_BUCKET_NAME
              value: "celigo-k8s-production-eu-env-vars"
            - name: FOLDER_NAME
              value: "productivity-metrics/aws-cost-metrics"