apiVersion: v1
kind: ServiceAccount
metadata:
  name: identify-unhealthy-target
  namespace: default
  annotations:
    eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/identify-unhealthy-target-s3-role-k8s-production-eu
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: identify_unhealthy_target_role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: identify_unhealthy_target_role_binding
  namespace: default
subjects:
- kind: ServiceAccount
  name: identify-unhealthy-target
roleRef:
  kind: Role
  name: identify_unhealthy_target_role
  apiGroup: rbac.authorization.k8s.io