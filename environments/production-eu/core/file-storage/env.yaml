microservice:
  env:
    NODE_ENV: "production"
    aws_region: "eu-central-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-eu-env-vars"
    NEW_RELIC_APP_NAME: "production-eu-file-storage"
    NODE_OPTIONS: "--max-old-space-size=250"
    PORT: "5000"
    STORAGE_S3_BUCKET_NAME: "eu-integrator-userdata-delete-never"
    STORAGE_PRESIGN_EXPIRY: "86400"
    REDIS_KEY_PREFIX_ACTIVE: "storage:active:"
    REDIS_KEY_PREFIX_RECYCLE_BIN: "storage:recycleBin:"
    MAX_NESTING_DEPTH: "20"
    MAX_PART_SIZE: "100"
    STORAGE_FREE_TIER_OVERAGE_LIMIT: "50"
    STORAGE_LICENSED_OVERAGE_LIMIT: "200"
    MONGODB_CLIENT_APP_NAME: "file-storage"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    IO_DOMAIN: "eu.integrator.io"
    STORAGE_SNS_TOPIC_ARNS: "arn:aws:sns:eu-central-1:860378520032:file-storage-notification"
