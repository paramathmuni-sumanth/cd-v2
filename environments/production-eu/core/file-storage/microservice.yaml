microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/core/sa/resource-management
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: file-storage
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1
          memory: 950Mi
        requests:
          cpu: 0.75
          memory: 700Mi
      terminationGracePeriodSeconds: 300
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 5
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/file-storage-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - file-storage.core.svc.cluster.local
      - file-storage.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - file-storage
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.41.0
      subsetConfig:
        selectorLabels: {}
        routes: []
