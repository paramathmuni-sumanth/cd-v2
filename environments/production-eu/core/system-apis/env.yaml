microservice:
  env:
    NODE_ENV: "production"
    aws_region: "eu-central-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-eu-env-vars"
    NEW_RELIC_APP_NAME: "production-eu-system-apis"
    NODE_OPTIONS: "--max-old-space-size=750"
    DISABLE_MULTI_ENV_SIGNUP: "false"
    s3_integrator_userdata_delete_30: "eu-integrator-userdata-delete-30"
    BARTENDER_LABEL_PRINTING_DISABLED: 'false'
