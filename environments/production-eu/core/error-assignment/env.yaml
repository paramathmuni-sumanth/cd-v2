microservice:
  env:
    NODE_ENV: "production"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-eu-env-vars"
    NEW_RELIC_APP_NAME: "production-eu-error-assignment"
    NODE_OPTIONS: "--max-old-space-size=1024"
    AWS_SES_ENDPOINT: "email.eu-west-1.amazonaws.com"
    AWS_SES_FROM: "noreply@celigo.com"
    AWS_SES_REGION: "eu-west-1"
    EACH_LIMIT: "5"
    EM_PARTITION_CONSUMED_CONCURRENTLY: "1"
    EM_SESSION_TIMEOUT: "120000"
    ERROR_ASSIGNMENT_NOTIFICATION_NUM_PARTITIONS: "2"
    FA_LISTENER_BASE_URL: "https://api.eu.integrator.io"
    IO_DOMAIN: "eu.integrator.io"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    MAX_LOAD: "20"
    NEEDS_NOTIFICATION_NUM_PARTITIONS: "5"
    REFRESH_KCGW_FREQUENCY: "10000"
    aws_region: "eu-central-1"
    s3_integrator_errors: "eu-integrator-errors"
    s3_integrator_kcgw: "eu-integrator-kcgw"
    s3_integrator_mongo_fields_data: "eu-integrator-mongo-fields"
    s3_integrator_retries: "eu-integrator-retries"
    s3_integrator_userdata_delete_30: "eu-integrator-userdata-delete-30"
    s3_read_timeout: "20000"
    sqs_delay_helper: "delay_helper"
