microservice:
  env:
    NODE_ENV: "production"
    aws_region: "eu-central-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-eu-env-vars"
    NEW_RELIC_APP_NAME: "production-eu-resource-management"
    NODE_OPTIONS: "--max-old-space-size=2253"
    APP_NAME: "resource-management"
    JS_RUNTIME_SOCKET_TIMEOUT: "300000"
    JS_RUNTIME_FREE_SOCKET_TIMEOUT: "330000"
    JS_RUNTIME_KEEP_ALIVE: "true"
    JS_RUNTIME_KEEP_ALIVE_MSECS: "60000"
    JS_RUNTIME_REQUEST_TIMEOUT: "300000"
    JS_RUNTIME_SOCKET_ACTIVE_TTL: "420000"
    DISABLE_MULTI_ENV_SIGNUP: "false"
    ENABLE_ENTERPRISE_LOGGING_BY_DEFAULT: true
    PINECONE_USER_TOOL_NAMESPACE: "user-tools-ai-descriptions"
    DOCUMENT_TYPE_ENUM_X12: "204,210,214,753,754,810,812,820,824,830,832,837,844,846,850,852,855,856,860,862,865,866,869,870,875,876,880,940,944,943,945,947,990,997,999"
    DOCUMENT_TYPE_ENUM_EDIFACT: "IFTMIN,INVOIC,IFTMBF,IFTMBC,IFTSTA,CREADV,ORDERS,ORDRSP,DESADV,ORDCHG,OSTRPT,HANMOV,RECADV"
    SEND_DATA_TO_PINECONE_WEBHOOK_ENDPOINT_TOOL: "https://api.integrator.io/v1/exports/69a960fa3b213b3ac95a30f9/data"
    ENABLE_DRAFT_EXPIRES_AT_PLUGIN: "true"
    CLICKHOUSE_DATABASE: integrator
    NUM_PORTS: '50'
    AUDIT_SERVICE_BASE_URL: http://audit-service.io.svc.cluster.local
    AUDIT_WRITE_MODE: user-flag
    BARTENDER_LABEL_PRINTING_DISABLED: 'false'
    DI_USER_WORKER_GROUP_ENABLED: 'true'
