microservice:
  env:
    NODE_ENV: production
    aws_region: eu-central-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-production-eu-env-vars
    NEW_RELIC_APP_NAME: production-eu-flow-logs-ingestion
    NODE_OPTIONS: --max-old-space-size=2048
    EACH_LIMIT: 5
    s3_integrator_kcgw: "eu-integrator-kcgw"
    IO_DOMAIN: "eu.integrator.io"
    CLICKHOUSE_DATABASE: "integrator"
    CLICKHOUSE_TABLE: "flow_logs"
    CLICKHOUSE_CHILD_TABLE: "flow_child_logs"
