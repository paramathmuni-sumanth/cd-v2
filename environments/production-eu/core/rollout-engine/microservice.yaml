microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    podDisruptionBudget:
      enabled: true
      minAvailable: 100%
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: rollout-engine
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 260m
          memory: 250Mi
        requests:
          cpu: 60m
          memory: 150Mi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - 'expected="200 500"; status_code=""; for i in $(seq 1 3); do status_code=$(curl -s -o /dev/null -w "%{http_code}" "http://127.0.0.1:5000/openConnections?terminate=true"); if [[ $expected =~ (^|[[:space:]])$status_code($|[[:space:]]) ]]; then echo "Expected status code received: $status_code"; break; else echo "Unexpected status code received: $status_code. Retrying in 120 seconds..."; sleep 120; fi; done; echo "Done";'
      terminationGracePeriodSeconds: 86400
      podAnnotations:
        redeployTimestamp: 2024-05-09-11-00
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/rollout-engine-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - rollout-engine.core.svc.cluster.local
      - rollout-engine.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - rollout-engine
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.30.0
      subsetConfig:
        selectorLabels: {}
        routes: []
