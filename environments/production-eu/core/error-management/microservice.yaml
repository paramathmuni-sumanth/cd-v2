microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: error-management
    subscriptionType:
      enabled: false
    deployment:
      rolloutStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxSurge: 50%
          maxUnavailable: 50%
      podAnnotations:
        sidecar.istio.io/proxyCPU: "50m"
        sidecar.istio.io/proxyCPULimit: "2000m"
        sidecar.istio.io/proxyMemory: "50Mi"
        sidecar.istio.io/proxyMemoryLimit: "1Gi"
      revisionHistoryLimit: 1
      replicaCount: 5
      containerPort: 5000
      resources:
        limits:
          cpu: 2.5
          memory: 3Gi
        requests:
          cpu: 2
          memory: 2Gi
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /livez
            port: http
        initialDelaySeconds: 180
        periodSeconds: 10
        timeoutSeconds: 10
        successThreshold: 1
        failureThreshold: 15
      readinessProbe:
        enabled: true
        path: "/readyz"
        initialDelaySeconds: 180
        periodSeconds: 10
        timeoutSeconds: 10
        successThreshold: 1
        failureThreshold: 15
      terminationGracePeriodSeconds: 900
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; wget -qO- "http://localhost:5000/openConnections?terminate=true"; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- "http://localhost:5000/openConnections"); sleep 5; done; wget -qO- "http://localhost:5000/stopServer"; echo "Done";
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 2
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/error-management-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - error-management.core.svc.cluster.local
      - error-management.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - error-management
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: 2026.5.3-patch-0.0.1.94.0
      subsetConfig:
        selectorLabels: {}
        routes: []
