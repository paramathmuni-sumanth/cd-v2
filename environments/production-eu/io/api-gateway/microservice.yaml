microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/integrator-workers-ping
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/gptverse
                  - cluster.local/ns/di/sa/di-management-service
                  - cluster.local/ns/core/sa/rollout-engine
                  - cluster.local/ns/io/sa/mcp-servers
                  - cluster.local/ns/di/sa/di-aggregation-service
                  - cluster.local/ns/io/sa/celigo-agent
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "api-gateway"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 800m
          memory: 1Gi
        requests:
          cpu: 400m
          memory: 737Mi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 3
        maxReplicas: 30
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/api-gateway-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - api-gateway.celigo.io
      - api-gateway.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - api-gateway
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: celigo-agent-app
      deployment:
        image:
          tag: 2026.5.2-patch-0.0.1.336.0
      subsetConfig:
        selectorLabels: {}
        routes:
          - uri:
              prefix: /api/celigo-agent/
          - uri:
              regex: '/api/[^/]+/[^/]+/unsetDraft'
    - name: app
      deployment:
        image:
          tag: 2026.5.2-patch-0.0.1.336.0
      subsetConfig:
        selectorLabels: {}
        routes: []
