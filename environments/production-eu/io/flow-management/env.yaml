microservice:
  env:
    NODE_ENV: "production"
    aws_region: "eu-central-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-eu-env-vars"
    NEW_RELIC_APP_NAME: "production-eu-flow-management"
    NODE_OPTIONS: "--max-old-space-size=1500"
    s3_connection_timeout: "60000"
    s3_max_sockets: "750"
    ENABLE_CLICKHOUSE_CLIENT: "true"
    DI_AGGREGATION_SERVICE_URL: "http://di-aggregation-service.di.svc.cluster.local"
    ENABLE_CLICKHOUSE_FOR_ALL_USERS: 'true'
    MONGODB_JOB_PURGE_DAYS: '15'
