microservice:
  env:
    NODE_ENV: "production"
    aws_region: "eu-central-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-eu-env-vars"
    NEW_RELIC_APP_NAME: "production-eu-ftp-bridge-ms"
    NODE_OPTIONS: "--max-old-space-size=250"
    JAVA_ENV: "production"
    LOG4J_CONFIGURATION_FILE: "/etc/config/log4j2.properties"
    CATALINA_OPTS: "-Xms2048m -Xmx3306m -XX:+UseG1GC -XX:G1HeapRegionSize=2m -XX:InitiatingHeapOccupancyPercent=30 -XX:MaxGCPauseMillis=250 -XX:ParallelGCThreads=3 -XX:ConcGCThreads=2 -XX:NewRatio=3 -Xlog:gc*,gc+ref=debug:file=gc.log:time -XX:+PrintGCDetails"
    JDK_JAVA_OPTIONS: "--add-opens=java.base/sun.security.ssl=ALL-UNNAMED --add-opens=java.base/sun.security.util=ALL-UNNAMED"
    NEWRELIC_CONF_FILE_PATH: "/etc/config/newRelic.json"
    NEW_RELIC_AGENT_ENABLED: true
    NEW_RELIC_JFR_ENABLED: true
    METADATA_OPTIMIZATION_ENABLED: "true"
