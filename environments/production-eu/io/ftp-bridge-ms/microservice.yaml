microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/io/sa/endpoint-service
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /ftp-bridge-ms/metrics
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: ftp-bridge-ms
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 8080
      podAnnotations:
        celigo.io/scrape: 'fast'
        celigo.io/path: "/ftp-bridge-ms/metrics"
      resources:
        limits:
          cpu: 2824m
          memory: 6000Mi
        requests:
          cpu: 600m
          memory: 4096Mi
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /ftp-bridge-ms/livez
      readinessProbe:
        enabled: true
        path: "/ftp-bridge-ms/readyz"
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" == "$expected" ]; do count=$(wget -qO- 'http://localhost:8080/ftp-bridge-ms/openConnections?preStopMode=true'); sleep 1; if [ "$count" == "$expected" ]; then for i in seq 1 5; do count=$(wget -qO- 'http://localhost:8080/ftp-bridge-ms/openConnections?terminate=true'); sleep 5; done; fi; done; catalina.sh stop;
      terminationGracePeriodSeconds: 86400
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 3
        maxReplicas: 15
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/ftp-bridge-ms-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - ftp-bridge-ms.io.svc.cluster.local
      - ftp-bridge-ms.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - ftp-bridge-ms
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    log4j2.properties: |
      status = error
      name = PropertiesConfig
      appenders = console
      customLevel.ACTIVE_MODE_DEBUG = 425
      customLevel.CUSTOM_DEBUG = 450
      customLevel.JSCH_DEBUG = 475
      loggers = awss3, awstransfer
      appender.console.type = Console
      appender.console.name = LogToConsole
      appender.console.layout.type = PatternLayout
      appender.console.layout.pattern = %d{ISO8601} %-5p (%13F:%L) - %m%n
      logger.awss3.name = software.amazon.awssdk.services.s3
      logger.awss3.level = ${env:DEPLOYMENT_SPECIFIC_S3_LOG_LEVEL:-info}
      logger.awss3.additivity = false
      logger.awss3.appenderRef.console.ref = LogToConsole
      logger.awstransfer.name = software.amazon.awssdk.transfer
      logger.awstransfer.level = ${env:DEPLOYMENT_SPECIFIC_S3_LOG_LEVEL:-info}
      logger.awstransfer.additivity = false
      logger.awstransfer.appenderRef.console.ref = LogToConsole
      rootLogger.level = ${env:DEPLOYMENT_SPECIFIC_LOG_LEVEL:-info}
      rootLogger.additivity = false
      rootLogger.appenderRef.console.ref = LogToConsole
      monitorInterval = 60
    newRelic.json: |
      {
        "enableNR": true,
        "transactions": ["all"],
        "userIds": [],
        "expOrImpIds": [],
        "connectionIds": []
      }
  volumes:
    - name: ftp-bridge-ms-config
      configMap:
        name: ftp-bridge-ms-config-volume
  volumeMounts:
    - name: ftp-bridge-ms-config
      mountPath: /etc/config
  deployments:
    - name: java21-current-rollout-app
      deployment:
        image:
          tag: java-21-fb-0.0.1.132.0
      hpa:
        autoscaling:
          enabled: true
          minReplicas: 3
          maxReplicas: 5
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              userid:
                regex: '^(63b87e3a711fd63ea733c593|62bc5c3b2e20fc48184e0dcc|621f7ae62be9db4b2752d179|6320a65c71fbb44ef535d8b3|62a31921c1caac5c975b093d|5fe1197c0a07a651aa461bd4|639086d859666a16744fc42e|673db750065a8fc6f58428cd|628cacba76ed8f537fc85817|64d0e47a05910523743caf85|5e78fa87f744cd1d0b0c1d03|62460115c47b44399abdae8d|604916f89716277b7a653731|642ae0b1d3ea8364a55d8fb1|65b2444382d431067c24af1e|6745cfdbfa2b41d5309c0c38|62d5b62d36441462eb3b6b50|6841babd79a66cf9e0386502|63c82fafac07084e45bcf66c|62628c9e92a62f42203ce7f1|610044f421923b1a14889f1c|66d0477cb66bdfa497834318|655dc4433698507f1895d897|697a67c1ea84232a264737c9|61374a9fd72abf5f4f5957a8|62e2866233227851f35f5130|659bd1606afb3c0860ac9f9a|60551857056ffb6631580f1b|629a2bf59be8184eb46f3ded|5f8dbd6527e76c37f117fa85|64466bfc86eb6f042248391c|6013cbadec36e31f12bd8454|636d2fb04e22961b9344915d|61923e0bee5c8b4543e96809|666008895df2b99ce160452f|64e73c0d0686826133f78a8b|5ff1905d0a07a651aa480cc7|66575a8672405dbd59b87bed|63e6918a08e08d227415cc66|62d7998733227851f35e2650)$'
