service: ftp-bridge-ms
analysis:
  source: splunk
  query: >
    search
    earliest=-5m 
    index=production-eu-adaptors 
    k8s.container.name="ftp-bridge-ms"
    k8s.pod.name=*canary*
    (logName=onSendResponse  OR logName=ftp_bridge_batchProcessError OR logName=ftp_bridge_fileMoveComplete OR logName=ftp_bridge_fileImportComplete OR logName=ftp_bridge_fileDeleteComplete OR *unhandled* OR *uncaught* OR *unhandled* ) NOT t=finalize
    | eval pass=if(match(sc, "^2"), 1, 0),
           fail=if(match(sc, "^[45]") OR match(_raw, "(?i)unexpected|uncaught|unhandled"), 1, 0),
           relevantForTotal=if(logName="onSendResponse", 1, 0),
           passBatch=if(match(_raw, "ftp_bridge_fileMoveComplete|ftp_bridge_fileImportComplete|ftp_bridge_fileDeleteComplete"), 1, 0),
           failBatch=if(match(_raw, "ftp_bridge_batchProcessError"), 1, 0),
           uncaught=if(match(_raw, "(?i)unexpected|uncaught|unhandled"), 1, 0)
    | stats sum(pass) as passCount,   
            sum(fail) as failCount, 
            sum(relevantForTotal) as totalCount,
            sum(passBatch) as batchPassCount,
            sum(failBatch) as batchFailCount,
            sum(uncaught) as uncaughtCount
    | eval errorRate=if(totalCount > 0, failCount / totalCount, 0),
    totalBatchCount=if(batchPassCount > 0 OR batchFailCount > 0, (batchPassCount + batchFailCount), 0),
    batchErrorRate=if(totalBatchCount > 0, batchFailCount / totalBatchCount, 0),
           finalResultHolder=case(
               uncaughtCount>0, "false",
               true(), "true"
           )
    | appendpipe [| stats count | where count==0 | eval passCount=0, failCount=0, totalCount=0, errorRate=0, uncaughtCount=0, finalResultHolder="true" | fields - count]           
    | fields passCount, failCount, totalCount, errorRate, batchPassCount,batchFailCount, batchErrorRate, uncaughtCount, finalResultHolder
  frequency: 5m
disabled: false