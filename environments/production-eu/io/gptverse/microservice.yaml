microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/integrator-workers-ping
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/internal-gateway
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "gptverse"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 1.5Gi
        requests:
          cpu: 500m
          memory: 1Gi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - 'expected="200 500"; for i in $(seq 1 3); do response=$(wget -S -O /dev/null "http://127.0.0.1:5000/openConnections?terminate=true" 2>&1); status_code=$(echo "$response" | grep -oE "HTTP/[0-9]+\.[0-9]+ [0-9]+" | tail -1 | awk "{print \$2}"); case $expected in *$status_code*) echo "Expected status code received: $status_code"; break;; *) echo "Unexpected status code received: $status_code. Retrying in 130 seconds..."; sleep 130;; esac; done; echo "Done";'
      terminationGracePeriodSeconds: 420
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 3
        maxReplicas: 15
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
        behavior:
          scaleDown:
            stabilizationWindowSeconds: 600
            policies:
              - type: Pods
                value: 1
                periodSeconds: 60
          scaleUp:
            stabilizationWindowSeconds: 60
            policies:
              - type: Percent
                value: 10
                periodSeconds: 15
            selectPolicy: Max
  destinationRules:
    enabled: true
    trafficPolicy:
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/gptverse-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - gptverse.celigo.io
      - gptverse.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - gptverse
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.141.0
      subsetConfig:
        selectorLabels: {}
        routes: []
