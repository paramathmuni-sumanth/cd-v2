microservice:
  env:
    NODE_ENV: "production"
    aws_region: "eu-central-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-eu-env-vars"
    NEW_RELIC_APP_NAME: "production-eu-rdbms-adaptor"
    NODE_OPTIONS: "--max-old-space-size=1000"
    NEWRELIC_CONF_FILE_PATH: "/rdbms-adaptor/config/newRelic.json"
    HEAP_PROFILER_ENABLED: 'true'
    S3_HEAP_DUMPS_BUCKET: eu-integrator-heap-dumps
