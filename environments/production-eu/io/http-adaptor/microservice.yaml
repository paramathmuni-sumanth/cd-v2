microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/salesforce-adaptor
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/integrator-workers-ping
                  - cluster.local/ns/io/sa/as2-adaptor
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/ai-agent-adaptor
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "http-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2500m
          memory: 3814Mi
        requests:
          cpu: 800m
          memory: 2796Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 21600
      livenessProbe:
        enabled: true
        config:
          exec:
            command:
              - /bin/bash
              - /opt/docker/probe-scripts/probe.sh
        initialDelaySeconds: 20
        periodSeconds: 15
        timeoutSeconds: 10
        failureThreshold: 10
      podAnnotations:
        traffic.sidecar.istio.io/excludeOutboundPorts: '15001'
        celigo.io/scrape: 'fast'
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 52
        maxReplicas: 83
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      connectionPool:
        tcp:
          tcpKeepalive:
            time: 7200s
            interval: 75s
  ingress:
    enabled: false
  service:
    extraLabels:
      istio.io/persistent-session-header: x-session-header
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/http-adaptor-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - http-adaptor.celigo.io
      - http-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - http-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: http-adaptor-nfs-pvc-v2
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-http-adaptor
    - name: http-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  configVolume:
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAP_DUMP_ENABLED": false,
        "MAX_PERF_DUMP_PER_HOUR": 1
      }
    newRelic.json: |
      {
        "enableNR": true,
        "transactions": ["custom"],
        "resources": {
          "_flowId": [],
          "_connectionId": [],
          "_exportId": ["65b7b00c5532557ece98bf17", "6605125ad74119017d9486c0", "655222b9f449ff3c1d4cdfb8", "62e22f8ed2802c66d9ab82b8"],
          "_importId": ["653256b6f41ca20c9c08edeb", "6605125ad74119017d9486cb", "6447d26bff51097ce84880e9", "64787be208bcbf088fb159d3", "64787be408bcbf088fb159f2", "693144aa46186746911b0ee3"]
        }
      }
  volumes:
    - name: probe-config-volume
      configMap:
        name: http-adaptor-config-volume
    - name: http-adaptor-nr-config
      configMap:
        name: http-adaptor-config-volume
    - name: http-adaptor-nfs-storage
      persistentVolumeClaim:
        claimName: http-adaptor-nfs-pvc-v2
    - name: http-nfs-storage
      persistentVolumeClaim:
        claimName: http-nfs-pvc
  volumeMounts:
    - mountPath: "/http-adaptor/config/"
      name: http-adaptor-nr-config
    - mountPath: "/service-core-dumps"
      name: http-adaptor-nfs-storage
    - mountPath: "/opt/probe-config"
      name: probe-config-volume
    - mountPath: "/mnt/efs"
      name: http-nfs-storage
  deployments:
    - name: xmldom-users
      deployment:
        image:
          tag: xmldom-users-fb-1.0.0.1075.0
      hpa:
        autoscaling:
          enabled: true
          maxReplicas: 5
          minReplicas: 2
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              connectionid:
                regex: ^(66b38681a0935f0e877a48a4)$
    - name: high-req-mem-2
      deployment:
        image:
          tag: ml-1.0.0.527.0
      hpa:
        keda:
          enabled: true
          minReplicas: 2
          maxReplicas: 8
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="http-adaptor-high-req-mem-2"})
                threshold: "110"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              userid:
                regex: '^(63b87e3a711fd63ea733c593)$'
    - name: high-oc-users
      deployment:
        image:
          tag: ml-1.0.0.527.0
        containerPort: 5000
        resources:
          limits:
            cpu: 2500m
            memory: 3814Mi
          requests:
            cpu: 800m
            memory: 2796Mi
      hpa:
        keda:
          enabled: true
          minReplicas: 2
          maxReplicas: 20
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="http-adaptor-high-oc-users"})
                threshold: "500"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: '70'
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: '70'
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              userid:
                regex: '^(604916f89716277b7a653731|62978df54e0afa4e7fc1a719)$'
    - name: di-deployment
      deployment:
        image:
          tag: ml-1.0.0.527.0
      hpa:
        keda:
          enabled: true
          minReplicas: 2
          maxReplicas: 5
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="http-adaptor-di-deployment"})
                threshold: "110"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              executionContextUserId:
                regex: '^(66fe8357fdf0b9aabc1e793e)$'
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.527.0
      hpa:
        keda:
          enabled: true
          minReplicas: 20
          maxReplicas: 83
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="http-adaptor-app"})
                threshold: "110"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
