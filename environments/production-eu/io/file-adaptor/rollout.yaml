service: file-adaptor
analysis:
  source: splunk
  query: >
    search
    earliest=-7m
    index="production-eu-adaptors"
    k8s.cluster.name=production-eu-aws-eks-eu-central-1
    k8s.namespace.name IN ("IO")
    k8s.container.name=file-adaptor
    k8s.pod.name=*canary*
    (logName=onSendResponse OR logName=serverHit OR (level IN ("error", "fatal") NOT "logName=logging422Errors" NOT "logName=closeEventOnServer" NOT "logName=TransactionNotFound" NOT "logName=connectionCloseInvalidWs" NOT "DeprecationWarning" NOT "enter AWS SDK for JavaScript" NOT "newrelic" NOT "invalidConfig" NOT "invalidConfigMapFile" NOT "logName=fatalResponse") OR *unhandled* OR *uncaught* OR *TypeError* OR (*fatal* NOT "logName=fatalResponse"))
    | eval pass=if(sc >= 200 AND sc < 300, 1, 0),
           fail=if((sc >= 300 AND sc<600) OR match(_raw, "(?i)fatal|unexpected|uncaught|error|typeerror|unhandled"), 1, 0),
           fatal=if(level="fatal", 1, 0),
           openConnection=if(logName="serverHit" AND oc > 150, 1, 0),
           relevantForTotal=if(logName="onSendResponse", 1, 0)
    | stats sum(pass) as passCount,   
            sum(fail) as failCount,
            sum(fatal) as fatalCount,
            sum(openConnection) as openConnectionCount,
            sum(relevantForTotal) as totalCount
    | eval finalResultHolder=case(
               fatalCount >= 1 OR openConnectionCount >= 1, "false",
               true(), "true"
           )
    | appendpipe [| stats count | where count==0 | eval passCount=0, failCount=0, fatalCount=0, openConnectionCount=0, totalCount=0, finalResultHolder="true" | fields - count]           
    | fields passCount, failCount, fatalCount, openConnectionCount, totalCount, finalResultHolder
  frequency: 7m
disabled: false