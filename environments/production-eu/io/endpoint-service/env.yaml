microservice:
  env:
    NODE_ENV: "production"
    aws_region: "eu-central-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-production-eu-env-vars"
    NEW_RELIC_APP_NAME: "production-eu-endpoint-service"
    NODE_OPTIONS: "--max-old-space-size=1587"
    FMS_SERVICE_URL: "http://flow-management.io.svc.cluster.local"
    JS_RUNTIME_SOCKET_TIMEOUT: "300000"
    JS_RUNTIME_FREE_SOCKET_TIMEOUT: "330000"
    JS_RUNTIME_KEEP_ALIVE: "true"
    JS_RUNTIME_KEEP_ALIVE_MSECS: "60000"
    JS_RUNTIME_REQUEST_TIMEOUT: "300000"
    JS_RUNTIME_SOCKET_ACTIVE_TTL: "420000"
    ENABLE_CCTLDS_PARSING_IN_URL: true
    AI_AGENT_ADAPTOR_URL: "ws://ai-agent-adaptor.io.svc.cluster.local"
    API_EXECUTION_SERVICE_URL: "http://api-execution.core.svc.cluster.local"
    AI_AGENT_ADAPTOR_HTTP_URL: "http://ai-agent-adaptor.io.svc.cluster.local"
    OAUTH_TOKEN_EXCHANGE_SUPPORTED_AGENT_VERSION: "5.7.0"
    SALESFORCE_PKCE_DISABLED: "true"
