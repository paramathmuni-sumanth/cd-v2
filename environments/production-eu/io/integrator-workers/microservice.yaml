microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    secretRef: newrelic-secrets
    image:
      repository: "860378520032.dkr.ecr.us-east-1.amazonaws.com"
      name: "integrator-workers"
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        failureThreshold: 6
      readinessProbe:
        failureThreshold: 3
      revisionHistoryLimit: 1
      replicaCount: 29
      containerPort: 5000
      resources:
        limits:
          cpu: 4
          memory: 12Gi
        requests:
          cpu: 2.75
          memory: 8Gi
      startupProbe:
        enabled: true
        path: "/"
        port: "9999"
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 10
        successThreshold: 1
        failureThreshold: 5
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; wget -qO- "http://localhost:5000/openConnections?terminate=true"; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- "http://localhost:5000/openConnections?terminate=true"); sleep 5; done; wget -qO- "http://localhost:5000/stopServer"; echo "Done"; sleep 5; wget -qO- --method POST "http://localhost:15000/quitquitquit"; echo "Done"
      podAnnotations:
        celigo.io/scrape: 'fast'
      terminationGracePeriodSeconds: 86400
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 3
        maxReplicas: 15
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
    customToken:
      enabled: true
      image:
        name: "token-refresher"
        tag: "generic-v32"
      refreshInterval: "43200"
      expiryTime: "86700"
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/integrator-workers-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - integrator-workers.celigo.io
      - integrator-workers.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - integrator-workers
            topologyKey: kubernetes.io/hostname
          weight: 100
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
          - matchExpressions:
              - key: application-type
                operator: In
                values:
                  - integrator_workers
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    memoryProfiling.json: |
      {
        "enabled": true,
        "dumpInterval": 0,
        "podPatterns": [],
        "pods": {}
      }
  PersistentVolumeClaims:
    - name: integrator-workers-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  volumes:
    - name: integrator-workers-nfs-storage
      persistentVolumeClaim:
        claimName: integrator-workers-nfs-pvc
    - name: integrator-workers-config
      configMap:
        name: integrator-workers-config-volume
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: integrator-workers-nfs-storage
    - mountPath: "/etc/config/"
      name: integrator-workers-config
  tolerations:
    - key: "application-type"
      operator: "Equal"
      value: "integrator_workers"
      effect: "NoSchedule"
  deployments:
    - name: sqstimeout
      env:
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
        WORKER_TYPE: "sqstimeout"
      deployment:
        image:
          tag: 2026.5.3.2-hotfix-fb-1.0.0.709.0
        replicaCount: 2
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: chuncking-queue-worker
      env:
        MAX_CONSUMER_LOAD: 35
        MAX_CONSUMER_CHILD_PROCESSES: 2
        WORKER_TYPE: "ChunkingQueueWorker"
        VISIBILITY_TIMEOUT_GUARD_ENABLED: true
        MAX_INFLIGHT_RETRY_PUTS: 100
        CIRCUIT_BREAKER_ENABLED: true
        CIRCUIT_BREAKER_PHASE1_DELAYS: '[2000,5000,10000,20000,40000]'
        CIRCUIT_BREAKER_OPEN_DURATION: 100000
        CIRCUIT_BREAKER_FINAL_ATTEMPT: true
        MICROSERVICE_WS_CONNECTION_TIMEOUT: 30000
      deployment:
        image:
          tag: 2026.5.3.2-hotfix-fb-1.0.0.709.0
      hpa:
        keda:
          enabled: true
          minReplicas: 2
          maxReplicas: 6
          pollingInterval: 30
          cooldownPeriod: 600
          triggerAuthentication:
            podIdentity:
              provider: aws
              identityOwner: keda
          triggers:
            - type: aws-sqs-queue
              authenticationRef:
                name: integrator-workers-chuncking-queue-worker-trigger-auth
              metadata:
                queueURL: "https://sqs.eu-central-1.amazonaws.com/860378520032/chunk_generation_queue.fifo"
                queueLength: "20"
                activationQueueLength: "10"
                awsRegion: "eu-central-1"
          behavior:
            scaleUp:
              stabilizationWindowSeconds: 60
            scaleDown:
              stabilizationWindowSeconds: 600
              policies:
                - type: Pods
                  value: 1
                  periodSeconds: 60
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: diworker
      env:
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
        WORKER_TYPE: "DIWorker"
        VISIBILITY_TIMEOUT_GUARD_ENABLED: true
        CIRCUIT_BREAKER_ENABLED: true
        CIRCUIT_BREAKER_PHASE1_DELAYS: '[2000,5000,10000,20000,40000]'
        CIRCUIT_BREAKER_OPEN_DURATION: 100000
        CIRCUIT_BREAKER_FINAL_ATTEMPT: true
        MICROSERVICE_WS_CONNECTION_TIMEOUT: 30000
      deployment:
        replicaCount: 3
        image:
          tag: 2026.5.3.2-hotfix-fb-1.0.0.709.0
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: diprimeworker
      env:
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 1
        WORKER_TYPE: "DIPrimeWorker"
        DATABASE_POOL_SIZE: 10
        MAX_SEMI_SPACE_SIZE: 32
        GC_MONITORING_ENABLED: true
        VISIBILITY_TIMEOUT_GUARD_ENABLED: true
        CIRCUIT_BREAKER_ENABLED: true
        CIRCUIT_BREAKER_PHASE1_DELAYS: '[2000,5000,10000,20000,40000]'
        CIRCUIT_BREAKER_OPEN_DURATION: 100000
        CIRCUIT_BREAKER_FINAL_ATTEMPT: true
        MICROSERVICE_WS_CONNECTION_TIMEOUT: 30000
      deployment:
        replicaCount: 3
        image:
          tag: 2026.5.3.2-hotfix-fb-1.0.0.709.0
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: high-concurrency
      env:
        WORKER_TYPE: "highConcurrency"
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
      deployment:
        image:
          tag: 2026.5.3.2-hotfix-fb-1.0.0.709.0
        replicaCount: 4
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: alliaothers
      env:
        WORKER_TYPE: "allIAOthers"
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
      deployment:
        image:
          tag: 2026.5.3.2-hotfix-fb-1.0.0.709.0
        replicaCount: 4
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: allianetsuite
      env:
        WORKER_TYPE: "allIANetsuite"
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
        MAX_OLD_SPACE_SIZE: '3072'
      deployment:
        image:
          tag: 2026.5.3.2-hotfix-fb-1.0.0.709.0
        replicaCount: 3
        resources:
          limits:
            cpu: 3
            memory: 12Gi
          requests:
            cpu: 2
            memory: 8Gi
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: app
      env:
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
        DATABASE_POOL_SIZE: 25
      deployment:
        image:
          tag: 2026.5.3.2-hotfix-fb-1.0.0.709.0
      subsetConfig:
        selectorLabels: {}
        routes: []
