microservice:
  env:
    NODE_ENV: production
    aws_region: eu-central-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-production-eu-env-vars
    NEW_RELIC_APP_NAME: production-eu-celigo-agent
    NODE_OPTIONS: --max-old-space-size=3500
    AGENT_PROCESSING_TIMEOUT: "3600"
    GATEWAY_SERVICE_ENDPOINT_TOKEN: "http://api-gateway.io.svc.cluster.local/v1"
    IO_API_ENDPOINT_SESSION: "https://eu.integrator.io/api"
    IO_HOST: "https://eu.integrator.io"
    NAVIGATION_LARGE_LIST_THRESHOLD: "25"
    OPENAI_AGENTS_DISABLE_TRACING: "1"
    OPENAI_MODEL: "gpt-5.5"
    REDIS_MAX_CONNECTIONS: "1000"
    REDIS_PORT: "6379"
    RMS_SERVICE_ENDPOINT_SESSION: "http://internal-gateway.io.svc.cluster.local/api"
    USE_REDIS_FOR_SSE: "true"
    CELIGO_API_TIMEOUT: "60"
    AGENT_MODE: "server"
    SSE_HEARTBEAT_INTERVAL: "30"
    SSE_IDLE_TIMEOUT: "600"
    CHAT_STOP_METHOD: "REDIS"
    AGENT_TRACING_ENABLED: "False"
    AGENT_TRACING_PRINT_TO_CONSOLE: "false"
    ENABLE_API_RECORDING: "false"
    s3_integrator_userdata_delete_30: "eu-integrator-userdata-delete-30"
