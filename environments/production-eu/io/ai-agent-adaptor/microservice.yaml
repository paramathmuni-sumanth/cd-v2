microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/core/sa/api-execution
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: ai-agent-adaptor
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 3Gi
        requests:
          cpu: 1
          memory: 1Gi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        celigo.io/scrape: 'fast'
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/ai-agent-adaptor-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - ai-agent-adaptor.io.svc.cluster.local
      - ai-agent-adaptor.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - ai-agent-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: ai-agent-adaptor-logs
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  volumes:
    - name: ai-agent-adaptor-logs-storage
      persistentVolumeClaim:
        claimName: ai-agent-adaptor-logs
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: ai-agent-adaptor-logs-storage
  deployments:
    - name: app
      deployment:
        image:
          tag: 2026.4.1.1-hotfix-fb-0.0.1.16.0
      hpa:
        keda:
          enabled: true
          minReplicas: 2
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="ai-agent-adaptor-app"})
                threshold: "200"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
