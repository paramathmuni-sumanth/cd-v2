microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 860378520032.dkr.ecr.us-east-1.amazonaws.com
      name: inference-worker-service
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 4000m
          memory: 8Gi
        requests:
          cpu: 2000m
          memory: 4Gi
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /actuator/health/liveness
        initialDelaySeconds: 60
      readinessProbe:
        enabled: true
        path: /actuator/health/readiness
        initialDelaySeconds: 60
      terminationGracePeriodSeconds: 300
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 15
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      outlierDetection:
        maxEjectionPercent: 0
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::860378520032:role/inference-worker-service-s3-role-k8s-production-eu
  virtualService:
    enabled: true
    hosts:
      - inference-worker-service.di.svc.cluster.local
      - inference-worker-service.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - inference-worker-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: DoNotSchedule
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-1.0.0.67.0
      hpa:
        keda:
          enabled: true
          minReplicas: 2
          maxReplicas: 7
          pollingInterval: 15
          cooldownPeriod: 300
          triggerAuthentication:
            podIdentity:
              provider: aws
              identityOwner: keda
          triggers:
            - type: aws-sqs-queue
              authenticationRef:
                name: inference-worker-service-app-trigger-auth
              metadata:
                queueURL: "https://sqs.eu-central-1.amazonaws.com/860378520032/eu-schema-inference-jobs"
                awsRegion: eu-central-1
                queueLength: "30"
                scaleOnInFlight: "true"
            - type: aws-cloudwatch
              authenticationRef:
                name: inference-worker-service-app-trigger-auth
              metadata:
                namespace: AWS/SQS
                dimensionName: QueueName
                dimensionValue: eu-schema-inference-jobs
                metricName: ApproximateAgeOfOldestMessage
                targetMetricValue: "120"
                minMetricValue: "0"
                metricStatPeriod: "60"
                metricStat: Average
                awsRegion: eu-central-1
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleUp:
              stabilizationWindowSeconds: 60
              policies:
                - type: Pods
                  value: 4
                  periodSeconds: 60
              selectPolicy: Max
            scaleDown:
              stabilizationWindowSeconds: 300
      subsetConfig:
        selectorLabels: {}
        routes: []
