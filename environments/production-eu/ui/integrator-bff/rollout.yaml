service: integrator-bff
analysis:
  source: splunk
  query: >
    search earliest=-5m index=production-eu-web "k8s.container.name"="integrator-bff" "k8s.namespace.name" IN ("ui") k8s.pod.name=*canary*
              ((logName=serverHit sc IN (2*, 4*)) OR "uncaughtException" OR "TypeError")
              NOT (logName=serverHit sc IN (2*,3*,4*) (url="*TypeError*" OR url="*typeerror*"))
              | eval pass=if(match(sc, "^2"), 1, 0), fail=if(searchmatch("uncaughtException") OR searchmatch("TypeError"), 1, 0)
              | stats sum(pass) as passCount, sum(fail) as failCount, count as totalCount 
              | eval errorRate=if(totalCount > 0, failCount/totalCount, 0)
              | eval finalResultHolder=if(totalCount == 0 OR errorRate < 0.001, "true", "false")
              | fields passCount, failCount, totalCount, errorRate, finalResultHolder

  frequency: 5m
disabled: false
