microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-prod-env-vars
    NEW_RELIC_APP_NAME: qa-prod-ai-agent-executor
    NODE_OPTIONS: --max-old-space-size=250
    FILTER_DOCUMENT_WITH_AGENT_ID: false
    GUNICORN_CMD_ARGS: "--max-requests 2000 --max-requests-jitter 800"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-yocj16-shard-0&authSource=admin&retryWrites=true&w=majority"
    NO_PROD_USE_WIREMOCK_SERVICE: "TRUE"
    NO_PROD_WIREMOCK_BASE_URL: "http://ec2-13-204-253-51.ap-south-1.compute.amazonaws.com:8080"
    PERSIST_USAGE: "true"
