microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/lookup-cache
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    secretRef: newrelic-secrets
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "integrator-workers"
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        failureThreshold: 6
      readinessProbe:
        failureThreshold: 3
      revisionHistoryLimit: 1
      replicaCount: 5
      containerPort: 5000
      resources:
        requests:
          cpu: 3250m
          memory: 8Gi
        limits:
          cpu: 4000m
          memory: 12Gi
      startupProbe:
        enabled: true
        path: "/"
        port: "9999"
        initialDelaySeconds: 20
        periodSeconds: 10
        timeoutSeconds: 10
        successThreshold: 1
        failureThreshold: 5
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; wget -qO- "http://localhost:5000/openConnections?terminate=true"; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- "http://localhost:5000/openConnections?terminate=true"); sleep 5; done; wget -qO- "http://localhost:5000/stopServer"; echo "Done"; sleep 5; wget -qO- --method POST "http://localhost:15000/quitquitquit"; echo "Done"
      terminationGracePeriodSeconds: 1800
      podAnnotations:
        redeployTimestamp: 2026-06-12-19-30
        celigo.io/scrape: 'fast'
    hpa:
      autoscaling:
        enabled: false
    customToken:
      enabled: true
      image:
        name: "token-refresher"
        tag: "generic-v32"
      refreshInterval: "43200"
      expiryTime: "86700"
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/integrator-workers-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - integrator-workers.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - integrator-workers
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    memoryProfiling.json: |
      {
        "enabled": true,
        "dumpInterval": 0,
        "profileUntil": null,
        "podPatterns": [
          {
            "pattern": "integrator-workers-diworker.*",
            "enabled": true,
            "dumpInterval": 3600000
          }
        ],
        "pods": {}
      }
    cpuProfiling.json: |
      {
        "enabled": false,
        "durationMs": 5000,
        "profileIntervalMs": 60000,
        "profileUntil": null,
        "podPatterns": [],
        "pods": {}
      }
    cpuBlockedProfiling.json: |
      {
        "enabled": true,
        "rotationIntervalMs": 300000,
        "podPatterns": [],
        "pods": {}
      }
  PersistentVolumeClaims:
    - name: integrator-workers-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  volumes:
    - name: integrator-workers-nfs-storage
      persistentVolumeClaim:
        claimName: integrator-workers-nfs-pvc
    - name: integrator-workers-config
      configMap:
        name: integrator-workers-config-volume
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: integrator-workers-nfs-storage
    - mountPath: "/etc/config/"
      name: integrator-workers-config
  deployments:
    - name: chuncking-queue-worker
      env:
        MAX_CONSUMER_LOAD: 35
        MAX_CONSUMER_CHILD_PROCESSES: 2
        WORKER_TYPE: "ChunckingQueueWorker"
        DATABASE_POOL_SIZE: 10
        VISIBILITY_TIMEOUT_GUARD_ENABLED: true
        VISIBILITY_TIMEOUT_GUARD_THRESHOLD_MS: 45000
        MAX_INFLIGHT_RETRY_PUTS: 100
        CIRCUIT_BREAKER_ENABLED: true
        CIRCUIT_BREAKER_PHASE1_DELAYS: '[3000,5000,10000,15000,20000,30000,40000]'
        CIRCUIT_BREAKER_OPEN_DURATION: 120000
        CIRCUIT_BREAKER_FINAL_ATTEMPT: true
        MICROSERVICE_WS_CONNECTION_TIMEOUT: 30000
      deployment:
        replicaCount: 10
        image:
          tag: ml-1.0.0.744.0
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 20
          pollingInterval: 30
          cooldownPeriod: 600
          triggerAuthentication:
            podIdentity:
              provider: aws
              identityOwner: keda
          triggers:
            - type: aws-sqs-queue
              authenticationRef:
                name: integrator-workers-chuncking-queue-worker-trigger-auth
              metadata:
                queueURL: "https://sqs.ap-south-1.amazonaws.com/689472371083/chunk_generation_queue.fifo"
                queueLength: "20"
                activationQueueLength: "10"
                awsRegion: "ap-south-1"
          behavior:
            scaleUp:
              stabilizationWindowSeconds: 60
            scaleDown:
              stabilizationWindowSeconds: 600
              policies:
                - type: Pods
                  value: 1
                  periodSeconds: 60
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: diworker
      env:
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
        WORKER_TYPE: "DIWorker"
        DATABASE_POOL_SIZE: 10
        VISIBILITY_TIMEOUT_GUARD_ENABLED: true
        VISIBILITY_TIMEOUT_GUARD_THRESHOLD_MS: 45000
        CIRCUIT_BREAKER_ENABLED: true
        CIRCUIT_BREAKER_PHASE1_DELAYS: '[3000,5000,10000,15000,20000,30000,40000]'
        CIRCUIT_BREAKER_OPEN_DURATION: 120000
        CIRCUIT_BREAKER_FINAL_ATTEMPT: true
        MICROSERVICE_WS_CONNECTION_TIMEOUT: 30000
      deployment:
        replicaCount: 8
        image:
          tag: ml-1.0.0.744.0
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: diprimeworker
      env:
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 1
        WORKER_TYPE: "DIPrimeWorker"
        DATABASE_POOL_SIZE: 10
        NEW_RELIC_NATIVE_METRICS_ENABLED: "true"
        GC_MONITORING_ENABLED: true
        MAX_SEMI_SPACE_SIZE: 32
        AGGREGATION_MULTIPART_PART_SIZE_MB: 20
        VISIBILITY_TIMEOUT_GUARD_ENABLED: true
        VISIBILITY_TIMEOUT_GUARD_THRESHOLD_MS: 45000
        CIRCUIT_BREAKER_ENABLED: true
        CIRCUIT_BREAKER_PHASE1_DELAYS: '[3000,5000,10000,15000,20000,30000,40000]'
        CIRCUIT_BREAKER_OPEN_DURATION: 120000
        CIRCUIT_BREAKER_FINAL_ATTEMPT: true
        MICROSERVICE_WS_CONNECTION_TIMEOUT: 30000
      deployment:
        replicaCount: 8
        resources:
          requests:
            cpu: 2500m
            memory: 5Gi
          limits:
            cpu: 3500m
            memory: 8Gi
        image:
          tag: ml-1.0.0.744.0
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: test-high-concurrency
      env:
        WORKER_TYPE: "highConcurrency"
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
      deployment:
        image:
          tag: 2026.5.3-patch-1.0.0.699.0
        replicaCount: 2
      subsetConfig:
        selectorLabels: {}
        routes: []
    - name: app
      env:
        MAX_CONSUMER_LOAD: 100
        MAX_CONSUMER_CHILD_PROCESSES: 2
      deployment:
        image:
          tag: api-execution-logs-fb-1.0.0.712.0
      hpa:
        keda:
          enabled: true
          minReplicas: 10
          maxReplicas: 10
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: worker-load-previous-day
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: avg(celigo_total_current_load{deploymentName="integrator-workers-app"} offset 23h55m) / avg(celigo_total_max_load{deploymentName="integrator-workers-app"} offset 23h55m)
                threshold: "0.9"
            - type: prometheus
              metricType: Value
              name: worker-load
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: avg(celigo_total_current_load{deploymentName="integrator-workers-app"}) / avg(celigo_total_max_load{deploymentName="integrator-workers-app"})
                threshold: "0.7"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 30
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 75
            scaleUp:
              policies:
                - periodSeconds: 30
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 75
      subsetConfig:
        selectorLabels: {}
        routes: []
