microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/io/sa/rdbms-adaptor
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /jdbc-bridge/metrics
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "jdbc-bridge"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: "/jdbc-bridge/livez"
      readinessProbe:
        enabled: true
        path: "/jdbc-bridge/readyz"
      containerPort: 8080
      resources:
        limits:
          cpu: 2250m
          memory: 1750Mi
        requests:
          cpu: 500m
          memory: 1250Mi
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:8080/jdbc-bridge/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in seq 1 5; do count=$(wget -qO- 'http://localhost:8080/jdbc-bridge/openConnections?terminate=true'); sleep 5; done; fi; done; catalina.sh stop;
      terminationGracePeriodSeconds: 1800
      podAnnotations:
        redeployTimestamp: 2026-03-26-09-14
        celigo.io/scrape: 'true'
        celigo.io/path: '/jdbc-bridge/metrics'
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 5
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/jdbc-bridge-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - jdbc-bridge.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - jdbc-bridge
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    newRelic.json: |
      {
        "enableNR": true,
        "transactions": ["all", "custom"],
        "resources": {
          "_userId": [],
          "_expOrImpId": [],
          "_connectionId": []
        }
      }
  volumes:
    - name: jdbc-bridge-nr-config
      configMap:
        name: jdbc-bridge-config-volume
  volumeMounts:
    - mountPath: "/usr/local/tomcat/config/"
      name: jdbc-bridge-nr-config
  deployments:
    - name: devops-13536
      deployment:
        image:
          tag: 2026.7.1-fb-1.0.15.124.0
        resources:
          limits:
            cpu: 2.25
            memory: 4Gi
          requests:
            cpu: 800m
            memory: 3.5Gi
      hpa:
        keda:
          enabled: true
          minReplicas: 2
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.80, celigo_metrics_open_connections{deploymentName="jdbc-bridge-devops-13536"})
                threshold: "50"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              executionContextUserId:
                regex: '^(66cdf01e2b903592d14af806)$'
      sidecar:
        enabled: true
        inboundConnectionPool:
          tcp:
            maxConnections: 75
    - name: app
      deployment:
        image:
          tag: 2026.7.1-fb-1.0.15.124.0
      subsetConfig:
        selectorLabels: {}
        routes: []
