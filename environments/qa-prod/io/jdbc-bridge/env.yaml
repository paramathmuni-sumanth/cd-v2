microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-jdbc-bridge"
    NEWRELIC_CONF_FILE_PATH: "/usr/local/tomcat/config/newRelic.json"
    CATALINA_OPTS: "-Xms300m -Xmx800m -XX:MaxGCPauseMillis=200 -XX:ParallelGCThreads=5 -XX:ConcGCThreads=2 -XX:+UseParallelGC -javaagent:${CATALINA_HOME}/newRelic/newrelic-agent-8.14.0.jar -Dnewrelic.config.file=${CATALINA_HOME}/newRelic/newRelic.yml"
    s3_integrator_userdata_delete_30: "integrator-qa-prod-userdata-delete-30"
