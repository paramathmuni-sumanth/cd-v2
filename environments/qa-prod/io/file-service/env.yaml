microservice:
  env:
    NODE_ENV: "staging"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-file-service"
    NODE_OPTIONS: "--max-old-space-size=2048"
    NEWRELIC_CONF_FILE_PATH: "/file-service/config/newRelic.json"
    S3_FILES_BUCKET: "integrator-qa-prod-userdata-delete-30"
    OPENPGP_MIN_RSA_BITS: 1024
    SERVER_PORT: "5000"
    STREAM_SORT_AND_GROUP: "true"
    HEADERS_TIMEOUT: "355000"
    KEEPALIVE_TIMEOUT: "351000"
    SERVER_KEEP_ALIVE_TIMEOUT: "300000"
    SERVER_TIMEOUT: "365000"
