microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/internal-gateway
                  - cluster.local/ns/di/sa/di-management-service
                  - cluster.local/ns/io/sa/netsuite-webservices-adaptor
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/core/sa/resource-management
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "endpoint-service"
    subscriptionType:
      enabled: false
    deployment:
      livenessProbe:
        failureThreshold: 3
      readinessProbe:
        failureThreshold: 3
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 3
          memory: 3584Mi
        requests:
          cpu: 1
          memory: 3328Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - -c
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2025-08-19-21-10
        celigo.io/scrape: 'true'
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 8
        maxReplicas: 12
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/endpoint-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - endpoint-service.celigo.io
      - endpoint-service.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - endpoint-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    logLevel.json: |
      {
        "default": "info"
      }
  volumes:
    - name: config-volume
      configMap:
        name: endpoint-service-config-volume
  volumeMounts:
    - name: config-volume
      mountPath: /etc/config
  deployments:
    - name: api-pods
      deployment:
        image:
          tag: ml-0.0.1.659.0
      hpa:
        autoscaling:
          enabled: true
          minReplicas: 1
          maxReplicas: 10
      subsetConfig:
        selectorLabels: {}
        routes:
          - uri:
              prefix: /api
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.676.0
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 10
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="endpoint-service-app"})
                threshold: "70"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
