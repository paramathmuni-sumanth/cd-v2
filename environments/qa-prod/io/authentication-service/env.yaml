microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-authentication-service"
    NODE_OPTIONS: "--max-old-space-size=1024"
    CANARY_SERVICE_NAME_AND_KEYS_LIST: "http-adaptor:http-adaptor,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,resource-management:resource-management,flow-management:flow-management,data-warehouse-adaptor:data-warehouse-adaptor,rdbms-adaptor:rdbms-adaptor,nosql-db-adaptor:nosql-db-adaptor,jdbc-bridge:jdbc-bridge,ftp-bridge-ms:ftp-bridge-ms,endpoint-service:endpoint-service,as2-adaptor:as2-adaptor,salesforce-adaptor:salesforce-adaptor,file-adaptor:file-adaptor,netsuite-distributed-adaptor:netsuite-distributed-adaptor,netsuite-webservices-adaptor:netsuite-webservices-adaptor,file-service:file-service,file-adaptor:file-adaptor,js-runtime:js-runtime,api-execution:api-execution"
    ENABLE_ENTERPRISE_LOGGING_BY_DEFAULT: true
    DISABLE_MFA_ENFORCEMENT: true
    ACCESSCONTROL_FOR_API_ROUTES: "true"
    ADAPTOR_HEARTBEAT_INTERVAL: "1800000"
    ALLOW_GOOGLE_SIGNIN: "true"
    ALLOW_SIGNUP: "true"
    AUDIT_ENABLED: "true"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    CANARY_SERVICE_LIST: "integrator-app-ui"
    EACH_LIMIT: "100"
    ENABLE_CPU_PROFILER: "true"
    ENDPOINT_LICENSE_ENABLED: "true"
    GOOGLE_CALLBACK_URL: "https://qaprod.staging.integrator.io/auth/google/oauth2callback"
    GOOGLE_CONNECTION_CALLBACK_URL: "https://staging.integrator.io/auth/google/connection/oauth2callback"
    IO_DOMAIN: "qaprod.staging.integrator.io"
    IO_DOMAIN_FOR_GLOBAL_ID_SERVICE: "https://qa-prod.staging.integrator.io/system"
    IO_LOGIN_PROMOTION_URL: "https://staging.celigo.com/login/display"
    IO_USER_ID_FIELD_IN_LITMOS: "CustomField9"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-yocj16-shard-0&authSource=admin&retryWrites=true&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    OVERRIDE_FORWARDED_HEADER: "true"
    PLATFORM_LICENSE_ENABLED: "true"
    REGISTERED_CONNECTIONS_ENABLED: "true"
    S3_HEAP_DUMPS: "integrator-qa-prod-heap-dumps"
    SCHEDULE_SHIFT_FOR_FLOWS_CREATED_AFTER: "2018-06-06T00:00:00.000Z"
    SHOW_REACT_BETA_FROM_DATE: "2019-12-26"
    SHOW_REACT_SNEAK_PEEK_FROM_DATE: "2019-11-05"
    SKILLJAR_ENABLED: "True"
    TC_CHANGE_RELEASE_DATE: "2023-03-03"
    aws_account_id: "689472371083"
    MONGODB_CLIENT_APP_NAME: "authentication-service"
