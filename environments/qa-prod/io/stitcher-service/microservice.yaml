microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/testing/sa/default
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: stitcher-service
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 8080
      resources:
        limits:
          cpu: 4
          memory: 5Gi
        requests:
          cpu: 500m
          memory: 4Gi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-02-05-14-30
      gracefulShutDown:
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - wget -qO- 'http://localhost:8080/prestop';
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /healthz
            port: http
    hpa:
      autoscaling:
        enabled: false
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/stitcher-service-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - stitcher-service.io.svc.cluster.local
      - stitcher-service.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - stitcher-service
            topologyKey: kubernetes.io/hostname
          weight: 100
  PersistentVolumeClaims:
    - name: stitcher-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  volumes:
    - name: stitcher-nfs-storage
      persistentVolumeClaim:
        claimName: stitcher-nfs-pvc
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: stitcher-nfs-storage
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: api-fb-1.0.0.7.0
        env:
          - name: GOMEMLIMIT
            value: "3GiB"
          - name: GOMAXPROCS
            valueFrom:
              resourceFieldRef:
                divisor: '0'
                resource: limits.cpu
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 3
          pollingInterval: 15
          cooldownPeriod: 60
          triggerAuthentication:
            podIdentity:
              provider: aws
              identityOwner: keda
          triggers:
            - type: aws-sqs-queue
              authenticationRef:
                name: stitcher-service-app-trigger-auth
              metadata:
                queueURL: https://sqs.ap-south-1.amazonaws.com/689472371083/stitch_enterprise_logs.fifo
                queueLength: "10"
                awsRegion: "ap-south-1"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
      subsetConfig:
        selectorLabels: {}
        routes: []
