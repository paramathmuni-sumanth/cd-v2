microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/testing/sa/default
        - to:
            - operation:
                paths:
                  - /stopServer
                  - /openConnections
  common:
    secretRef: newrelic-secrets
    image:
      repository: 341118756977.dkr.ecr.ap-south-1.amazonaws.com
      name: mcp-servers
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2000m
          memory: 3Gi
        requests:
          cpu: 400m
          memory: 2.5Gi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-01-01-12-00
      livenessProbe:
        enabled: true
        config:
          httpGet:
            path: /livez
            port: http
        initialDelaySeconds: 50
        periodSeconds: 10
        timeoutSeconds: 20
        successThreshold: 1
        failureThreshold: 5
      readinessProbe:
        enabled: true
        path: "/readyz"
        initialDelaySeconds: 50
        periodSeconds: 10
        timeoutSeconds: 10
        successThreshold: 1
        failureThreshold: 5
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 3
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/mcp-servers-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - mcp-servers.io.svc.cluster.local
      - mcp-servers.celigo.io
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - mcp-servers
            topologyKey: kubernetes.io/hostname
          weight: 100
  configVolume:
    logLevel.json: |
      {
        "default": "debug",
        "configPerPod": false
      }
  volumes:
    - name: log-level-config
      configMap:
        name: mcp-servers-config-volume
  volumeMounts:
    - mountPath: "/etc/config/"
      name: log-level-config
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.69.0
      subsetConfig:
        selectorLabels: {}
        routes: []
