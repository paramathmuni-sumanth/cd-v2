microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/file-adaptor
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "as2-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 750m
          memory: 2.17Gi
        requests:
          cpu: 200m
          memory: 1.66Gi
      terminationGracePeriodSeconds: 300
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      podAnnotations:
        redeployTimestamp: 2024-08-12-14-45
        celigo.io/scrape: 'true'
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/as2-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - as2-adaptor.celigo.io
      - as2-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - as2-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    newRelic.json: |
      {
        "enableNR": true,
        "distributedNR": true,
        "transactions": ["all", "custom"],
        "resources": {
          "_userId": [],
          "_importId": [],
          "_exportId": [],
          "_connectionId": []
        }
      }
  volumes:
    - name: as2-adaptor-nr-config
      configMap:
        name: as2-adaptor-config-volume
  volumeMounts:
    - mountPath: "/as2-adaptor/config/"
      name: as2-adaptor-nr-config
  deployments:
    - name: app
      deployment:
        image:
          tag: ml-0.0.1.97.0
      subsetConfig:
        selectorLabels: {}
        routes: []
