microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-as2-adaptor"
    NODE_OPTIONS: "--max-old-space-size=922"
    NEWRELIC_CONF_FILE_PATH: "/as2-adaptor/config/newRelic.json"
    AS2_DEBUG_LOGS: "true"
    AS2_SPL_CHAR_SUPPORT_USERIDS: "63455a4563c1266abf0e97f9,617fbc41e9c97a0e4037ef27"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_REGION: "ap-south-1"
    EACH_LIMIT: "100"
    FILE_SERVICE_K8S_URL: "http://file-service.io.svc.cluster.local"
    HTTP_ADAPTOR_URL: "ws://http-adaptor.io.svc.cluster.local"
    IO_DOMAIN: "qaprod.staging.integrator.io"
    JAVASCRIPT_RUNTIME_HOST: "js-runtime.io.svc.cluster.local"
    JS_RUNTIME_URL_K8S: "http://js-runtime.io.svc.cluster.local"
    MAX_PAGE_SIZE_IN_BYTES: "1000000"
    MONGODB_DATABASE: "integrator"
    REDIS_PORT: "6379"
    s3_integrator_debug: "integrator-qa-prod-debug"
    s3_integrator_error_files: "integrator-qa-prod-error-files"
    s3_integrator_files: "integrator-qa-prod-files"
    s3_integrator_mongo_fields_data: "integrator-qa-prod-mongo-fields"
    s3_integrator_pages: "integrator-qa-prod-pages"
    s3_integrator_userdata_delete_30: "integrator-qa-prod-userdata-delete-30"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-yocj16-shard-0&authSource=admin&retryWrites=true&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    S3_FILES_BUCKET: "integrator-qa-prod-userdata-delete-30"
    aws_account_id: "689472371083"
    MONGODB_CLIENT_APP_NAME: "as2-adaptor"
