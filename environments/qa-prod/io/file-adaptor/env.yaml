microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-file-adaptor"
    NODE_OPTIONS: "--max-old-space-size=3584"
    NEWRELIC_CONF_FILE_PATH: "/file-adaptor/config/newRelic.json"
    DATA_WAREHOUSE_ADAPTOR_URL: "ws://data-warehouse-adaptor.io.svc.cluster.local"
    FILE_SERVICE_K8S_URL: "http://file-service.io.svc.cluster.local"
    FTP_ACTIVE_LOWER_ADAPTOR_URL: "ws://ftp-bridge-ms-active.io.svc.cluster.local/ftp-bridge-ms"
    FTP_ACTIVE_UPGRADED_ADAPTOR_URL: "ws://ftp-bridge-ms-active.io.svc.cluster.local/ftp-bridge-ms"
    FTP_ADAPTOR_URL: "ws://ftp-bridge-ms.io.svc.cluster.local/ftp-bridge-ms"
    FTP_EXPORT_ENDPOINT: "/batchExportWSV1"
    FTP_IMPORT_ENDPOINT: "/batchImportWSV1"
    FTP_MAX_BATCH_SIZE: "1"
    FTP_PASSIVE_LOWER_ADAPTOR_URL: "ws://ftp-bridge-ms.io.svc.cluster.local/ftp-bridge-ms"
    FTP_PING_ENDPOINT: "/pingWSV1"
    HTTP_ADAPTOR_URL: "ws://http-adaptor.io.svc.cluster.local"
    NETSUITE_WEB_SERVICES_URL: "ws://netsuite-webservices-adaptor.io.svc.cluster.local"
    s3_integrator_files: "integrator-qa-prod-files"
    s3_integrator_userdata_delete_30: "integrator-qa-prod-userdata-delete-30"
    internal_s3_timeout_ms: "900000"
    HEAP_PROFILER_ENABLED: "true"
    S3_HEAP_DUMPS_BUCKET: "integrator-qa-prod-heap-dumps"
    DEFAULT_MAX_OLD_SPACE_SIZE: "3758096384"
    HEAP_INTERVAL_CHECK: "10000"
    CSV_MAX_COLUMN_COUNT: "2000"
    AS2_ADAPTOR_URL: "ws://as2-adaptor.io.svc.cluster.local"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    EDI_MONGODB_DATABASE: "edi-integrator"
    EDI_MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-yocj16-shard-0&authSource=admin&retryWrites=true&w=majority"
    FILE_MICRO_SERVICE_URL: "http://file-service.io.svc.cluster.local"
    HTTP_MICRO_SERVICE_URL: "http://http-adaptor.io.svc.cluster.local"
    RDBMS_ADAPTOR_URL: "ws://rdbms-adaptor.io.svc.cluster.local"
    s3_integrator_chunks: "integrator-qa-prod-chunks"
    ENABLE_HEAP_PROFILE: "true"
    HEAP_PROFILE_INTERVAL: "20000"
    HEAP_PROFILE_START_INTERVAL: "20000"
    IO_DOMAIN: "qaprod.staging.integrator.io"
    S3_HEAP_DUMPS: "integrator-qa-prod-heap-dumps"
