microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-lookup-cache"
    NODE_OPTIONS: "--max-old-space-size=500"
    APP_NAME: "lookup-cache"
    LOOKUP_CACHE_SERVICE_URL: "http://lookup-cache.io.svc.cluster.local"
    BATCH_WRITE_REQUEST_SIZE: "10"
    HEAP_PROFILER_ENABLED: "true"
    LOCAL_DYNAMODB_URL: "http://localhost:8000"
    RMS_URL: "http://resource-management.core.svc.cluster.local"
    S3_HEAP_DUMPS_BUCKET: "integrator-qa-prod-heap-dumps"
    s3_integrator_files: "integrator-qa-prod-files"
    s3_integrator_userdata_delete_30: "integrator-qa-prod-userdata-delete-30"
    BATCH_WRITE_DELAY: "5"
