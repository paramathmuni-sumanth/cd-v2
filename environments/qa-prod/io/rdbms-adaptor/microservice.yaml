microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/core/sa/api-execution
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "rdbms-adaptor"
    subscriptionType:
      enabled: false
    deployment:
      startupProbe:
        enabled: true
        path: /startupz
        port: 5000
        initialDelaySeconds: 0
        periodSeconds: 2
        timeoutSeconds: 1
        failureThreshold: 30
      livenessProbe:
        enabled: true
        failureThreshold: 6
        initialDelaySeconds: 0
      readinessProbe:
        failureThreshold: 3
        initialDelaySeconds: 0
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2.5
          memory: 2000Mi
        requests:
          cpu: 500m
          memory: 1500Mi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 86400
      podAnnotations:
        redeployTimestamp: 2026-05-21-11-48
        celigo.io/scrape: 'true'
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 10
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
    trafficPolicy:
      loadBalancer:
        consistentHash:
          httpHeaderName: "wsId"
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/rdbms-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - rdbms-adaptor.celigo.io
      - rdbms-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - rdbms-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  configVolume:
    newRelic.json: |
      {
        "enableNR": true,
        "distributedNR": true,
        "transactions": ["all", "custom"],
        "resources": {
          "_userId": [],
          "_importId": [],
          "_exportId": [],
          "_connectionId": []
        }
      }
  PersistentVolumeClaims:
    - name: rdbms-adaptor-fs-08c5cfab3a09b34c2
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-dwh
  volumes:
    - name: rdbms-adaptor-nfs-storage
      persistentVolumeClaim:
        claimName: rdbms-adaptor-fs-08c5cfab3a09b34c2
    - name: rdbms-adaptor-nr-config
      configMap:
        name: rdbms-adaptor-config-volume
  volumeMounts:
    - mountPath: "/rdbms-adaptor/bulk_load_files/"
      name: rdbms-adaptor-nfs-storage
    - mountPath: "/rdbms-adaptor/config/"
      name: rdbms-adaptor-nr-config
  deployments:
    - name: devops-13536
      deployment:
        image:
          tag: startup-probe-fb-0.7.5.277.0
        resources:
          limits:
            cpu: 3000m
            memory: 2000Mi
          requests:
            cpu: 1200m
            memory: 1500Mi
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="rdbms-adaptor-devops-13536"})
                threshold: "180"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              executionContextUserId:
                regex: '^(66cdf01e2b903592d14af806)$'
      sidecar:
        enabled: true
        inboundConnectionPool:
          tcp:
            maxConnections: 207
    - name: app
      deployment:
        image:
          tag: ml-0.7.5.243.0
      hpa:
        keda:
          enabled: true
          minReplicas: 5
          maxReplicas: 15
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="rdbms-adaptor-app"})
                threshold: "95"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
      sidecar:
        enabled: true
        inboundConnectionPool:
          tcp:
            maxConnections: 110
