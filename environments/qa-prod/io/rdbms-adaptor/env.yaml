microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-rdbms-adaptor"
    terminationGracePeriodSeconds: "86400"
    NODE_OPTIONS: "--max-old-space-size=1000"
    NEWRELIC_CONF_FILE_PATH: "/rdbms-adaptor/config/newRelic.json"
    JDBC_BRIDGE_URL: "ws://jdbc-bridge.io.svc.cluster.local/jdbc-bridge"
    PORT: "5000"
    s3_integrator_userdata_delete_30: "integrator-qa-prod-userdata-delete-30"
    S3_HEAP_DUMPS_BUCKET: "integrator-qa-prod-heap-dumps"
