microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-netsuite-webservices-adaptor"
    NODE_OPTIONS: "--max-old-space-size=2500"
    PORT: "5000"
    s3_integrator_debug: "integrator-qa-prod-debug"
    s3_integrator_files: "integrator-qa-prod-files"
    s3_integrator_netsuite_metadata: "integrator-qa-prod-metadata"
    s3_integrator_userdata_delete_30: "integrator-qa-prod-userdata-delete-30"
    EFS_ROOT_MOUNT_PATH: "/mnt/efs"
    MAX_ALL_BUFFERS_LIMIT: 100000000
    TOTAL_BUFFER_COUNT: 10
    MULTI_LOGS_BUFFER_LIMIT: 10000000
    SINGLE_LOG_BUFFER_LIMIT: 25000000
    IDLE_FLUSH_INTERVAL: 500
    HARD_FLUSH_INTERVAL: 1000
    FLUSH_SCHEDULE_INTERVAL: 250
    LOG_FORWARDER_DEBUG_LOGS: "true"
    NETSUITE_APPLICATION_ID: "00997F3C-FD81-400B-9E36-BB673D757DE3"
