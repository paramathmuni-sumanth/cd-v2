microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
    allow:
      enabled: true
      rules:
        - from:
            - source:
                principals:
                  - cluster.local/ns/io/sa/integrator-workers
                  - cluster.local/ns/core/sa/integrator-system-workers
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/io/sa/file-adaptor
                  - cluster.local/ns/core/sa/resource-management
                  - cluster.local/ns/core/sa/api-execution
                  - cluster.local/ns/testing/sa/loadtesting
                  - cluster.local/ns/io/sa/netsuite-distributed-adaptor
        - to:
            - operation:
                methods:
                  - GET
                paths:
                  - /metrics
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "netsuite-webservices-adaptor"
    subscriptionType:
      enabled: true
    deployment:
      livenessProbe:
        failureThreshold: 6
        initialDelaySeconds: 0
      readinessProbe:
        failureThreshold: 3
        initialDelaySeconds: 0
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 1500m
          memory: 3.5Gi
        requests:
          cpu: 200m
          memory: 3Gi
      gracefulShutDown:
        enabled: true
        preStop:
          exec:
            command:
              - sh
              - '-c'
              - expected="0"; count=""; while ! [ "$count" = "$expected" ]; do count=$(wget -qO- 'http://localhost:5000/openConnections?preStopMode=true'); sleep 1; if [ "$count" = "$expected" ]; then for i in `seq 1 5`; do count=$(wget -qO- 'http://localhost:5000/openConnections?terminate=true'); sleep 5; done; fi; done; wget -qO- 'http://localhost:5000/stopServer'; echo "Done";
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-01-01-21-04
        celigo.io/scrape: 'true'
    hpa:
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 4
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/netsuite-webservices-adaptor-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - netsuite-webservices-adaptor.celigo.io
      - netsuite-webservices-adaptor.io.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - netsuite-webservices-adaptor
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: nswa-nfs-pvc
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-enterprise-logs
  volumes:
    - name: nswa-nfs-storage
      persistentVolumeClaim:
        claimName: nswa-nfs-pvc
  volumeMounts:
    - mountPath: "/mnt/efs"
      name: nswa-nfs-storage
  deployments:
    - name: app
      deployment:
        image:
          tag: api-erp-fb-0.1.1.103.0
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 1
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="netsuite-webservices-adaptor-app"})
                threshold: "100"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 60
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 180
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes: []
