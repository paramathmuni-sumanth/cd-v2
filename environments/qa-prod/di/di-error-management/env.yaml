microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-di-error-management"
    NODE_OPTIONS: "--max-old-space-size=250"
    PORT: "5000"
    SESSION_TIMEOUT: "60000"
    REBALANCE_TIMEOUT: "60000"
    CONSUMER_HEARTBEAT_INTERVAL: "20000"
    MAX_WAIT_TIME_IN_MS: "5000"
    MIN_BYTES: "524288"
    MAX_BYTES_PER_PARTITION: "1048576"
    POLLING_INTERVAL: "5000"
    MAX_RECOVERY_ATTEMPTS: "5"
    GROUP_ID: "di-error-management-group"
    API_GATEWAY_SERVICE_URL: "http://api-gateway.io.svc.cluster.local"
    IO_SERVICE_URL: "https://api.qaprod.staging.integrator.io"
    DI_USER_ID: "66cdf01e2b903592d14af806"
    ENABLE_LOGGING_KCGW: "false"
    WATCHDOG_ENABLED: "false"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-yocj16-shard-0&authSource=admin&retryWrites=true&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    MONGODB_CLIENT_APP_NAME: "resource-management"
