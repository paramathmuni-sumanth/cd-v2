microservice:
  env:
    NODE_ENV: "cd"
    aws_region: "ap-south-1"
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-resolved-linegraphs"
    NODE_OPTIONS: "--max-old-space-size=512"
    EACH_LIMIT: "5"
    INTIAL_RETRY_DELAY_FOR_AUTO: "60000"
    MAX_ERRORS_TO_PROCESS_PER_EXP_IMP: "25"
    MAX_LOAD: "25"
    NEEDS_NOTIFICATION_NUM_PARTITIONS: "5"
    REFRESH_KCGW_FREQUENCY: "10000"
    s3_integrator_errors: "integrator-qa-prod-errors"
    s3_integrator_kcgw: "integrator-qa-prod-kcgw"
    s3_integrator_mongo_fields_data: "integrator-qa-prod-mongo-fields"
    s3_integrator_retries: "integrator-qa-prod-retries"
    s3_integrator_userdata_delete_30: "integrator-qa-prod-userdata-delete-30"
    sqs_delay_helper: "delay_helper"
    AWS_SES_ENDPOINT: "email.ap-south-1.amazonaws.com"
    AWS_SES_FROM: "staging@celigo.com"
    AWS_SES_REGION: "ap-south-1"
    INFLUXDB_BUCKET: "flowEvents"
    INFLUXDB_ORGID: "ee930e76165f4293"
    MONGODB_DATABASE: "integrator"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-yocj16-shard-0&authSource=admin&retryWrites=true&w=majority"
    OPENSSL_CERT_LOCATION: "/etc/pki/tls/cert.pem"
    OPSWORKS_STACK_ID: "02718532-11e9-4edd-a0c0-05a58f8b952f"
    INFLUXDB_BASEURI: "https://us-east-1-1.aws.cloud2.influxdata.com/api/v2/"
