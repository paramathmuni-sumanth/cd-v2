microservice:
  env:
    JAVA_ENV: cd
    AWS_REGION: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: "celigo-k8s-qa-prod-env-vars"
    NEW_RELIC_APP_NAME: "qa-prod-streaming-service"
    JAVA_OPTS: "-Xms512m -Xmx3584m -XX:+UseG1GC -Dquarkus.http.host=0.0.0.0 -Djava.util.logging.manager=org.jboss.logmanager.LogManager"
    SERVER_PORT: 5000
    EXTERNAL_WEBHOOK_SERVICE_URL: "http://webhooks.io.svc.cluster.local"
    EXTERNAL_RESOURCE_MANAGEMENT_SERVICE_URL: "http://resource-management.core.svc.cluster.local"
    SERVICE_TIMEOUT: 30000
    POD_EXPORT_LOCK_POLL_INTERVAL: 60
    SHUTDOWN_TIMEOUT_SECONDS: 300
    S3_INTEGRATOR_PAGES_BUCKET: "integrator-qa-prod-pages"
    MONGODB_DATABASE: "integrator"
    RESOURCE_MANAGEMENT_SERVICE_URL: "http://resource-management.core.svc.cluster.local"
    WEBHOOK_SERVICE_URL: "http://webhooks.io.svc.cluster.local"
    KAFKA_CLIENT_CONNECTION_TIMEOUT: "30000"
    MONGODB_CLIENT_APP_NAME: "resource-management"
