microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-prod-env-vars
    NEW_RELIC_APP_NAME: qa-prod-file-storage
    NODE_OPTIONS: --max-old-space-size=250
    PORT: "5000"
    STORAGE_S3_BUCKET_NAME: integrator-qa-prod-userdata-delete-never
    STORAGE_PRESIGN_EXPIRY: "86400"
    REDIS_KEY_PREFIX_ACTIVE: "storage:active:"
    REDIS_KEY_PREFIX_RECYCLE_BIN: "storage:recycleBin:"
    MAX_NESTING_DEPTH: "20"
    MAX_PART_SIZE: "1"
    STORAGE_FREE_TIER_OVERAGE_LIMIT: "50"
    STORAGE_LICENSED_OVERAGE_LIMIT: "200"
    MONGODB_CLIENT_APP_NAME: "file-storage"
    MONGODB_DISCONNECT_TIMEOUT: "500"
    INTEGRATOR_HOST_NAME: "internal-gateway.io.svc.cluster.local"
    IO_DOMAIN: "qaprod.staging.integrator.io"
    FILE_STORAGE_SNS_TOPIC_ARNS: "arn:aws:sns:ap-south-1:689472371083:file-storage-notification"
    STORAGE_SNS_TOPIC_ARNS: "arn:aws:sns:ap-south-1:689472371083:file-storage-notification"
