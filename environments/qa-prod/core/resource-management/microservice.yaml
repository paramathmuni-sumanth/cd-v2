microservice:
  authorizationPolicy:
    deny:
      enabled: true
      rules:
        - from:
            - source:
                notPrincipals:
                  - cluster.local/ns/testing/sa/default
                  - cluster.local/ns/istio-ingress/sa/istio-ingress
                  - cluster.local/ns/io/sa/api-gateway
                  - cluster.local/ns/io/sa/flow-management
                  - cluster.local/ns/io/sa/gptverse
                  - cluster.local/ns/io/sa/endpoint-service
                  - cluster.local/ns/io/sa/internal-gateway
                  - cluster.local/ns/di/sa/di-management-service
                  - cluster.local/ns/di/sa/data-catalog-service
                  - cluster.local/ns/io/sa/netsuite-webservices-adaptor
                  - cluster.local/ns/io/sa/lookup-cache
                  - cluster.local/ns/ui/sa/integrator-bff
                  - cluster.local/ns/core/sa/streaming-service
                  - cluster.local/ns/io/sa/agent-management-service
                  - cluster.local/ns/io/sa/audit-service
                  - cluster.local/ns/core/sa/integrator-system-workers
        - to:
            - operation:
                paths:
                  - "/stopServer"
                  - "/openConnections"
  common:
    image:
      repository: "341118756977.dkr.ecr.ap-south-1.amazonaws.com"
      name: "resource-management"
    subscriptionType:
      enabled: false
    deployment:
      revisionHistoryLimit: 1
      replicaCount: 1
      containerPort: 5000
      resources:
        limits:
          cpu: 2
          memory: 2.5Gi
        requests:
          cpu: 400m
          memory: 2Gi
      terminationGracePeriodSeconds: 300
      podAnnotations:
        redeployTimestamp: 2026-06-11-10-30
      livenessProbe:
        config:
          exec:
            command:
              - /bin/bash
              - /opt/docker/probe-scripts/probe.sh
        initialDelaySeconds: 20
        periodSeconds: 10
        successThreshold: 1
        timeoutSeconds: 10
        failureThreshold: 10
    hpa:
      autoscaling:
        enabled: true
        minReplicas: 1
        maxReplicas: 15
        targetCPUUtilizationPercentage: 70
        targetMemoryUtilizationPercentage: 70
  destinationRules:
    enabled: true
  ingress:
    enabled: false
  service:
    type: ClusterIP
    port: 80
  serviceAccount:
    create: true
    annotations:
      eks.amazonaws.com/role-arn: arn:aws:iam::689472371083:role/resource-management-s3-role-k8s
  virtualService:
    enabled: true
    hosts:
      - resource-management.celigo.io
      - resource-management.core.svc.cluster.local
  affinity:
    podAntiAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
        - podAffinityTerm:
            labelSelector:
              matchExpressions:
                - key: app
                  operator: In
                  values:
                    - resource-management
            topologyKey: kubernetes.io/hostname
          weight: 100
  topologySpreadConstraints:
    - maxSkew: 1
      topologyKey: topology.kubernetes.io/zone
      whenUnsatisfiable: ScheduleAnyway
      matchLabelKeys:
        - pod-template-hash
  PersistentVolumeClaims:
    - name: resource-management-fs-0590b66bc898e2255
      accessModes:
        - ReadWriteMany
      storage: 5Gi
      storageClassName: efs-sc-rms
  configVolume:
    probe-config.json: |
      {
        "DUMP_ENABLED": true,
        "HEAP_DUMP_THRESHOLD": 3,
        "HEAPDUMP_ENABLED": false,
        "MAX_PERF_DUMP_PER_HOUR": 1
      }
  volumes:
    - name: probe-configmap-volume
      configMap:
        name: resource-management-config-volume
    - name: resource-management-nfs-storage
      persistentVolumeClaim:
        claimName: resource-management-fs-0590b66bc898e2255
  volumeMounts:
    - mountPath: /service-core-dumps
      name: resource-management-nfs-storage
    - mountPath: /opt/probe-config/
      name: probe-configmap-volume
  deployments:
    - name: hypercadence-testing
      env:
        LOAD_TEST_ENABLED: "true"
      deployment:
        image:
          tag: 2026.5.2-patch-0.0.1.1713.0
      hpa:
        keda:
          enabled: true
          minReplicas: 1
          maxReplicas: 1
          pollingInterval: 15
          cooldownPeriod: 60
          triggers:
            - type: prometheus
              metricType: Value
              name: open-connections
              metadata:
                serverAddress: http://prometheus-server.prometheus.svc.cluster.local:80
                query: quantile(0.90, celigo_metrics_open_connections{deploymentName="netsuite-distributed-adaptor-di-load-testing"})
                threshold: "600"
            - type: cpu
              name: cpu-utilization
              metricType: Utilization
              metadata:
                value: "70"
            - type: memory
              name: memory-utilization
              metricType: Utilization
              metadata:
                value: "70"
          behavior:
            scaleDown:
              policies:
                - periodSeconds: 60
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 180
            scaleUp:
              policies:
                - periodSeconds: 45
                  type: Percent
                  value: 25
              selectPolicy: Max
              stabilizationWindowSeconds: 120
      subsetConfig:
        selectorLabels: {}
        routes:
          - headers:
              userid:
                regex: '^(635fb2dd12ab350e4d594795)$'
      destinationRules:
        trafficPolicy:
          connectionPool:
            tcp:
              maxConnections: 800
          loadBalancer:
            consistentHash:
              httpHeaderName: "wsId"
    - name: app
      deployment:
        image:
          tag: connector-ms-fb-0.0.1.1697.0
      subsetConfig:
        selectorLabels: {}
        routes: []
