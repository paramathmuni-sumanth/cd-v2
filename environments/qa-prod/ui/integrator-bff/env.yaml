microservice:
  env:
    NODE_ENV: cd
    aws_region: ap-south-1
    ENVIRONMENT_VARIABLES_S3_BUCKET_NAME: celigo-k8s-qa-prod-env-vars
    NEW_RELIC_APP_NAME: qa-prod-integrator-bff
    NODE_OPTIONS: --max-old-space-size=250
    PORT: "5000"
    RMS_SERVICE_URL: "http://resource-management.core.svc.cluster.local"
    IO_DOMAIN: "qa.staging.integrator.io"
    HEAP_PROFILER_ENABLED: "true"
    S3_HEAP_DUMPS_BUCKET: "integrator-qa-heap-dumps"
    DEFAULT_MAX_OLD_SPACE_SIZE: "1073741824"
    HEAP_INTERVAL_CHECK: "30000"
    OPENAI_API_KEY: "dummy"
    MONGODB_URL_QUERY_PARAMS: "ssl=true&replicaSet=atlas-yocj16-shard-0&authSource=admin&retryWrites=true&w=majority"
