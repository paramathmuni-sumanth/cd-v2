        TIME_GAP: "60"
        DUMP_FILE_BUCKET_PREFIX: "dump-files"
        NODE_ENV: "staging"
      volumes:
        - name: dump-exporter-nosql-db-adaptor-nfs-storage
          persistentVolumeClaim:
            claimName: nosql-db-adaptor-fs-03926db75e0d38bd2
      volumeMounts:
        - mountPath: "/service-core-dumps/"
          name: dump-exporter-nosql-db-adaptor-nfs-storage